<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verdict Terminal</title>
<style>
  /* Dark-only "terminal" palette -- this design deliberately commits to a
     single dark theme (see sec_analyzer/web/templates' prior design intent
     for the same call), matching the supplied mockup. */
  :root {
    color-scheme: dark;
    --bg: #0d1420;
    --card: #111b2b;
    --border: #223349;
    --text: #e0e2ea;
    --muted: #8b919d;
    --outline: #c0c7d3;
    --primary: #5aa7ff;
    --primary-light: #a2c9ff;
    --green: #4de082;
    --amber: #ffb953;
    --caution: #ff8a3d;
    --red: #ffb4ab;
    --red-container: #93000a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.45;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  .muted { color: var(--muted); }
  .mono { font-family: var(--mono); }

  /* ---- Top nav ---------------------------------------------------------*/
  .topnav {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(13, 20, 32, 0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    margin: 0 0 20px;
  }
  .nav-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
  }
  .brand {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--primary-light);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .nav-date {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--mono);
  }
  .nav-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    flex: 1 1 auto;
  }
  .ticker-input {
    width: 11ch;
    text-transform: uppercase;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
  }
  .ticker-input:focus {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
  }
  .provider-select {
    font-size: 0.82rem;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: var(--sans);
    max-width: 220px;
  }
  .analyze-btn {
    font-size: 0.86rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--primary);
    background: var(--primary);
    color: #06111f;
    cursor: pointer;
  }
  .analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---- Shared horizon-toggle pill row ------------------------------------*/
  .horizon-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .horizon-pill {
    font-family: var(--mono);
    font-size: 0.74rem;
    font-weight: 600;
    padding: 6px 12px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-right: 1px solid var(--border);
    cursor: default;
  }
  .horizon-pill:last-child { border-right: none; }
  .horizon-toggle.interactive .horizon-pill { cursor: pointer; }
  .horizon-pill.active {
    background: rgba(90, 167, 255, 0.18);
    color: var(--primary-light);
  }

  /* ---- Cards -------------------------------------------------------------*/
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- Header card ---------------------------------------------------- */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header-left .ticker-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ticker {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .entity-name {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .source-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .header-right {
    text-align: right;
    flex-shrink: 0;
  }
  .price-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ---- Signal-weight bar ------------------------------------------------*/
  .weight-bar {
    display: flex;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    margin: 0 0 16px;
    border: 1px solid var(--border);
  }
  .weight-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    font-family: var(--mono);
  }
  .weight-fundamental { background: rgba(90, 167, 255, 0.28); color: var(--primary-light); }
  .weight-technical { background: rgba(255, 185, 83, 0.28); color: var(--amber); }

  /* ---- Fan chart (fair-value ruler) --------------------------------------*/
  .fan-empty {
    font-size: 0.85rem;
  }
  .fan-outer {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fan-labels {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    width: 38px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--muted);
    padding-top: 2px;
    font-family: var(--mono);
  }
  .fan-labels span {
    height: 24px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
  }

  .fan-ticks {

    font-family: var(--mono);

  .assumption-strip {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 6px 18px;
    margin: 0 0 0 46px;
    padding-top: 12px;
    border-top: 1px solid var(--border);

  @media (max-width: 560px) {

  .assum-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);

  .assum-value {
    font-size: 0.8rem;
    font-family: var(--mono);
  }
  .assum-rationale .assum-value {
    font-family: var(--sans);

    display: flex;
    align-items: center;
    justify-content: space-between;

    flex-wrap: wrap;

  .tri-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-chip {
    display: flex;
    align-items: center;
    gap: 6px;

    font-size: 0.68rem;

<script>
(function () {
  "use strict";

  var raw = document.getElementById("report-data").textContent;
  var data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    document.getElementById("body").innerHTML =
      '<div class="card"><p>Report data could not be read.</p></div>';
    return;
  }

  var topnavEl = document.getElementById("topnav");
  var bodyEl = document.getElementById("body");

  // -------------------------------------------------------------------
  // Formatting helpers -- every one of these is None-safe: a missing/
  // non-numeric value always renders "--", never "None"/"NaN"/"undefined".
  // -------------------------------------------------------------------

  function isNum(v) {
    return v !== null && v !== undefined && v !== "" && !Number.isNaN(Number(v));
  }

  function escapeHtml(value) {
    var div = document.createElement("div");
    div.textContent = value === null || value === undefined ? "" : String(value);
    return div.innerHTML;
  }

  function fmtMoney(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "";
    var abs = Math.abs(num);
    var decimals = Number.isInteger(abs) ? 0 : 2;
    return sign + "$" + abs.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  // Renders a decimal fraction (0.08 -> "8%") -- used for sensitivity-table
  // axis labels (growth_values/dr_values, which arrive as decimal fractions).
  function fmtPct(v) {
    if (!isNum(v)) return "—";
    var pct = Number(v) * 100;
    var rounded = Math.round(pct * 10) / 10;
    var text = (Math.abs(rounded % 1) < 1e-9) ? rounded.toFixed(0) : rounded.toFixed(1);
    return text + "%";
  }

  // Renders an already-percentage number (e.g. 40.0, NOT a decimal fraction)
  // with no sign -- used for entry_plan's size_pct (interpret layer already
  // computes this as a percentage, not a decimal fraction).
  function fmtRawPct(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var rounded = Math.round(num * 10) / 10;
    var text = (Math.abs(rounded % 1) < 1e-9) ? rounded.toFixed(0) : rounded.toFixed(1);
    return text + "%";
  }

  // Renders an already-percentage number with an explicit +/- sign -- used
  // for scenario_returns' ret_lo_pct/ret_hi_pct.
  function fmtSignedPct(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "+";
    return sign + Math.abs(num).toFixed(1) + "%";
  }

  // Compact dollar formatting for large revenue figures (e.g. 25378308623.19
  // -> "$25.4B") -- used only by the hyper-grower "Fiyatın iması" line, where
  // fmtMoney's full-precision output would be unreadable.
  function fmtCompactMoney(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "";
    var abs = Math.abs(num);
    var scaled = abs, suffix = "";
    if (abs >= 1e12) { scaled = abs / 1e12; suffix = "T"; }
    else if (abs >= 1e9) { scaled = abs / 1e9; suffix = "B"; }
    else if (abs >= 1e6) { scaled = abs / 1e6; suffix = "M"; }
    else if (abs >= 1e3) { scaled = abs / 1e3; suffix = "K"; }
    return sign + "$" + scaled.toFixed(1) + suffix;
  }

  // Renders a decimal fraction in the Turkish percent-first convention
  // (0.481 -> "%48.1") -- matches the style already used by the engine's
  // own Turkish strings (e.g. hyper_growth_detail.reasons' "Gelir CAGR
  // %48.9"); fmtPct/fmtRawPct above are English-style (number-then-%) and
  // stay as-is for their existing (non-Turkish-prose) call sites.
  function fmtPctTr(v, decimals) {
    if (!isNum(v)) return "—";
    var pct = Number(v) * 100;
    var d = decimals === undefined ? 1 : decimals;
    return "%" + pct.toFixed(d);
  }

  // growth/discount_rate/note arrive as ready-made, human-readable strings
  // (often Turkish, e.g. "%8 büyüme") from every provider -- never reformat
  // or translate them, just guard against missing values.
  function safeText(v) {
    return v === null || v === undefined || v === "" ? "—" : String(v);
  }

  function hexToRgba(hex, alpha) {
    var h = hex.replace("#", "");
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  // Maps a verdict/label string onto one of four color buckets. Order
  // matters: the "YÜKSEK BEKLENTİ" (hyper-grower) check runs before the red
  // check so its distinct caution styling is never swallowed by a
  // coincidental substring match, red-bucket keywords are checked before
  // falling back to amber, so e.g. "AŞIRI ALIM" (contains "ALIM") is never
  // mistaken for something else, and unrecognized/empty text defaults to
  // the neutral amber bucket.
  // UCUZ/AŞIRI SATIM/UYUMLU -> green, MAKUL/NÖTR/KISMEN -> amber,
  // YÜKSEK BEKLENTİ FİYATLANMIŞ -> caution (distinct amber/orange),
  // PAHALI/AŞIRI ALIM/UYUMSUZ -> red.
  function bucketColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("UCUZ") !== -1 || s.indexOf("AŞIRI SATIM") !== -1 || s.indexOf("UYUMLU") !== -1) return "green";
    if (s.indexOf("YÜKSEK BEKLENTİ") !== -1 || s.indexOf("YUKSEK BEKLENTI") !== -1) return "caution";
    if (s.indexOf("PAHALI") !== -1 || s.indexOf("AŞIRI ALIM") !== -1 || s.indexOf("UYUMSUZ") !== -1) return "red";
    return "amber";
  }

  // Confidence-badge color: YÜKSEK -> green, ORTA -> amber, DÜŞÜK -> red.
  function confidenceColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("YÜKSEK") !== -1 || s.indexOf("YUKSEK") !== -1) return "green";
    if (s.indexOf("DÜŞÜK") !== -1 || s.indexOf("DUSUK") !== -1) return "red";
    return "amber";
  }

  var GAUGE_POSITION = { green: 10, amber: 50, caution: 72, red: 90 };
  var SCENARIO_LABEL = { bear: "BEAR", base: "BASE", bull: "BULL" };
  var SCENARIO_ORDER = ["bull", "base", "bear"];
  var SCENARIO_HEX = { bear: "#ffb4ab", base: "#5aa7ff", bull: "#4de082" };
  // Chrome-level labels for the raw triangulation signal codes
  // (valuation.triangulation.signals -- lowercase internal codes, not
  // free-text meant for direct display).
  var SIGNAL_LABEL = { ucuz: "CHEAP", makul: "FAIR", pahali: "EXPENSIVE", veri_yok: "NO DATA" };
  var HORIZON_SHORT = { "3m": "3M", "1y": "1Y", "5y": "5Y" };

  function signalLabel(s) {
    if (!s) return "—";
    return SIGNAL_LABEL[String(s).toLowerCase()] || String(s).toUpperCase();
  }

  function horizonLabel(v) {
    return HORIZON_SHORT[v] || String(v || "—").toUpperCase();
  }

  // -------------------------------------------------------------------
  // Shared horizon-toggle pill row. `values` is the ordered list of
  // horizon codes to show (defaults to the standard three); `interactive`
  // wires a click handler that calls `onSelect(value)` -- used by the
  // search-mode nav control, while the header's own toggle is a plain
  // read-only indicator of which horizon the current report reflects.
  // -------------------------------------------------------------------
  function horizonToggleHtml(values, current, interactive, idAttr) {
    var pills = (values || ["3m", "1y", "5y"]).map(function (v) {
      var active = v === current ? " active" : "";
      return '<button type="button" class="horizon-pill' + active + '" data-horizon="' +
        escapeHtml(v) + '">' + escapeHtml(horizonLabel(v)) + '</button>';
    }).join("");
    var idHtml = idAttr ? ' id="' + idAttr + '"' : "";
    return '<div class="horizon-toggle' + (interactive ? " interactive" : "") + '"' + idHtml + '>' + pills + '</div>';
  }

  // ===================================================================
  // Section builders -- shared by both modes via renderBody().
  // ===================================================================

  // ---- Header card ------------------------------------------------------
  function headerCardHtml(payload) {
    var priceText = fmtMoney(payload.price);
    var sourceNote = "SEC EDGAR + Stooq" + (payload.as_of ? " · as of " + escapeHtml(payload.as_of) : "");
    var entityHtml = payload.entity_name
      ? '<span class="entity-name">' + escapeHtml(payload.entity_name) + '</span>'
      : "";
    return (
      '<div class="card">' +
        '<div class="header-row">' +
          '<div class="header-left">' +
            '<div class="ticker-line">' +
              '<span class="ticker">' + escapeHtml(payload.ticker || "—") + '</span>' +
              entityHtml +
            '</div>' +
            '<div class="source-note">' + sourceNote + '</div>' +
          '</div>' +
          '<div class="header-right">' +
            '<div class="price-value">' + priceText + '</div>' +
            horizonToggleHtml(["3m", "1y", "5y"], payload.horizon, false) +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // ---- Signal-weight bar --------------------------------------------------
  function weightBarHtml(weights) {
    var w = weights || {};
    var f = typeof w.fundamental === "number" ? w.fundamental : 0.5;
    var t = typeof w.technical === "number" ? w.technical : 0.5;
    var fPct = Math.round(f * 100);
    var tPct = Math.round(t * 100);
    return (
      '<div class="weight-bar">' +
        '<div class="weight-seg weight-fundamental" style="width:' + fPct + '%;">FUNDAMENTAL ' + fPct + '%</div>' +
        '<div class="weight-seg weight-technical" style="width:' + tPct + '%;">TECHNICAL ' + tPct + '%</div>' +
      '</div>'
    );
  }

  // ---- Fair-value fan chart ------------------------------------------------
  // Horizontal-ruler price scale per scenario band: min(bear.lo, price)*0.95
  // .. max(bull.hi, price)*1.05, falling back to whatever numeric values
  // *are* available when bear/bull/price are partially missing, so the
  // chart still renders something useful rather than an all-or-nothing
  // empty state.
  function computeFanScale(fv, price) {
    var bear = fv.bear || {}, bull = fv.bull || {}, base = fv.base || {};
    var bearLo = isNum(bear.lo) ? Number(bear.lo) : null;
    var bullHi = isNum(bull.hi) ? Number(bull.hi) : null;
    var p = isNum(price) ? Number(price) : null;
    var fallback = [bearLo, bullHi, p, base.lo, base.hi, bear.hi, bull.lo]
      .map(function (v) { return isNum(v) ? Number(v) : null; })
      .filter(function (v) { return v !== null; });
    if (fallback.length === 0) return null;

    var lowAnchor = (bearLo !== null && p !== null) ? Math.min(bearLo, p) :
      (bearLo !== null ? bearLo : (p !== null ? p : Math.min.apply(null, fallback)));
    var highAnchor = (bullHi !== null && p !== null) ? Math.max(bullHi, p) :
      (bullHi !== null ? bullHi : (p !== null ? p : Math.max.apply(null, fallback)));

    var minV = lowAnchor * 0.95;
    var maxV = highAnchor * 1.05;
    if (minV > maxV) { var t = minV; minV = maxV; maxV = t; }
    if (minV === maxV) {
      var bump = Math.max(1, Math.abs(minV) * 0.1);
      minV -= bump;
      maxV += bump;
    }
    return { minV: minV, maxV: maxV };
  }

  // ---- Hyper-grower "Fiyatın iması" + expected-value note (Milestone E) --
  // Only rendered when valuation.hyper_growth is true; every existing
  // non-hyper render path is unaffected since this returns "" otherwise.
  // Degrades through the three tiers HYPER_SPEC.md Sec.6 describes,
  // depending on which implied fields the engine's reverse bisection
  // managed to solve for (it can fail to converge for either growth or
  // margin independently) -- never renders "None"/"NaN".
  function hyperGrowthExtraHtml(valuation) {
    if (!valuation || !valuation.hyper_growth) return "";
    var detail = valuation.hyper_growth_detail || {};
    var implied = detail.implied || {};
    var impliedText;
    if (isNum(implied.growth) && isNum(implied.revenue_10y)) {
      var revText = fmtCompactMoney(implied.revenue_10y);
      var multText = isNum(implied.revenue_multiple) ? Number(implied.revenue_multiple).toFixed(1) : "—";
      impliedText = "Fiyatın iması: 10 yılda " + revText + " revenue (bugünün " + multText + " katı), ~" +
        fmtPctTr(implied.growth) + " büyüme, " + fmtPctTr(implied.steady_state_margin) + " olgun FCF marjı";
      if (isNum(implied.tam_share)) {
        impliedText += " = TAM'ın " + fmtPctTr(implied.tam_share) + "'si";
      }
    } else if (isNum(implied.steady_state_margin)) {
      impliedText = "Fiyatın iması: %40 büyümede bile ~" + fmtPctTr(implied.steady_state_margin) +
        " olgun FCF marjı gerektiriyor (makul büyüme aralığının çok üstünde)";
    } else {
      impliedText = "Fiyat, makul büyüme aralığının belirgin şekilde dışında bir beklenti ima ediyor.";
    }

    var evHtml = isNum(detail.expected_value)
      ? '<div class="hyper-ev-line">Olasılık-ağırlıklı beklenen değer: ' + fmtMoney(detail.expected_value) + '</div>'
      : "";

    return (
      '<div class="hyper-note">' +
        '<div class="hyper-implied-line">' + escapeHtml(impliedText) + '</div>' +
        evHtml +
      '</div>'
    );
  }

  function fanChartCardHtml(result, price) {
    var fv = result.fair_value_range || {};
    var scale = computeFanScale(fv, price);
    var innerHtml;
    if (!scale) {
      innerHtml = '<div class="fan-empty muted">Not enough data for a valuation scenario.</div>';
    } else {
      var minV = scale.minV, maxV = scale.maxV;
      var span = (maxV - minV) || 1;
      var pctOf = function (v) { return ((v - minV) / span) * 100; };

      var labelsHtml = SCENARIO_ORDER.map(function (k) {
        return "<span>" + SCENARIO_LABEL[k] + "</span>";
      }).join("");

      var rowsHtml = SCENARIO_ORDER.map(function (key) {
        var b = fv[key];
        var bandHtml = "";
        if (b && isNum(b.lo) && isNum(b.hi)) {
          var left = pctOf(Number(b.lo));
          var width = Math.max(0.6, pctOf(Number(b.hi)) - left);
          var hex = SCENARIO_HEX[key];
          bandHtml =
            '<div class="fan-band" style="left:' + left + '%; width:' + width + '%; ' +
            'background:' + hexToRgba(hex, 0.35) + '; border-color:' + hex + ';"></div>';
        }
        return '<div class="fan-row-track" data-scenario="' + key + '">' + bandHtml + '</div>';
      }).join("");

      var markerHtml = "";
      if (isNum(price)) {
        var markerLeft = Math.min(99, Math.max(0, pctOf(Number(price))));
        markerHtml =
          '<div class="fan-marker" style="left:' + markerLeft + '%;">' +
            '<span class="fan-marker-price">▼ ' + fmtMoney(price) + '</span>' +
            '<span class="fan-marker-arrow">▼</span>' +
          '</div>';
      }

      innerHtml =
        '<div class="fan-outer">' +
          '<div class="fan-labels">' + labelsHtml + '</div>' +
          '<div class="fan-plot">' + rowsHtml + markerHtml + '</div>' +
        '</div>' +
        '<div class="fan-ticks">' +
          '<span>' + fmtMoney(minV) + '</span>' +
          '<span>' + fmtMoney((minV + maxV) / 2) + '</span>' +
          '<span>' + fmtMoney(maxV) + '</span>' +
        '</div>' +
        '<div class="assumption-strip" id="assumption-strip">' +
          '<div class="assum-col"><div class="assum-label">Scenario</div><div class="assum-value" id="assum-scenario">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Growth</div><div class="assum-value" id="assum-growth">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Discount</div><div class="assum-value" id="assum-discount">—</div></div>' +
          '<div class="assum-col assum-rationale"><div class="assum-label">Rationale</div><div class="assum-value" id="assum-rationale">—</div></div>' +
        '</div>';
    }
    innerHtml += hyperGrowthExtraHtml(result.valuation);
    return '<div class="card"><div class="card-title">Fair Value Fan Chart</div>' + innerHtml + '</div>';
  }

  // Updates the assumption strip's four cells for one scenario key
  // (bear/base/bull) and highlights the matching fan row -- called once on
  // initial render (defaulting to "base") and again on every row click.
  function selectFanScenario(fv, key, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    rows.forEach(function (r) {
      r.classList.toggle("selected", r.getAttribute("data-scenario") === key);
    });
    var b = (fv || {})[key] || {};
    var scenarioEl = document.getElementById("assum-scenario");
    var growthEl = document.getElementById("assum-growth");
    var discountEl = document.getElementById("assum-discount");
    var rationaleEl = document.getElementById("assum-rationale");
    if (!scenarioEl) return;
    scenarioEl.textContent = SCENARIO_LABEL[key] || String(key || "—").toUpperCase();
    growthEl.textContent = safeText(b.growth);
    discountEl.textContent = safeText(b.discount_rate);
    var ret = (scenarioReturns || {})[key];
    var rationale = safeText(b.note);
    if (ret && (isNum(ret.ret_lo_pct) || isNum(ret.ret_hi_pct))) {
      var retText = "Return " + fmtSignedPct(ret.ret_lo_pct) + " to " + fmtSignedPct(ret.ret_hi_pct);
      rationale = rationale === "—" ? retText : rationale + " · " + retText;
    }
    rationaleEl.textContent = rationale;
  }

  function wireFanChart(fv, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    if (rows.length === 0) return;
    rows.forEach(function (r) {
      r.addEventListener("click", function () {
        selectFanScenario(fv, r.getAttribute("data-scenario"), scenarioReturns);
      });
    });
    selectFanScenario(fv, "base", scenarioReturns);
  }

  // ---- Triangulation card ---------------------------------------------
  // Only rendered when result.valuation.triangulation is present; older/
  // simpler result dicts simply skip this card.
  function triangulationRowHtml(valuation, confidenceOverride) {
    var tri = (valuation || {}).triangulation;
    if (!tri) return "";
    var signals = tri.signals || {};
    var direction = tri.direction;
    var confidence = confidenceOverride || tri.confidence;

    // For financial/reit sectors the DCF slot is really the P/B×ROE anchor
    // (dcf.enabled === false in that case) -- label it accordingly.
    var dcfLabel = (valuation.dcf && valuation.dcf.enabled === false) ? "P/B×ROE" : "DCF";
    var methods = [
      { key: "dcf", label: dcfLabel },
      { key: "reverse_dcf", label: "REVERSE DCF" },
      { key: "multiples", label: "MULTIPLES" },
    ];

    var chips = methods.map(function (m) {
      var sig = signals[m.key];
      var icon = "–", cls = "tri-muted";
      if (sig && String(sig).toLowerCase() !== "veri_yok") {
        if (direction && String(direction).toLowerCase() !== "belirsiz" &&
            String(sig).toLowerCase() === String(direction).toLowerCase()) {
          icon = "✓";
          cls = "tri-agree";
        } else {
          icon = "✗";
          cls = "tri-disagree";
        }
      }
      return (
        '<div class="tri-chip ' + cls + '">' +
          '<span class="tri-icon">' + icon + '</span>' +
          '<span class="tri-label">' + escapeHtml(m.label) + '</span>' +
          '<span class="tri-signal">' + escapeHtml(signalLabel(sig)) + '</span>' +
        '</div>'
      );
    }).join("");

    var confColor = confidenceColor(confidence);
    return (
      '<div class="card">' +
        '<div class="card-title">Triangulation</div>' +
        '<div class="triangulation-row">' +
          '<div class="tri-chips">' + chips + '</div>' +
          '<span><span class="badge-label">Confidence</span><span class="badge badge-' + confColor + '">' +
            escapeHtml(confidence || "—") + '</span></span>' +
        '</div>' +
      '</div>'
    );
  }

  // ---- Verdict cards (fundamental/technical/profile fit) ------------------
  function verdictCardHtml(label, verdictText, noteText) {
    var color = bucketColor(verdictText);
    var pos = GAUGE_POSITION[color];
    return (
      '<div class="card">' +
        '<div class="card-title">' + escapeHtml(label) + '</div>' +
        '<div class="verdict-card-body">' +
          '<div class="gauge"><div class="gauge-marker" style="left:' + pos + '%;">▲</div></div>' +
          '<div><span class="badge badge-' + color + '">' + escapeHtml(verdictText || "—") + '</span></div>' +
          '<div class="verdict-note">' + escapeHtml(noteText || "—") + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // ---- Sensitivity analysis card -------------------------------------------
  // Only rendered when result.valuation.sensitivity is present.
  function sensitivityTableHtml(sens) {
    if (!sens || !sens.matrix || !sens.matrix.length) return "";
    var growthValues = sens.growth_values || [];
    var drValues = sens.dr_values || [];
    var matrix = sens.matrix || [];
    var baseRow = Math.floor(matrix.length / 2);
    var baseCol = Math.floor((matrix[0] || []).length / 2);

    var headerCells = drValues.map(function (d) {
      return '<th class="sens-col-h">' + fmtPct(d) + '</th>';
    }).join("");

    var bodyRows = matrix.map(function (rowArr, ri) {
      var cells = (rowArr || []).map(function (val, ci) {
        var isBase = ri === baseRow && ci === baseCol;
        return '<td class="sens-cell' + (isBase ? " sens-base" : "") + '">' + fmtMoney(val) + '</td>';
      }).join("");
      var rowLabel = growthValues[ri] !== undefined ? fmtPct(growthValues[ri]) : "—";
      return '<tr><th class="sens-row-h">' + rowLabel + '</th>' + cells + '</tr>';
    }).join("");

    var uncertaintyTag = sens.high_uncertainty
      ? '<span class="uncertainty-tag">High Uncertainty</span>'
      : "";

    return (
      '<div class="card">' +
        '<div class="card-title">Sensitivity Analysis' + (uncertaintyTag ? " " + uncertaintyTag : "") + '</div>' +
        '<table class="sensitivity-table">' +
          '<thead><tr><th></th>' + headerCells + '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
        '</table>' +
        '<div class="sens-axis-note">Rows: growth · Columns: discount rate · center cell = base case</div>' +
      '</div>'
    );
  }

  // ---- Staged entry plan card ----------------------------------------------
  // Only rendered when result.entry_plan is present; an empty list means the
  // planning layer found no usable mechanical trigger levels (missing price
  // or structural reference levels), not an error -- degrades to a plain
  // sentence rather than an empty table.
  function entryPlanHtml(entryPlan) {
    var sub = '<div class="card-sub">These levels are a mechanical reference -- not a buy order or investment advice.</div>';
    if (!entryPlan || entryPlan.length === 0) {
      return (
        '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<p class="empty-note">Not enough price or structural reference levels (bear/base/bull range, 52-week low, SMA50/SMA200) to build a mechanical tranche plan.</p></div>'
      );
    }
    var rows = entryPlan.map(function (t) {
      var zone = t.price_zone || {};
      var mainRow =
        '<tr>' +
          '<td>' + escapeHtml(isNum(t.n) ? String(t.n) : "—") + '</td>' +
          '<td class="entry-trigger">' + escapeHtml(t.trigger || "—") + '</td>' +
          '<td>' + fmtMoney(zone.lo) + '–' + fmtMoney(zone.hi) + '</td>' +
          '<td>' + fmtRawPct(t.size_pct) + '</td>' +
          '<td>' + fmtMoney(t.invalidation) + '</td>' +
          '<td>' + fmtMoney(t.target) + '</td>' +
          '<td>' + (isNum(t.rr) ? Number(t.rr).toFixed(1) + ":1" : "—") + '</td>' +
        '</tr>';
      var noteRow = t.note
        ? '<tr class="entry-note-row"><td colspan="7">' + escapeHtml(t.note) + '</td></tr>'
        : "";
      return mainRow + noteRow;
    }).join("");
    return (
      '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<table class="sensitivity-table entry-plan-table">' +
          '<thead><tr>' +
            '<th>#</th><th>Trigger</th><th>Price Zone</th><th>Size</th>' +
            '<th>Invalidation</th><th>Target</th><th>R:R</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>'
    );
  }

  // ---- Stop-adding signals card ---------------------------------------
  // An empty list is the common case (no signal active), not an error.
  function stopAddingHtml(stopAdding) {
    if (!stopAdding || stopAdding.length === 0) {
      return (
        '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<p class="empty-note">No active stop-adding signal right now.</p></div>'
      );
    }
    var items = stopAdding.map(function (s) {
      return '<li>' + escapeHtml(s.message || s.code || "") + '</li>';
    }).join("");
    return (
      '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Thesis metric card ---------------------------------------------
  // result.thesis_metric is always a dict (never null) per planning.py, but
  // every field inside it may still be None -- degrades to "not available"
  // rather than "None"/blank.
  function thesisMetricHtml(tm) {
    if (!tm) return "";
    var name = tm.name ? escapeHtml(tm.name) : "Thesis Metric";
    var valueText = tm.latest_value ? escapeHtml(tm.latest_value) : "not available";
    var trendColor = "amber";
    if (tm.trend) {
      var s = String(tm.trend).toLowerCase();
      if (s.indexOf("iyileş") !== -1 || s.indexOf("iyiles") !== -1) trendColor = "green";
      else if (s.indexOf("boz") !== -1) trendColor = "red";
    }
    var trendHtml = tm.trend
      ? ' <span class="badge badge-' + trendColor + '">' + escapeHtml(tm.trend) + '</span>'
      : "";
    var rationaleHtml = tm.rationale
      ? '<p class="thesis-rationale">' + escapeHtml(tm.rationale) + '</p>'
      : "";
    return (
      '<div class="card"><div class="card-title">Thesis Metric</div>' +
        '<p class="thesis-metric-line">' + name + ': <b>' + valueText + '</b>' + trendHtml + '</p>' +
        rationaleHtml +
      '</div>'
    );
  }

  // ---- Scenario returns card -----------------------------------------------
  // None-safe: a scenario with no computable return renders "—" rather than
  // "None". Returns "" (card omitted) when the field is entirely absent.
  function scenarioReturnsListHtml(scenarioReturns) {
    if (!scenarioReturns) return "";
    var rows = SCENARIO_ORDER.map(function (key) {
      var b = scenarioReturns[key] || {};
      var loOk = isNum(b.ret_lo_pct), hiOk = isNum(b.ret_hi_pct);
      var text = (loOk || hiOk) ? (fmtSignedPct(b.ret_lo_pct) + " to " + fmtSignedPct(b.ret_hi_pct)) : "—";
      return (
        '<div class="scen-ret-row">' +
          '<span class="scen-ret-name">' + escapeHtml(SCENARIO_LABEL[key] || key) + '</span>' +
          '<span class="scen-ret-value">' + text + '</span>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">Scenario Returns</div>' +
        '<div class="scenario-returns-list">' + rows + '</div>' +
      '</div>'
    );
  }

  // ---- Red flags card (only if flags exist) --------------------------------
  function flagsCardHtml(flags) {
    if (!flags || flags.length === 0) return "";
    var items = flags.map(function (f) {
      return (
        '<li>' + escapeHtml(f.message || f.code || "") +
        (f.detail ? '<span class="item-detail">' + escapeHtml(f.detail) + '</span>' : '') +
        '</li>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">⚠ Red Flags</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Footer analysis (catalyst + summary) --------------------------------
  // No fabricated "Recommendation: ..." line -- only the real catalyst/
  // summary fields the pipeline actually produced.
  function footerAnalysisHtml(result) {
    var catalyst = result.catalyst;
    var summary = result.summary;
    var catalystHtml = catalyst
      ? '<p class="catalyst-line"><span class="badge-label">Catalyst</span>' + escapeHtml(catalyst) + '</p>'
      : "";
    return (
      '<div class="card">' +
        catalystHtml +
        '<p class="summary-text">' + escapeHtml(summary || "No summary available.") + '</p>' +
      '</div>'
    );
  }

  function globalFooterHtml() {
    return (
      '<div class="global-footer">' +
        '© Verdict Analysis Systems · SEC EDGAR + price data · educational use only, not investment advice.' +
      '</div>'
    );
  }

  // ---- Error card (result.error) -------------------------------------------
  function errorCardHtml(payload, result) {
    var errorLabel = result.error ? " (" + escapeHtml(String(result.error)) + ")" : "";
    return (
      headerCardHtml(payload) +
      '<div class="card">' +
        '<div class="error-box">' +
          '<strong>Analysis unavailable' + errorLabel + '</strong>' +
          '<p>' + escapeHtml(result.summary || "An unknown error occurred.") + '</p>' +
        '</div>' +
      '</div>' +
      globalFooterHtml()
    );
  }

  // ===================================================================
  // renderBody -- the single body-rendering function shared by report
  // mode (called once, directly on `data`) and search mode (called again
  // on every successful /api/analyze fetch, on a reshaped payload).
  // `payload` shape: {ticker, horizon, price, as_of, result, metrics,
  // technical, red_flags, entity_name}.
  // ===================================================================
  function renderBody(payload) {
    var result = payload.result || {};

    if (result.error) {
      bodyEl.innerHTML = errorCardHtml(payload, result);
      return;
    }

    var fv = result.fair_value_range || {};
    var profileFit = result.profile_fit || {};
    var technical = payload.technical || {};
    var technicalDetail = technical.verdict_detail || null;
    // result.valuation (SPEC.md Sec.11) is the richer engine payload; it's
    // absent for older callers or when phase-2 interpret() never ran (e.g.
    // an LLM error) -- the triangulation/sensitivity cards simply don't
    // render in that case, degrading to the simpler pre-valuation card set.
    var valuation = result.valuation || null;

    var html =
      headerCardHtml(payload) +
      weightBarHtml(result._weights) +
      fanChartCardHtml(result, payload.price) +
      (valuation ? triangulationRowHtml(valuation, result.confidence) : "") +
      verdictCardHtml("Fundamental", result.fundamental_verdict, result.horizon_note) +
      verdictCardHtml("Technical", result.technical_verdict, technicalDetail || "Price data unavailable.") +
      verdictCardHtml("Profile Fit", profileFit.verdict, profileFit.reason) +
      (valuation ? sensitivityTableHtml(valuation.sensitivity) : "") +
      entryPlanHtml(result.entry_plan) +
      stopAddingHtml(result.stop_adding) +
      thesisMetricHtml(result.thesis_metric) +
      scenarioReturnsListHtml(result.scenario_returns) +
      flagsCardHtml(payload.red_flags) +
      footerAnalysisHtml(result) +
      globalFooterHtml();

    bodyEl.innerHTML = html;
    wireFanChart(fv, result.scenario_returns);
  }

  // ===================================================================
  // Report mode: nav = brand + generated date; body renders immediately
  // from the baked payload.
  // ===================================================================
  function renderReportMode() {
    document.title = String(data.ticker || "") + " · " + String(data.horizon || "") + " · Verdict Terminal";
    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        (data.generated_on ? '<span class="nav-date">Generated ' + escapeHtml(data.generated_on) + '</span>' : "") +
      '</div>';
    renderBody(data);
  }

  // ===================================================================
  // Search mode: nav carries live ticker/horizon/provider controls; the
  // body starts in a prompt state and is replaced by renderBody() (the
  // exact same function report mode uses) once /api/analyze succeeds.
  // ===================================================================
  function renderSearchMode() {
    document.title = "Verdict Terminal";
    var horizons = data.horizons || [["3m", "3m"], ["1y", "1y"], ["5y", "5y"]];
    var providers = data.providers || [];
    var state = {
      horizon: data.default_horizon || "1y",
      provider: data.default_provider || (providers[0] && providers[0][0]) || "",
    };

    var providerOptions = providers.map(function (p) {
      var sel = p[0] === state.provider ? " selected" : "";
      return '<option value="' + escapeHtml(p[0]) + '"' + sel + '>' + escapeHtml(p[1]) + '</option>';
    }).join("");

    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        '<div class="nav-controls">' +
          '<input type="text" class="ticker-input" id="ticker-input" placeholder="TICKER" autocomplete="off" />' +
          horizonToggleHtml(horizons.map(function (h) { return h[0]; }), state.horizon, true, "nav-horizon-toggle") +
          '<select class="provider-select" id="provider-select">' + providerOptions + '</select>' +
          '<button type="button" class="analyze-btn" id="analyze-btn">Analyse</button>' +
        '</div>' +
      '</div>';

    bodyEl.innerHTML = '<div class="card"><div class="empty-state">Enter a ticker above and press Analyse to generate a Verdict Terminal report.</div></div>';

    var tickerInput = document.getElementById("ticker-input");
    var providerSelect = document.getElementById("provider-select");
    var analyzeBtn = document.getElementById("analyze-btn");
    var horizonToggleEl = document.getElementById("nav-horizon-toggle");

    horizonToggleEl.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".horizon-pill") : null;
      if (!btn) return;
      state.horizon = btn.getAttribute("data-horizon");
      horizonToggleEl.querySelectorAll(".horizon-pill").forEach(function (p) {
        p.classList.toggle("active", p === btn);
      });
    });

    providerSelect.addEventListener("change", function () {
      state.provider = providerSelect.value;
    });

    function showError(message) {
      bodyEl.innerHTML = '<div class="error-banner">' + escapeHtml(message) + '</div>';
    }

    function runAnalyze() {
      var ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) {
        showError("Please enter a ticker symbol.");
        return;
      }
      analyzeBtn.disabled = true;
      tickerInput.disabled = true;
      bodyEl.innerHTML =
        '<div class="card"><div class="loading-state"><span class="spinner"></span>' +
        'Running analysis for ' + escapeHtml(ticker) + ' -- this can take 10-40 seconds...</div></div>';

      fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ticker: ticker,
          years: 12,
          horizon: state.horizon,
          provider: state.provider,
          no_cache: false,
        }),
      })
        .then(function (response) {
          return response.json().then(function (json) {
            return { ok: response.ok, json: json };
          });
        })
        .then(function (res) {
          if (!res.ok || !res.json || !res.json.ok) {
            var message = (res.json && res.json.error) || "Failed to run analysis.";
            showError(message);
            return;
          }
          var json = res.json;
          var technical = json.technical || null;
          var reportPayload = {
            ticker: ticker,
            horizon: state.horizon,
            price: (json.metrics || {}).price,
            as_of: technical ? technical.as_of : null,
            result: json.analysis || {},
            metrics: json.metrics || {},
            technical: technical || {},
            red_flags: json.red_flags || [],
            entity_name: json.name || null,
          };
          renderBody(reportPayload);
        })
        .catch(function (err) {
          showError("Network error: " + err.message);
        })
        .finally(function () {
          analyzeBtn.disabled = false;
          tickerInput.disabled = false;
        });
    }

    analyzeBtn.addEventListener("click", runAnalyze);
    tickerInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        runAnalyze();
      }
    });
  }

  function render() {
    if (data.mode === "search") {
      renderSearchMode();
    } else {
      renderReportMode();
    }
  }

  render();
})();
</script>

</body>
</html>
