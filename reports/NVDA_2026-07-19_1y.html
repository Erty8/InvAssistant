        sentence1 += ", son 1 ayda " + signedPct(m.r1);
        if (m.accelWord) sentence1 += " — momentum " + m.accelWord.toLowerCase();
      }
      sentence1 += ".";
    }

    var oscParts = [];
    if (m.rsi !== null) oscParts.push("RSI " + Math.round(m.rsi));
    if (m.mh !== null || m.mc) {
      var macdWord = m.mh > 0 ? "pozitif" : (m.mh < 0 ? "negatif" : "nötr");
      macdWord += m.mc === "bullish" ? " (yukarı kesişim)" : (m.mc === "bearish" ? " (aşağı kesişim)" : "");
      oscParts.push("MACD " + macdWord);
    }
    var sentence2 = oscParts.length ? oscParts.join(", ") + "." : "";

    var full = [sentence1, sentence2].filter(function (s) { return s; }).join(" ");
    return full || "Momentum için yeterli veri yok.";
  }

  function technicalCardHtml(technical, verdictText) {
    var t = technical || {};
    // No usable indicators at all -> fall back to the plain verdict card.
    if (!isNum(t.rsi14) && !isNum(t.price)) {
      return verdictCardHtml("Technical", verdictText, t.verdict_detail || "Price data unavailable.");
    }
    var color = bucketColor(verdictText);

    // ---- Trend regime: price vs SMA50/SMA200 (the two trend lines) --------
    var p = isNum(t.price) ? Number(t.price) : null;
    var s50 = isNum(t.sma50) ? Number(t.sma50) : null;
    var s200 = isNum(t.sma200) ? Number(t.sma200) : null;
    var above50 = (p !== null && s50 !== null) ? p >= s50 : null;
    var above200 = (p !== null && s200 !== null) ? p >= s200 : null;
    var regime;
    if (above50 === true && above200 === true) regime = { label: "YÜKSELİŞ TRENDİ", cls: "regime-up", dir: "up", arrow: "↑" };
    else if (above50 === false && above200 === false) regime = { label: "DÜŞÜŞ TRENDİ", cls: "regime-down", dir: "down", arrow: "↓" };
    else if (above50 !== null || above200 !== null) regime = { label: "GEÇİŞ / NÖTR", cls: "regime-neutral", dir: "flat", arrow: "→" };
    else regime = { label: "—", cls: "regime-neutral", dir: "flat", arrow: "" };

    var evi = [];
    if (s50 !== null && s200 !== null) {
      var lead = (above50 === above200)
        ? (above50 ? "Fiyat iki ortalamanın da üstünde" : "Fiyat iki ortalamanın da altında")
        : "Fiyat ortalamalar arasında";
      evi.push(lead + " (SMA50 " + fmtMoney(s50) + ", SMA200 " + fmtMoney(s200) + ")");
    } else if (s50 !== null) {
      evi.push("SMA50 " + fmtMoney(s50) + (above50 ? " üstünde" : " altında"));
    }
    if (t.golden_cross) evi.push("altın kesişim");
    else if (t.death_cross) evi.push("ölüm kesişimi");
    if (isNum(t.macd_hist)) evi.push("MACD " + (t.macd_hist > 0 ? "bullish" : t.macd_hist < 0 ? "bearish" : "flat"));
    if (t.obv_trend) evi.push("OBV " + (t.obv_trend === "up" ? "toplama" : t.obv_trend === "down" ? "dağıtım" : "yatay"));

    var regimeHtml =
      '<div class="trend-regime">' +
        '<span class="regime-badge ' + regime.cls + '">' + regime.arrow + ' ' + regime.label + '</span>' +
        (isNum(t.rsi14) ? '<span class="regime-sub">RSI ' + Math.round(Number(t.rsi14)) + '</span>' : '') +
      '</div>' +
      (evi.length ? '<div class="regime-evi">' + escapeHtml(evi.join(" · ")) + '</div>' : '');

    // ---- Trigger ladder: every S/R level as a "close above/below -> X" rule.
    var res = (t.resistance_levels || []).filter(function (z) { return isNum(z.price) || isNum(z.low); });
    var sup = (t.support_levels || []).filter(function (z) { return isNum(z.price) || isNum(z.low); });

    function absDist(lvl) { return isNum(lvl.dist_pct) ? Math.abs(Number(lvl.dist_pct)) : Infinity; }
    function nearestOf(list) {
      var best = null;
      list.forEach(function (l) { if (!best || absDist(l) < absDist(best)) best = l; });
      return best;
    }
    var nearRes = nearestOf(res), nearSup = nearestOf(sup);
    // The PRIMARY trigger is the one that flips the current regime: in a
    // downtrend/neutral that's the nearest resistance (a close above breaks the
    // downtrend); in an uptrend it's the nearest support (a close below ends it).
    // Falls back to the other side when the preferred side has no level.
    var nearest;
    if (regime.dir === "up") {
      nearest = nearSup ? { lvl: nearSup, side: "sup" } : (nearRes ? { lvl: nearRes, side: "res" } : null);
    } else {
      nearest = nearRes ? { lvl: nearRes, side: "res" } : (nearSup ? { lvl: nearSup, side: "sup" } : null);
    }

    var calloutHtml = "";
    if (nearest) {
      var nl = nearest.lvl;
      if (nearest.side === "res") {
        calloutHtml = '<div class="trend-callout callout-up"><span class="co-arrow">▲</span><div>' +
          'Sıradaki tetik: <b>' + srRange(nl) + ' üstünde günlük kapanış</b> (' + techSigned(nl.dist_pct) + ') → ' +
          escapeHtml(resistanceEffect(nl, regime.dir)) + '.</div></div>';
      } else {
        calloutHtml = '<div class="trend-callout callout-down"><span class="co-arrow">▼</span><div>' +
          'Sıradaki tetik: <b>' + srRange(nl) + ' altında günlük kapanış</b> (' + techSigned(nl.dist_pct) + ') → ' +
          escapeHtml(supportEffect(nl, regime.dir)) + '.</div></div>';
      }
    }

    function trigRow(side, lvl) {
      var s = srStrength(lvl);
      var isNear = nearest && nearest.side === side && nearest.lvl === lvl;
      var effect = side === "res" ? resistanceEffect(lvl, regime.dir) : supportEffect(lvl, regime.dir);
      var verb = side === "res" ? "Üstünde kapanış" : "Altında kapanış";
      var arrow = side === "res" ? "▲" : "▼";
      return '<div class="trig-row trig-' + (side === "res" ? "up" : "down") + (isNear ? " trig-nearest" : "") + '">' +
        '<span class="trig-arrow">' + arrow + '</span>' +
        '<span class="trig-price">' + srRange(lvl) + '</span>' +
        '<span class="sr-strength-badge ' + s.cls + '">' + s.label + '</span>' +
        '<span class="trig-rule"><b>' + verb + '</b> → ' + escapeHtml(effect) +
          ' <span class="trig-reason">(' + escapeHtml(srReason(lvl, false)) + ')</span></span>' +
        '<span class="trig-dist">' + techSigned(lvl.dist_pct) + '</span>' +
      '</div>';
    }

    var ladderHtml;
    if (res.length || sup.length) {
      var rows = res.slice().reverse().map(function (r) { return trigRow("res", r); });
      rows.push(
        '<div class="trig-row trig-now">' +
          '<span class="trig-arrow">◆</span>' +
          '<span class="trig-price">' + fmtMoney(t.price) + '</span>' +
          '<span class="trig-now-tag">ŞU AN</span>' +
          '<span class="trig-rule" style="color:var(--muted)">' + escapeHtml(regime.label.toLowerCase()) + '</span>' +
        '</div>'
      );
      sup.forEach(function (s) { rows.push(trigRow("sup", s)); });
      ladderHtml = '<div class="trigger-ladder">' + rows.join("") + '</div>';
    } else {
      ladderHtml = '<div class="tech-empty">Trend tetikleri için yeterli fiyat geçmişi yok.</div>';
    }

    // ---- Collapsed detail: momentum synthesis, then Trend & Durum ----------
    var rsiHtml = "";
    if (isNum(t.rsi14)) {
      var pos = Math.max(0, Math.min(100, Number(t.rsi14)));
      rsiHtml =
        '<div class="rsi-row">' +
          '<span class="rsi-side">RSI 14</span>' +
          '<div class="rsi-gauge"><div class="rsi-gauge-marker" style="left:' + pos + '%;"></div></div>' +
          '<span class="rsi-val">' + Math.round(Number(t.rsi14)) + '</span>' +
        '</div>';
    }
    function tile(label, valHtml) {
      return '<div class="tech-stat"><div class="tech-stat-label">' + label +
        '</div><div class="tech-stat-val">' + valHtml + '</div></div>';
    }

    // Momentum row: only the return/MACD tiles -- trend, volatility and
    // volume tiles moved to the "Trend & Durum" subsection below so this
    // section can be read as a focused momentum readout.
    var momentumTiles = [
      tile("1M", techSigned(t.return_1m_pct)),
      tile("3M", techSigned(t.return_3m_pct)),
      tile("6M", techSigned(t.return_6m_pct)),
    ];
    if (isNum(t.macd_hist)) {
      var macdState = Number(t.macd_hist) > 0
        ? '<span class="tech-pos">Bullish</span>'
        : (Number(t.macd_hist) < 0 ? '<span class="tech-neg">Bearish</span>' : "Flat");
      if (t.macd_cross === "bullish") macdState += ' <span class="tech-pos">· ×↑</span>';
      else if (t.macd_cross === "bearish") macdState += ' <span class="tech-neg">· ×↓</span>';
      momentumTiles.push(tile("MACD", macdState));
    }

    var trendTiles = [
      tile("vs SMA50", techSigned(t.dist_sma50_pct)),
      tile("vs SMA200", techSigned(t.dist_sma200_pct)),
    ];
    if (isNum(t.range_position_pct)) trendTiles.push(tile("52W Range", Math.round(Number(t.range_position_pct)) + "%"));
    if (isNum(t.volatility_20d)) trendTiles.push(tile("Volatility", Math.round(Number(t.volatility_20d) * 100) + "%"));
    if (isNum(t.rel_volume)) {
      var rv = Number(t.rel_volume);
      var rvCls = rv >= 1.5 ? "tech-pos" : (rv < 0.7 ? "tech-neg" : "");
      trendTiles.push(tile("Rel Vol", '<span class="' + rvCls + '">' + rv.toFixed(1) + '×</span>'));
    }
    if (t.obv_trend) {
      var obvMap = {
        up: '<span class="tech-pos">Accum ↑</span>',
        down: '<span class="tech-neg">Distrib ↓</span>',
        flat: "Flat",
      };
      trendTiles.push(tile("OBV", obvMap[t.obv_trend] || escapeHtml(String(t.obv_trend))));
    }
    if (t.rsi_divergence) {
      trendTiles.push(tile("RSI Div", t.rsi_divergence === "bullish"
        ? '<span class="tech-pos">Bullish ↑</span>'
        : '<span class="tech-neg">Bearish ↓</span>'));
    }
    var divNote = "";
    if (t.rsi_divergence_detail) {
      var d = t.rsi_divergence_detail;
      if (d.type === "bearish") {
        divNote = '<div class="tech-div-note tech-neg">Bearish RSI divergence: price made a higher high (' +
          fmtMoney(d.price_prev) + ' → ' + fmtMoney(d.price_last) + ') but RSI fell (' +
          d.rsi_prev + ' → ' + d.rsi_last + ') — momentum not confirming the high.</div>';
      } else {
        divNote = '<div class="tech-div-note tech-pos">Bullish RSI divergence: price made a lower low (' +
          fmtMoney(d.price_prev) + ' → ' + fmtMoney(d.price_last) + ') but RSI rose (' +
          d.rsi_prev + ' → ' + d.rsi_last + ') — selling pressure fading.</div>';
      }
    }
    var fibCaption = "";
    if (t.fibonacci && isNum(t.fibonacci.low) && isNum(t.fibonacci.high)) {
      fibCaption = '<div class="sr-fib-caption">Fib retracement of ' + fmtMoney(t.fibonacci.low) + '–' +
        fmtMoney(t.fibonacci.high) + ' (' + (t.fibonacci.direction === "up" ? "uptrend" : "downtrend") + ')</div>';
    }

    // Momentum synthesis: composite score (see computeMomentum) -> a badge
    // stating direction + acceleration, a directional meter, and a plain
    // sentence. When no signal at all is available, show the empty state
    // instead of badge/meter/sentence but still render the rest of the card.
    var momentum = computeMomentum(t);
    var momSynthesisHtml;
    if (momentum) {
      // Plain .toUpperCase() mis-cases Turkish "i" (no dot) -> "SABIT" instead
      // of "SABİT"; toLocaleUpperCase("tr-TR") applies the correct dotted-I rule.
      var badgeLabel = momentum.dirLabel + (momentum.accelWord ? " · " + momentum.accelWord.toLocaleUpperCase("tr-TR") : "");
      momSynthesisHtml =
        '<div class="mom-badge-row"><span class="mom-badge ' + momentum.dirCls + '">' +
          momentum.arrow + ' ' + escapeHtml(badgeLabel) +
        '</span></div>' +
        '<div class="mom-meter-row">' +
          '<span class="mom-ends">güçlü↓</span>' +
          '<div class="mom-meter"><div class="mom-meter-marker" style="left:' + momentum.meterPos + '%;"></div></div>' +
          '<span class="mom-ends">güçlü↑</span>' +
        '</div>' +
        (momentum.accelWord ? '<div class="mom-meter-cap">(' + escapeHtml(momentum.accelWord) + ')</div>' : "") +
        '<div class="mom-note">' + escapeHtml(momentumSentence(momentum)) + '</div>';
    } else {
      momSynthesisHtml = '<div class="tech-empty">Momentum için yeterli fiyat geçmişi yok.</div>';
    }

    return (
      '<div class="card">' +
        '<div class="card-title">Technical</div>' +
        '<div class="verdict-card-body">' +
          '<div class="gauge"><div class="gauge-marker" style="left:' + GAUGE_POSITION[color] + '%;">▲</div></div>' +
          '<div><span class="badge badge-' + color + '">' + escapeHtml(verdictText || "—") + '</span></div>' +
          (t.verdict_detail ? '<div class="verdict-note">' + escapeHtml(t.verdict_detail) + '</div>' : "") +
          regimeHtml +
          calloutHtml +
          ladderHtml +
          '<button type="button" class="tech-toggle" aria-expanded="false">Momentum &amp; detaylar ▾</button>' +
          '<div class="tech-details" hidden>' +
            '<div class="tech-section-title">Momentum</div>' +
            momSynthesisHtml +
            rsiHtml +
            '<div class="tech-stats">' + momentumTiles.join("") + '</div>' +
            '<div class="tech-section-title">Trend &amp; Durum</div>' +
            '<div class="tech-stats">' + trendTiles.join("") + '</div>' +
            divNote +
            (fibCaption ? '<div class="tech-section-title">Seviye ayrıntıları</div>' + fibCaption : "") +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // Wire the collapsible momentum/detail section of the Technical card.
  function wireTechnical() {
    var btn = bodyEl.querySelector(".tech-toggle");
    var det = bodyEl.querySelector(".tech-details");
    if (!btn || !det) return;
    btn.addEventListener("click", function () {
      var opening = det.hasAttribute("hidden");
      if (opening) {
        det.removeAttribute("hidden");
        btn.setAttribute("aria-expanded", "true");
        btn.innerHTML = "Momentum &amp; detaylar ▴";
      } else {
        det.setAttribute("hidden", "");
        btn.setAttribute("aria-expanded", "false");
        btn.innerHTML = "Momentum &amp; detaylar ▾";
      }
    });
  }

  // ---- Sensitivity analysis card -------------------------------------------
  // Only rendered when result.valuation.sensitivity is present.
  function sensitivityTableHtml(sens) {
    if (!sens || !sens.matrix || !sens.matrix.length) return "";
    var growthValues = sens.growth_values || [];
    var drValues = sens.dr_values || [];
    var matrix = sens.matrix || [];
    var baseRow = Math.floor(matrix.length / 2);
    var baseCol = Math.floor((matrix[0] || []).length / 2);

    var headerCells = drValues.map(function (d) {
      return '<th class="sens-col-h">' + fmtPct(d) + '</th>';
    }).join("");

    var bodyRows = matrix.map(function (rowArr, ri) {
      var cells = (rowArr || []).map(function (val, ci) {
        var isBase = ri === baseRow && ci === baseCol;
        return '<td class="sens-cell' + (isBase ? " sens-base" : "") + '">' + fmtMoney(val) + '</td>';
      }).join("");
      var rowLabel = growthValues[ri] !== undefined ? fmtPct(growthValues[ri]) : "—";
      return '<tr><th class="sens-row-h">' + rowLabel + '</th>' + cells + '</tr>';
    }).join("");

    var uncertaintyTag = sens.high_uncertainty
      ? '<span class="uncertainty-tag">High Uncertainty</span>'
      : "";

    return (
      '<div class="card">' +
        '<div class="card-title">Sensitivity Analysis' + (uncertaintyTag ? " " + uncertaintyTag : "") + '</div>' +
        '<table class="sensitivity-table">' +
          '<thead><tr><th></th>' + headerCells + '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
        '</table>' +
        '<div class="sens-axis-note">Rows: growth · Columns: discount rate · center cell = base case</div>' +
      '</div>'
    );
  }

  // ---- Staged entry plan card ----------------------------------------------
  // Only rendered when result.entry_plan is present; an empty list means the
  // planning layer found no usable mechanical trigger levels (missing price
  // or structural reference levels), not an error -- degrades to a plain
  // sentence rather than an empty table.
  function entryPlanHtml(entryPlan) {
    var sub = '<div class="card-sub">These levels are a mechanical reference -- not a buy order or investment advice.</div>';
    if (!entryPlan || entryPlan.length === 0) {
      return (
        '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<p class="empty-note">Not enough price or structural reference levels (bear/base/bull range, 52-week low, SMA50/SMA200) to build a mechanical tranche plan.</p></div>'
      );
    }
    var rows = entryPlan.map(function (t) {
      var zone = t.price_zone || {};
      var mainRow =
        '<tr>' +
          '<td>' + escapeHtml(isNum(t.n) ? String(t.n) : "—") + '</td>' +
          '<td class="entry-trigger">' + escapeHtml(t.trigger || "—") + '</td>' +
          '<td>' + fmtMoney(zone.lo) + '–' + fmtMoney(zone.hi) + '</td>' +
          '<td>' + fmtRawPct(t.size_pct) + '</td>' +
          '<td>' + fmtMoney(t.invalidation) + '</td>' +
          '<td>' + fmtMoney(t.target) + '</td>' +
          '<td>' + (isNum(t.rr) ? Number(t.rr).toFixed(1) + ":1" : "—") + '</td>' +
        '</tr>';
      var noteRow = t.note
        ? '<tr class="entry-note-row"><td colspan="7">' + escapeHtml(t.note) + '</td></tr>'
        : "";
      return mainRow + noteRow;
    }).join("");
    return (
      '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<table class="sensitivity-table entry-plan-table">' +
          '<thead><tr>' +
            '<th>#</th><th>Trigger</th><th>Price Zone</th><th>Size</th>' +
            '<th>Invalidation</th><th>Target</th><th>R:R</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>'
    );
  }

  // ---- Stop-adding signals card ---------------------------------------
  // An empty list is the common case (no signal active), not an error.
  function stopAddingHtml(stopAdding) {
    if (!stopAdding || stopAdding.length === 0) {
      return (
        '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<p class="empty-note">No active stop-adding signal right now.</p></div>'
      );
    }
    var items = stopAdding.map(function (s) {
      return '<li>' + escapeHtml(s.message || s.code || "") + '</li>';
    }).join("");
    return (
      '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Thesis metric card ---------------------------------------------
  // result.thesis_metric is always a dict (never null) per planning.py, but
  // every field inside it may still be None -- degrades to "not available"
  // rather than "None"/blank.
  function thesisMetricHtml(tm) {
    if (!tm) return "";
    var name = tm.name ? escapeHtml(tm.name) : "Thesis Metric";
    var valueText = tm.latest_value ? escapeHtml(tm.latest_value) : "not available";
    var trendColor = "amber";
    if (tm.trend) {
      var s = String(tm.trend).toLowerCase();
      if (s.indexOf("iyileş") !== -1 || s.indexOf("iyiles") !== -1) trendColor = "green";
      else if (s.indexOf("boz") !== -1) trendColor = "red";
    }
    var trendHtml = tm.trend
      ? ' <span class="badge badge-' + trendColor + '">' + escapeHtml(tm.trend) + '</span>'
      : "";
    var rationaleHtml = tm.rationale
      ? '<p class="thesis-rationale">' + escapeHtml(tm.rationale) + '</p>'
      : "";
    return (
      '<div class="card"><div class="card-title">Thesis Metric</div>' +
        '<p class="thesis-metric-line">' + name + ': <b>' + valueText + '</b>' + trendHtml + '</p>' +
        rationaleHtml +
      '</div>'
    );
  }

  // ---- Scenario returns card -----------------------------------------------
  // None-safe: a scenario with no computable return renders "—" rather than
  // "None". Returns "" (card omitted) when the field is entirely absent.
  function scenarioReturnsListHtml(scenarioReturns) {
    if (!scenarioReturns) return "";
    var rows = SCENARIO_ORDER.map(function (key) {
      var b = scenarioReturns[key] || {};
      var loOk = isNum(b.ret_lo_pct), hiOk = isNum(b.ret_hi_pct);
      var text = (loOk || hiOk) ? (fmtSignedPct(b.ret_lo_pct) + " to " + fmtSignedPct(b.ret_hi_pct)) : "—";
      return (
        '<div class="scen-ret-row">' +
          '<span class="scen-ret-name">' + escapeHtml(SCENARIO_LABEL[key] || key) + '</span>' +
          '<span class="scen-ret-value">' + text + '</span>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">Scenario Returns</div>' +
        '<div class="scenario-returns-list">' + rows + '</div>' +
      '</div>'
    );
  }

  // ---- Red flags card (only if flags exist) --------------------------------
  function flagsCardHtml(flags) {
    if (!flags || flags.length === 0) return "";
    var items = flags.map(function (f) {
      return (
        '<li>' + escapeHtml(f.message || f.code || "") +
        (f.detail ? '<span class="item-detail">' + escapeHtml(f.detail) + '</span>' : '') +
        '</li>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">⚠ Red Flags</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Filing events card (recent 8-K item codes; only if events exist) ----
  // Deterministic, LLM-free: each entry is one recent 8-K classified by its
  // SEC item code(s) (see sec_analyzer/signals/events.py), colored by severity.
  function eventsCardHtml(events) {
    if (!events || events.length === 0) return "";
    var sevLabel = { critical: "KRİTİK", warning: "UYARI", info: "BİLGİ" };
    var items = events.map(function (e) {
      var severity = e.severity || "info";
      var cats = (e.categories || []).join(", ");
      var itemsTxt = (e.items || []).join(", ");
      var detail = escapeHtml(e.date || "") + (itemsTxt ? " · 8-K madde " + escapeHtml(itemsTxt) : "");
      return (
        '<li class="event-' + escapeHtml(severity) + '">' +
          '<span class="event-sev">' + escapeHtml(sevLabel[severity] || severity.toUpperCase()) + '</span>' +
          escapeHtml(cats) +
          '<span class="item-detail">' + detail + '</span>' +
        '</li>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">📄 Son Dosyalama Olayları (8-K)</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Footer analysis (catalyst + summary) --------------------------------
  // No fabricated "Recommendation: ..." line -- only the real catalyst/
  // summary fields the pipeline actually produced.
  function footerAnalysisHtml(result) {
    var catalyst = result.catalyst;
    var summary = result.summary;
    var catalystHtml = catalyst
      ? '<p class="catalyst-line"><span class="badge-label">Catalyst</span>' + escapeHtml(catalyst) + '</p>'
      : "";
    return (
      '<div class="card">' +
        catalystHtml +
        '<p class="summary-text">' + escapeHtml(summary || "No summary available.") + '</p>' +
      '</div>'
    );
  }

  function globalFooterHtml() {
    return (
      '<div class="global-footer">' +
        '© Verdict Analysis Systems · SEC EDGAR + price data · educational use only, not investment advice.' +
      '</div>'
    );
  }

  // ---- Error card (result.error) -------------------------------------------
  function errorCardHtml(payload, result) {
    var errorLabel = result.error ? " (" + escapeHtml(String(result.error)) + ")" : "";
    return (
      headerCardHtml(payload) +
      '<div class="card">' +
        '<div class="error-box">' +
          '<strong>Analysis unavailable' + errorLabel + '</strong>' +
          '<p>' + escapeHtml(result.summary || "An unknown error occurred.") + '</p>' +
        '</div>' +
      '</div>' +
      globalFooterHtml()
    );
  }

  // ===================================================================
  // renderBody -- the single body-rendering function shared by report
  // mode (called once, directly on `data`) and search mode (called again
  // on every successful /api/analyze fetch, on a reshaped payload).
  // `payload` shape: {ticker, horizon, price, as_of, result, metrics,
  // technical, red_flags, entity_name}.
  // ===================================================================
  function renderBody(payload) {
    var result = payload.result || {};

    if (result.error) {
      bodyEl.innerHTML = errorCardHtml(payload, result);
      return;
    }

    var fv = result.fair_value_range || {};
    var profileFit = result.profile_fit || {};
    var technical = payload.technical || {};
    // result.valuation (SPEC.md Sec.11) is the richer engine payload; it's
    // absent for older callers or when phase-2 interpret() never ran (e.g.
    // an LLM error) -- the triangulation/sensitivity cards simply don't
    // render in that case, degrading to the simpler pre-valuation card set.
    var valuation = result.valuation || null;

    var html =
      headerCardHtml(payload) +
      weightBarHtml(result._weights) +
      priceChartCardHtml(technical, result, payload.horizon, payload.analyst) +
      fanChartCardHtml(result, payload.price) +
      (valuation ? triangulationRowHtml(valuation, result.confidence) : "") +
      verdictCardHtml("Fundamental", result.fundamental_verdict, result.horizon_note) +
      technicalCardHtml(technical, result.technical_verdict || technical.verdict) +
      verdictCardHtml("Profile Fit", profileFit.verdict, profileFit.reason) +
      (valuation ? sensitivityTableHtml(valuation.sensitivity) : "") +
      entryPlanHtml(result.entry_plan) +
      stopAddingHtml(result.stop_adding) +
      thesisMetricHtml(result.thesis_metric) +
      scenarioReturnsListHtml(result.scenario_returns) +
      flagsCardHtml(payload.red_flags) +
      eventsCardHtml(result.events) +
      footerAnalysisHtml(result) +
      globalFooterHtml();

    bodyEl.innerHTML = html;
    wireFanChart(fv, result.scenario_returns);
    wirePriceRange(technical, result, payload.analyst);
    wireTechnical();
  }

  // ===================================================================
  // Report mode: nav = brand + generated date; body renders immediately
  // from the baked payload.
  // ===================================================================
  function renderReportMode() {
    document.title = String(data.ticker || "") + " · " + String(data.horizon || "") + " · Verdict Terminal";
    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        (data.generated_on ? '<span class="nav-date">Generated ' + escapeHtml(data.generated_on) + '</span>' : "") +
      '</div>';
    renderBody(data);
  }

  // ===================================================================
  // Search mode: nav carries live ticker/horizon/provider controls; the
  // body starts in a prompt state and is replaced by renderBody() (the
  // exact same function report mode uses) once /api/analyze succeeds.
  // ===================================================================
  function renderSearchMode() {
    document.title = "Verdict Terminal";
    var horizons = data.horizons || [["3m", "3m"], ["1y", "1y"], ["5y", "5y"]];
    var providers = data.providers || [];
    var state = {
      horizon: data.default_horizon || "1y",
      provider: data.default_provider || (providers[0] && providers[0][0]) || "",
    };

    var providerOptions = providers.map(function (p) {
      var sel = p[0] === state.provider ? " selected" : "";
      return '<option value="' + escapeHtml(p[0]) + '"' + sel + '>' + escapeHtml(p[1]) + '</option>';
    }).join("");

    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        '<div class="nav-controls">' +
          '<input type="text" class="ticker-input" id="ticker-input" placeholder="TICKER" autocomplete="off" />' +
          horizonToggleHtml(horizons.map(function (h) { return h[0]; }), state.horizon, true, "nav-horizon-toggle") +
          '<select class="provider-select" id="provider-select">' + providerOptions + '</select>' +
          '<button type="button" class="analyze-btn" id="analyze-btn">Analyse</button>' +
        '</div>' +
      '</div>';

    bodyEl.innerHTML = '<div class="card"><div class="empty-state">Enter a ticker above and press Analyse to generate a Verdict Terminal report.</div></div>';

    var tickerInput = document.getElementById("ticker-input");
    var providerSelect = document.getElementById("provider-select");
    var analyzeBtn = document.getElementById("analyze-btn");
    var horizonToggleEl = document.getElementById("nav-horizon-toggle");

    horizonToggleEl.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".horizon-pill") : null;
      if (!btn) return;
      state.horizon = btn.getAttribute("data-horizon");
      horizonToggleEl.querySelectorAll(".horizon-pill").forEach(function (p) {
        p.classList.toggle("active", p === btn);
      });
    });

    providerSelect.addEventListener("change", function () {
      state.provider = providerSelect.value;
    });

    function showError(message) {
      bodyEl.innerHTML = '<div class="error-banner">' + escapeHtml(message) + '</div>';
    }

    function runAnalyze() {
      var ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) {
        showError("Please enter a ticker symbol.");
        return;
      }
      analyzeBtn.disabled = true;
      tickerInput.disabled = true;
      bodyEl.innerHTML =
        '<div class="card"><div class="loading-state"><span class="spinner"></span>' +
        'Running analysis for ' + escapeHtml(ticker) + ' -- this can take 10-40 seconds...</div></div>';

      fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ticker: ticker,
          years: 12,
          horizon: state.horizon,
          provider: state.provider,
          no_cache: false,
        }),
      })
        .then(function (response) {
          return response.json().then(function (json) {
            return { ok: response.ok, json: json };
          });
        })
        .then(function (res) {
          if (!res.ok || !res.json || !res.json.ok) {
            var message = (res.json && res.json.error) || "Failed to run analysis.";
            showError(message);
            return;
          }
          var json = res.json;
          var technical = json.technical || null;
          var reportPayload = {
            ticker: ticker,
            horizon: state.horizon,
            price: (json.metrics || {}).price,
            as_of: technical ? technical.as_of : null,
            result: json.analysis || {},
            metrics: json.metrics || {},
            technical: technical || {},
            red_flags: json.red_flags || [],
            entity_name: json.name || null,
            analyst: json.analyst || null,
          };
          renderBody(reportPayload);
        })
        .catch(function (err) {
          showError("Network error: " + err.message);
        })
        .finally(function () {
          analyzeBtn.disabled = false;
          tickerInput.disabled = false;
        });
    }

    analyzeBtn.addEventListener("click", runAnalyze);
    tickerInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        runAnalyze();
      }
    });
  }

  function render() {
    if (data.mode === "search") {
      renderSearchMode();
    } else {
      renderReportMode();
    }
  }

  render();
})();
</script>

</body>
</html>
