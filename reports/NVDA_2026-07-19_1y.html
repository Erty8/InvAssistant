<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verdict Terminal</title>
<style>
  /* Dark-only "terminal" palette -- this design deliberately commits to a
     single dark theme (see sec_analyzer/web/templates' prior design intent
     for the same call), matching the supplied mockup. */
  :root {
    color-scheme: dark;
    --bg: #0d1420;
    --card: #111b2b;
    --border: #223349;
    --text: #e0e2ea;
    --muted: #8b919d;
    --outline: #c0c7d3;
    --primary: #5aa7ff;
    --primary-light: #a2c9ff;
    --green: #4de082;
    --amber: #ffb953;
    --caution: #ff8a3d;
    --red: #ffb4ab;
    --red-container: #93000a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.45;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  .muted { color: var(--muted); }
  .mono { font-family: var(--mono); }

  /* ---- Top nav ---------------------------------------------------------*/
  .topnav {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(13, 20, 32, 0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    margin: 0 0 20px;
  }
  .nav-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
  }
  .brand {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--primary-light);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .nav-date {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--mono);
  }
  .nav-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    flex: 1 1 auto;
  }
  .ticker-input {
    width: 11ch;
    text-transform: uppercase;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
  }
  .ticker-input:focus {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
  }
  .provider-select {
    font-size: 0.82rem;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: var(--sans);
    max-width: 220px;
  }
  .analyze-btn {
    font-size: 0.86rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--primary);
    background: var(--primary);
    color: #06111f;
    cursor: pointer;
  }
  .analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---- Shared horizon-toggle pill row ------------------------------------*/
  .horizon-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .horizon-pill {
    font-family: var(--mono);
    font-size: 0.74rem;
    font-weight: 600;
    padding: 6px 12px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-right: 1px solid var(--border);
    cursor: default;
  }
  .horizon-pill:last-child { border-right: none; }
  .horizon-toggle.interactive .horizon-pill { cursor: pointer; }
  .horizon-pill.active {
    background: rgba(90, 167, 255, 0.18);
    color: var(--primary-light);
  }

  /* ---- Cards -------------------------------------------------------------*/
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- Header card ---------------------------------------------------- */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header-left .ticker-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ticker {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .entity-name {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .source-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .header-right {
    text-align: right;
    flex-shrink: 0;
  }
  .price-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ---- Analyst consensus reference row (display-only cross-check, NOT the
     model's own fair value -- kept visually subordinate to the header
     price/verdict) --------------------------------------------------------*/
  .analyst-consensus {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
  }
  .analyst-consensus .ac-label {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.66rem;
    color: var(--muted);
    margin-right: 6px;
  }
  .analyst-consensus .ac-mean {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--text);
  }
  .analyst-consensus .ac-up { color: var(--green); }
  .analyst-consensus .ac-down { color: var(--red); }
  .analyst-consensus .ac-count,
  .analyst-consensus .ac-range { color: var(--muted); }
  .analyst-consensus .ac-caption {
    margin-top: 4px;
    font-size: 0.7rem;
    line-height: 1.4;
  }

  /* ---- Signal-weight bar ------------------------------------------------*/
  .weight-bar {
    display: flex;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    margin: 0 0 16px;
    border: 1px solid var(--border);
  }
  .weight-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    font-family: var(--mono);
  }
  .weight-fundamental { background: rgba(90, 167, 255, 0.28); color: var(--primary-light); }
  .weight-technical { background: rgba(255, 185, 83, 0.28); color: var(--amber); }

  /* ---- Fan chart (fair-value ruler) --------------------------------------*/
  .fan-empty {
    font-size: 0.85rem;
  }
  .fan-outer {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fan-labels {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    width: 38px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--muted);
    padding-top: 2px;
    font-family: var(--mono);
  }
  .fan-labels span {
    height: 24px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
  }
  .fan-labels span:last-child { margin-bottom: 0; }
  .fan-plot {
    position: relative;
    flex: 1;
    padding-top: 2px;
  }
  .fan-row-track {
    position: relative;
    height: 24px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 5px;
    cursor: pointer;
  }
  .fan-row-track:last-child { margin-bottom: 0; }
  .fan-row-track.selected {
    box-shadow: 0 0 0 1px var(--outline) inset;
  }
  .fan-band {
    position: absolute;
    top: 0;
    bottom: 0;
    border-radius: 5px;
    border: 1px solid;
  }
  .fan-val {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.66rem;
    white-space: nowrap;
    pointer-events: none;
  }
  .fan-val-outside {
    color: var(--muted);
  }
  .fan-val-inside {
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    padding: 0 4px;
  }
  .fan-val-lo.fan-val-outside { right: 100%; margin-right: 6px; justify-content: flex-end; }
  .fan-val-hi.fan-val-outside { left: 100%; margin-left: 6px; justify-content: flex-start; }
  .fan-val-lo.fan-val-inside { left: 0; margin-left: 6px; justify-content: flex-start; }
  .fan-val-hi.fan-val-inside { right: 0; margin-right: 6px; justify-content: flex-end; }
  .fan-marker {
    position: absolute;
    top: -16px;
    bottom: 0;
    width: 0;
    border-left: 1px dashed var(--outline);
    pointer-events: none;
  }
  .fan-marker-arrow {
    position: absolute;
    top: -15px;
    left: -6px;
    font-size: 10px;
    color: var(--text);
  }
  .fan-marker-price {
    position: absolute;
    top: -30px;
    left: -24px;
    font-size: 0.66rem;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .fan-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin: 10px 0 14px 46px;
  }

  /* ---- Hyper-grower "Fiyatın iması" / expected-value note ----------------*/
  .hyper-note {
    margin: 12px 0 0 46px;
    font-size: 0.76rem;
    color: var(--outline);
    line-height: 1.5;
  }
  .hyper-implied-line { color: var(--caution); }
  .hyper-ev-line { color: var(--muted); margin-top: 4px; }
  .capex-note { color: var(--muted); margin-top: 4px; }
  @media (max-width: 560px) {
    .hyper-note { margin-left: 0; }
  }

  /* ---- Model <-> market divergence block (governor, verdict action) ------*/
  .divergence-box {
    margin: 12px 0 0 46px;
    padding: 10px 12px;
    border: 1px solid var(--caution);
    border-radius: 8px;
    background: rgba(224, 132, 42, 0.08);
    font-size: 0.76rem;
    line-height: 1.5;
  }
  .divergence-title {
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--caution);
    font-size: 0.72rem;
    margin-bottom: 8px;
  }
  .divergence-table { width: 100%; border-collapse: collapse; }
  .divergence-table th, .divergence-table td {
    text-align: right; padding: 3px 6px; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .divergence-table th:first-child, .divergence-table td:first-child { text-align: left; color: var(--muted); font-weight: 400; }
  .divergence-table thead th { color: var(--muted); font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .divergence-model { color: var(--text); }
  .divergence-market { color: var(--caution); font-weight: 600; }
  .divergence-referee { color: var(--muted); margin-top: 8px; }
  @media (max-width: 560px) {
    .divergence-box { margin-left: 0; }
  }

  /* ---- Assumption strip (SCENARIO / GROWTH / DISCOUNT / RATIONALE) -------*/
  .assumption-strip {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 6px 18px;
    margin: 0 0 0 46px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 560px) {
    .assumption-strip { grid-template-columns: 1fr 1fr; margin-left: 0; }
  }
  .assum-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .assum-value {
    font-size: 0.8rem;
    font-family: var(--mono);
  }
  .assum-rationale .assum-value {
    font-family: var(--sans);
    color: var(--outline);
  }

  /* ---- Triangulation card --------------------------------------------- */
  /* Legacy compact chip-row layout -- used only as a fallback when a
     payload doesn't carry tri.rationale (older result shape). */
  .triangulation-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tri-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.74rem;
    background: rgba(255, 255, 255, 0.03);
  }
  .tri-icon { font-size: 0.85rem; font-weight: 700; line-height: 1; }
  .tri-agree .tri-icon { color: var(--green); }
  .tri-disagree .tri-icon { color: var(--red); }
  .tri-muted .tri-icon { color: var(--muted); }
  .tri-label {
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.68rem;
  }
  .tri-signal { font-family: var(--mono); }

  /* Rationale layout -- one row per valuation method, each with its own
     signal badge, an agreement marker against the overall direction, and
     a muted note line explaining *why* (tri.rationale[method]). Falls
     through to the compact chip row above when rationale is absent. */
  .tri-methods {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tri-method + .tri-method {
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .tri-method-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-method-head .tri-label {
    min-width: 84px;
  }
  .tri-marker {
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1;
  }
  .tri-marker-agree { color: var(--green); }
  .tri-marker-disagree { color: var(--red); }
  .tri-marker-muted { color: var(--muted); }
  .tri-reason {
    font-size: 0.78rem;
    color: var(--outline);
    line-height: 1.45;
    margin-top: 4px;
  }
  .tri-confidence {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  /* ---- Badges (status / confidence) -------------------------------------*/
  .badge {
    display: inline-block;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 0.76rem;
    font-weight: 700;
    max-width: 100%;
    overflow-wrap: break-word;
    white-space: nowrap;
  }
  .badge-green { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .badge-amber { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  /* Distinct "caution" bucket for the hyper-grower YÜKSEK BEKLENTİ FİYATLANMIŞ
     verdict -- deliberately a different hue from both the neutral MAKUL
     amber and the PAHALI red, since it signals a different kind of risk
     (price implies an aggressive-but-not-yet-disqualified growth path). */
  .badge-caution { background: rgba(255, 138, 61, 0.16); color: var(--caution); border: 1px solid rgba(255, 138, 61, 0.5); }
  .badge-red { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  /* Neutral bucket for a triangulation method with no usable signal
     (veri_yok) -- deliberately muted/gray rather than any of the four
     verdict colors, since "no data" isn't a point on the cheap<->expensive
     spectrum. */
  .badge-muted { background: rgba(139, 145, 157, 0.14); color: var(--muted); border: 1px solid rgba(139, 145, 157, 0.4); }
  .badge-label {
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-right: 6px;
  }

  /* ---- Verdict cards (fundamental/technical/profile fit) -----------------*/
  .verdict-card-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .gauge {
    position: relative;
    height: 6px;
    border-radius: 3px;
    margin: 2px 2px 2px;
    background: linear-gradient(to right, var(--green), var(--amber), var(--red));
  }
  .gauge-marker {
    position: absolute;
    top: -9px;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--text);
  }
  .verdict-note {
    font-size: 0.82rem;
    color: var(--outline);
    line-height: 1.45;
  }

  /* ---- Technical detail (momentum + support/resistance) ------------------*/
  .tech-section-title {
    font-size: 0.66rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 8px;
  }
  .rsi-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .rsi-gauge {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 4px;
    /* oversold (<30) green zone · neutral mid · overbought (>70) red zone */
    background: linear-gradient(to right,
      rgba(77,224,130,0.55) 0%, rgba(77,224,130,0.55) 30%,
      #2a3547 30%, #2a3547 70%,
      rgba(255,180,171,0.65) 70%, rgba(255,180,171,0.65) 100%);
  }
  .rsi-gauge-marker {
    position: absolute; top: -4px; width: 2px; height: 16px;
    background: var(--text); transform: translateX(-1px); border-radius: 1px;
  }
  .rsi-val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 2em; text-align: right; }
  .rsi-side { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }

  /* ---- Momentum synthesis: verdict badge + directional meter + sentence -- */
  .mom-badge-row { margin-bottom: 10px; }
  .mom-badge { display: inline-block; border-radius: 999px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; }
  .mom-badge-up { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .mom-badge-down { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  .mom-badge-flat { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  .mom-meter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .mom-meter {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 4px;
    /* strong-down (red) -> neutral -> strong-up (green) */
    background: linear-gradient(to right,
      rgba(255,180,171,0.6) 0%, #2a3547 45%, #2a3547 55%, rgba(77,224,130,0.6) 100%);
  }
  .mom-meter-marker {
    position: absolute; top: -4px; width: 2px; height: 16px;
    background: var(--text); transform: translateX(-1px); border-radius: 1px;
  }
  .mom-ends { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  .mom-meter-cap { font-size: 0.72rem; color: var(--muted); text-align: center; margin-bottom: 8px; }
  .mom-note {
    font-size: 0.75rem; line-height: 1.4; margin-top: 4px; margin-bottom: 4px;
    padding: 7px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  .tech-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 8px;
  }
  .tech-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 9px;
    min-width: 0;
  }
  .tech-stat-label {
    font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
  }
  .tech-stat-val { font-size: 0.9rem; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .tech-pos { color: var(--green); }
  .tech-neg { color: var(--red); }
  .tech-div-note {
    font-size: 0.75rem; line-height: 1.4; margin-top: 8px;
    padding: 7px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  .sr-ladder { display: flex; flex-direction: column; gap: 4px; }
  .sr-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 10px; border-radius: 7px; font-variant-numeric: tabular-nums;
  }
  .sr-res { background: rgba(255,180,171,0.10); }
  .sr-sup { background: rgba(77,224,130,0.10); }
  .sr-price { background: rgba(90,167,255,0.16); border: 1px solid var(--border); }
  .sr-side { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); min-width: 72px; }
  .sr-lvl { font-weight: 600; min-width: 8.5em; white-space: nowrap; }
  .sr-dist { font-size: 0.8rem; min-width: 3.6em; }
  .sr-why { flex: 1; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-strength-badge {
    font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 1px 7px; border-radius: 6px; white-space: nowrap;
  }
  .sr-str-strong { color: var(--green); background: rgba(77, 224, 130, 0.14); }
  .sr-str-medium { color: var(--amber); background: rgba(255, 185, 83, 0.14); }
  .sr-str-weak { color: var(--muted); background: rgba(139, 145, 157, 0.16); }
  .sr-fib-caption { font-size: 0.68rem; color: var(--muted); margin-bottom: 6px; }
  .tech-empty { color: var(--muted); font-size: 0.82rem; }

  /* ---- Trend & triggers (Technical card primary view) --------------------*/
  .trend-regime { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 4px 0 6px; }
  .regime-badge { display: inline-block; border-radius: 999px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; }
  .regime-up { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .regime-down { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  .regime-neutral { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  .regime-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
  .regime-evi { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .trend-callout { display: flex; align-items: flex-start; gap: 8px; border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; font-size: 0.84rem; line-height: 1.45; }
  .callout-up { background: rgba(77, 224, 130, 0.10); border: 1px solid rgba(77, 224, 130, 0.35); }
  .callout-up .co-arrow { color: var(--green); }
  .callout-down { background: rgba(255, 180, 171, 0.10); border: 1px solid rgba(147, 0, 10, 0.5); }
  .callout-down .co-arrow { color: var(--red); }
  .co-arrow { font-size: 1rem; line-height: 1.2; flex-shrink: 0; }
  .trigger-ladder { display: flex; flex-direction: column; gap: 5px; }
  .trig-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; border-left: 3px solid transparent; background: rgba(255, 255, 255, 0.03); }
  .trig-up { border-left-color: var(--green); }
  .trig-down { border-left-color: var(--red); }
  .trig-now { border-left-color: var(--primary); background: rgba(90, 167, 255, 0.14); }
  .trig-nearest { box-shadow: 0 0 0 1px rgba(192, 199, 211, 0.5) inset; }
  .trig-arrow { width: 14px; text-align: center; font-size: 0.8rem; flex-shrink: 0; }
  .trig-up .trig-arrow { color: var(--green); }
  .trig-down .trig-arrow { color: var(--red); }
  .trig-now .trig-arrow { color: var(--primary); }
  .trig-price { font-family: var(--mono); font-weight: 700; font-size: 0.9rem; min-width: 104px; flex-shrink: 0; }
  .trig-rule { flex: 1; font-size: 0.8rem; line-height: 1.35; min-width: 0; }
  .trig-reason { color: var(--muted); }
  .trig-now-tag { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; color: var(--primary-light); }
  .trig-dist { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; min-width: 60px; text-align: right; flex-shrink: 0; }
  .tech-toggle { margin-top: 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 7px 12px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; cursor: pointer; font-family: var(--mono); }
  .tech-toggle:hover { border-color: var(--outline); color: var(--text); }
  .tech-details { margin-top: 14px; }
  @media (max-width: 560px) {
    .trig-rule { flex-basis: 100%; order: 3; }
  }

  /* ---- Price chart (price line + S/R + fair-value bands) -----------------*/
  .pchart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pchart-head .card-title { margin: 0; }
  .pchart svg { width: 100%; height: auto; display: block; }
  .pchart-area { fill: rgba(90, 167, 255, 0.12); stroke: none; }
  .pchart-line { fill: none; stroke: #5aa7ff; stroke-width: 1.6; }
  .pchart-grid { stroke: var(--border); stroke-width: 1; opacity: 0.55; }
  .pchart-tick { fill: var(--muted); font-size: 10px; }
  /* Support & resistance are drawn identically (a single dark-red line at
     each zone's price, no fill) -- only the R/S label distinguishes them.
     Simpler than a filled band: less visual clutter, no overlap fights with
     the fair-value box. */
  .pchart-sr-line { stroke: #7a1f1f; stroke-width: 1.5; opacity: 0.9; }
  .pchart-band-label { font-size: 9px; font-weight: 600; fill: #c0605f; }
  .pchart-fv-bull { stroke: var(--green); }
  .pchart-fv-bear { stroke: var(--red); }
  .pchart-fv-label { font-size: 9px; }
  .pchart-fv-ann { font-size: 8px; fill: var(--muted); }

    if (abs >= 1e12) { scaled = abs / 1e12; suffix = "T"; }
    else if (abs >= 1e9) { scaled = abs / 1e9; suffix = "B"; }
    else if (abs >= 1e6) { scaled = abs / 1e6; suffix = "M"; }
    else if (abs >= 1e3) { scaled = abs / 1e3; suffix = "K"; }
    return sign + "$" + scaled.toFixed(1) + suffix;
  }

  // Renders a decimal fraction in the Turkish percent-first convention
  // (0.481 -> "%48.1") -- matches the style already used by the engine's
  // own Turkish strings (e.g. hyper_growth_detail.reasons' "Gelir CAGR
  // %48.9"); fmtPct/fmtRawPct above are English-style (number-then-%) and
  // stay as-is for their existing (non-Turkish-prose) call sites.
  function fmtPctTr(v, decimals) {
    if (!isNum(v)) return "—";
    var pct = Number(v) * 100;
    var d = decimals === undefined ? 1 : decimals;
    return "%" + pct.toFixed(d);
  }

  // growth/discount_rate/note arrive as ready-made, human-readable strings
  // (often Turkish, e.g. "%8 büyüme") from every provider -- never reformat
  // or translate them, just guard against missing values.
  function safeText(v) {
    return v === null || v === undefined || v === "" ? "—" : String(v);
  }

  function hexToRgba(hex, alpha) {
    var h = hex.replace("#", "");
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  // Maps a verdict/label string onto one of four color buckets. Order
  // matters: the "YÜKSEK BEKLENTİ" (hyper-grower) check runs before the red
  // check so its distinct caution styling is never swallowed by a
  // coincidental substring match, red-bucket keywords are checked before
  // falling back to amber, so e.g. "AŞIRI ALIM" (contains "ALIM") is never
  // mistaken for something else, and unrecognized/empty text defaults to
  // the neutral amber bucket.
  // UCUZ/AŞIRI SATIM/UYUMLU -> green, MAKUL/NÖTR/KISMEN -> amber,
  // YÜKSEK BEKLENTİ FİYATLANMIŞ -> caution (distinct amber/orange),
  // PAHALI/AŞIRI ALIM/UYUMSUZ -> red.
  function bucketColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("UCUZ") !== -1 || s.indexOf("AŞIRI SATIM") !== -1 || s.indexOf("UYUMLU") !== -1) return "green";
    if (s.indexOf("YÜKSEK BEKLENTİ") !== -1 || s.indexOf("YUKSEK BEKLENTI") !== -1) return "caution";
    if (s.indexOf("PAHALI") !== -1 || s.indexOf("AŞIRI ALIM") !== -1 || s.indexOf("UYUMSUZ") !== -1) return "red";
    return "amber";
  }

  // Confidence-badge color: YÜKSEK -> green, ORTA -> amber, DÜŞÜK -> red.
  function confidenceColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("YÜKSEK") !== -1 || s.indexOf("YUKSEK") !== -1) return "green";
    if (s.indexOf("DÜŞÜK") !== -1 || s.indexOf("DUSUK") !== -1) return "red";
    return "amber";
  }

  var GAUGE_POSITION = { green: 10, amber: 50, caution: 72, red: 90 };
  var SCENARIO_LABEL = { bear: "BEAR", base: "BASE", bull: "BULL" };
  var SCENARIO_ORDER = ["bull", "base", "bear"];
  var SCENARIO_HEX = { bear: "#ffb4ab", base: "#5aa7ff", bull: "#4de082" };
  // Chrome-level labels for the raw triangulation signal codes
  // (valuation.triangulation.signals -- lowercase internal codes, not
  // free-text meant for direct display).
  var SIGNAL_LABEL = { ucuz: "CHEAP", makul: "FAIR", yuksek_beklenti: "HIGH EXP", pahali: "EXPENSIVE", karisik: "MIXED", veri_yok: "NO DATA" };
  var HORIZON_SHORT = { "3m": "3M", "1y": "1Y", "5y": "5Y" };
  // Calendar-day windows the price chart slices its (up-to-5y) series by for
  // each range, and the year counts used to annualize the "if price converges
  // to this scenario by the horizon end" expected return.
  var HORIZON_DAYS = { "3m": 95, "1y": 370, "5y": 2000 };
  var HORIZON_YEARS = { "3m": 0.25, "1y": 1, "5y": 5 };

  function signalLabel(s) {
    if (!s) return "—";
    return SIGNAL_LABEL[String(s).toLowerCase()] || String(s).toUpperCase();
  }

  function horizonLabel(v) {
    return HORIZON_SHORT[v] || String(v || "—").toUpperCase();
  }

  // -------------------------------------------------------------------
  // Shared horizon-toggle pill row. `values` is the ordered list of
  // horizon codes to show (defaults to the standard three); `interactive`
  // wires a click handler that calls `onSelect(value)` -- used by the
  // search-mode nav control, while the header's own toggle is a plain
  // read-only indicator of which horizon the current report reflects.
  // -------------------------------------------------------------------
  function horizonToggleHtml(values, current, interactive, idAttr) {
    var pills = (values || ["3m", "1y", "5y"]).map(function (v) {
      var active = v === current ? " active" : "";
      return '<button type="button" class="horizon-pill' + active + '" data-horizon="' +
        escapeHtml(v) + '">' + escapeHtml(horizonLabel(v)) + '</button>';
    }).join("");
    var idHtml = idAttr ? ' id="' + idAttr + '"' : "";
    return '<div class="horizon-toggle' + (interactive ? " interactive" : "") + '"' + idHtml + '>' + pills + '</div>';
  }

  // ===================================================================
  // Section builders -- shared by both modes via renderBody().
  // ===================================================================

  // ---- Analyst consensus reference row (display-only cross-check) --------
  // Purely informational -- shows a third-party price-target consensus
  // (e.g. yfinance) next to the current price. This is NEVER the model's own
  // fair value; kept visually subordinate (small, muted caption explaining
  // its source) so it can't be mistaken for the verdict. Renders "" whenever
  // payload.analyst is absent/null or lacks a usable target_mean, so older
  // payloads without this key render byte-identical to before.
  function analystRowHtml(payload) {
    var a = payload && payload.analyst;
    if (!a || !isNum(a.target_mean)) return "";

    var meanText = fmtMoney(a.target_mean);

    var upsideHtml = "";
    if (isNum(payload.price) && Number(payload.price) > 0) {
      var upsidePct = (Number(a.target_mean) / Number(payload.price) - 1) * 100;
      var upsideCls = upsidePct >= 0 ? "ac-up" : "ac-down";
      upsideHtml = ' <span class="' + upsideCls + '">(' + fmtSignedPct(upsidePct) + ')</span>';
    }

    var countHtml = isNum(a.num_analysts)
      ? ' <span class="ac-count">(' + Math.round(Number(a.num_analysts)) + ' analist)</span>'
      : "";

    var rangeHtml = (isNum(a.target_low) && isNum(a.target_high))
      ? ' <span class="ac-range">· aralık ' + fmtMoney(a.target_low) + '–' + fmtMoney(a.target_high) + '</span>'
      : "";

    var sourceText = a.source ? escapeHtml(String(a.source)) : "yfinance / analist konsensüsü";

    return (
      '<div class="analyst-consensus">' +
        '<span class="ac-label">Analist Hedefi (konsensüs):</span>' +
        '<span class="ac-mean">' + meanText + '</span> <span class="muted">ort</span>' +
        upsideHtml + countHtml + rangeHtml +
        '<div class="ac-caption">Dış kaynak: ' + sourceText +
          ' — bu, modelin kendi adil değeri DEĞİLDİR; yalnızca karşılaştırma amaçlı bir dış referanstır.</div>' +
      '</div>'
    );
  }

  // ---- Header card ------------------------------------------------------
  function headerCardHtml(payload) {
    var priceText = fmtMoney(payload.price);
    var sourceNote = "SEC EDGAR + Stooq" + (payload.as_of ? " · as of " + escapeHtml(payload.as_of) : "");
    var entityHtml = payload.entity_name
      ? '<span class="entity-name">' + escapeHtml(payload.entity_name) + '</span>'
      : "";
    return (
      '<div class="card">' +
        '<div class="header-row">' +
          '<div class="header-left">' +
            '<div class="ticker-line">' +
              '<span class="ticker">' + escapeHtml(payload.ticker || "—") + '</span>' +
              entityHtml +
            '</div>' +
            '<div class="source-note">' + sourceNote + '</div>' +
          '</div>' +
          '<div class="header-right">' +
            '<div class="price-value">' + priceText + '</div>' +
            horizonToggleHtml(["3m", "1y", "5y"], payload.horizon, false) +
          '</div>' +
        '</div>' +
        analystRowHtml(payload) +
      '</div>'
    );
  }

  // ---- Signal-weight bar --------------------------------------------------
  function weightBarHtml(weights) {
    var w = weights || {};
    var f = typeof w.fundamental === "number" ? w.fundamental : 0.5;
    var t = typeof w.technical === "number" ? w.technical : 0.5;
    var fPct = Math.round(f * 100);
    var tPct = Math.round(t * 100);
    return (
      '<div class="weight-bar">' +
        '<div class="weight-seg weight-fundamental" style="width:' + fPct + '%;">FUNDAMENTAL ' + fPct + '%</div>' +
        '<div class="weight-seg weight-technical" style="width:' + tPct + '%;">TECHNICAL ' + tPct + '%</div>' +
      '</div>'
    );
  }

  // ---- Fair-value fan chart ------------------------------------------------
  // Horizontal-ruler price scale per scenario band: min(bear.lo, price)*0.95
  // .. max(bull.hi, price)*1.05, falling back to whatever numeric values
  // *are* available when bear/bull/price are partially missing, so the
  // chart still renders something useful rather than an all-or-nothing
  // empty state.
  function computeFanScale(fv, price) {
    var bear = fv.bear || {}, bull = fv.bull || {}, base = fv.base || {};
    var bearLo = isNum(bear.lo) ? Number(bear.lo) : null;
    var bullHi = isNum(bull.hi) ? Number(bull.hi) : null;
    var p = isNum(price) ? Number(price) : null;
    var fallback = [bearLo, bullHi, p, base.lo, base.hi, bear.hi, bull.lo]
      .map(function (v) { return isNum(v) ? Number(v) : null; })
      .filter(function (v) { return v !== null; });
    if (fallback.length === 0) return null;

    var lowAnchor = (bearLo !== null && p !== null) ? Math.min(bearLo, p) :
      (bearLo !== null ? bearLo : (p !== null ? p : Math.min.apply(null, fallback)));
    var highAnchor = (bullHi !== null && p !== null) ? Math.max(bullHi, p) :
      (bullHi !== null ? bullHi : (p !== null ? p : Math.max.apply(null, fallback)));

    var minV = lowAnchor * 0.95;
    var maxV = highAnchor * 1.05;
    if (minV > maxV) { var t = minV; minV = maxV; maxV = t; }
    if (minV === maxV) {
      var bump = Math.max(1, Math.abs(minV) * 0.1);
      minV -= bump;
      maxV += bump;
    }
    return { minV: minV, maxV: maxV };
  }

  // ---- Hyper-grower "Fiyatın iması" + expected-value note (Milestone E) --
  // Only rendered when valuation.hyper_growth is true; every existing
  // non-hyper render path is unaffected since this returns "" otherwise.
  // Degrades through the three tiers HYPER_SPEC.md Sec.6 describes,
  // depending on which implied fields the engine's reverse bisection
  // managed to solve for (it can fail to converge for either growth or
  // margin independently) -- never renders "None"/"NaN".
  // ---- Maintenance/growth CapEx normalization sub-block (SPEC.md Sec.3.6) --
  // Shared by the hyper-grower and mid-growth revenue-first extras below --
  // both read a `capex_normalization` dict (or null/absent) off their own
  // detail object with the exact same shape, so the rendering only needs to
  // exist once. Renders "" when the split wasn't applied (null/falsy
  // `.applied`), which is the common case (most filers aren't capex-heavy
  // enough to trigger the gate in engine._maintenance_adjusted_margin).
  function capexNormalizationHtml(capexNorm) {
    if (!capexNorm || !capexNorm.applied) return "";
    var intensityText = fmtPctTr(capexNorm.capex_intensity);
    var rawText = fmtPctTr(capexNorm.raw_current_margin);
    var opsText = fmtPctTr(capexNorm.ops_current_margin);
    var upsideText = isNum(capexNorm.upside_per_share) ? fmtMoney(capexNorm.upside_per_share) : "—";
    var noteText = "CapEx-yoğun agresif ÜST-SENARYO (MANŞET DEĞİL): büyüme CapEx'i bakım CapEx'inden " +
      "(D&A, gelirin en az %5'i tabanıyla) ayrıştırılınca başlangıç FCF marjı ham " + rawText + " → " +
      opsText + " olur (CapEx/gelir yoğunluğu " + intensityText + "). Bu iyimser senaryoda baz değer " +
      upsideText + "/hisse. Manşet DCF, bugünkü gerçek (düzeltilmemiş) nakit akışıyla hesaplanır ve " +
      "bastırılmıştır; bu üst-senaryo geliri büyütürken onu finanse eden CapEx'i tam yansıtmadığından " +
      "yukarı-yanlıdır -- ihtiyatla değerlendirin.";
    return '<div class="capex-note">' + escapeHtml(noteText) + '</div>';
  }

  // Model <-> market divergence block (triangulate.py governor, action="verdict"):
  // when the base fair-value band sits >2x above price, the three method votes
  // aren't independent confirmation -- they read off ONE assumption set. Show,
  // side by side, what the model assumes vs what today's price implies for the
  // three reverse-lens levers, so the divergence is concrete. Only rendered for
  // hyper-growers (the implied values live in hyper_growth_detail.implied).
  function divergenceHtml(valuation) {
    var tri = (valuation && valuation.triangulation) || {};
    var div = tri.divergence;
    if (!div || div.action !== "verdict") return "";
    var detail = (valuation && valuation.hyper_growth_detail) || {};
    var implied = detail.implied || {};
    var base = (detail.scenarios || {}).base || {};

    function row(label, modelText, marketVal) {
      if (!isNum(marketVal)) return "";
      return '<tr><td>' + escapeHtml(label) + '</td>' +
        '<td class="divergence-model">' + escapeHtml(modelText) + '</td>' +
        '<td class="divergence-market">' + fmtPctTr(marketVal) + '</td></tr>';
    }
    var rows = "";
    rows += row("Başlangıç büyüme", isNum(base.start_growth) ? fmtPctTr(base.start_growth) : "—", implied.growth);
    rows += row("Olgun FCF marjı", isNum(base.target_fcf_margin) ? fmtPctTr(base.target_fcf_margin) : "—", implied.steady_state_margin);
    var modelDr = isNum(detail.base_discount_rate)
      ? (fmtPctTr(detail.base_discount_rate) +
         (isNum(detail.mature_discount_rate) ? " → " + fmtPctTr(detail.mature_discount_rate) : ""))
      : "—";
    rows += row("İskonto oranı", modelDr, implied.discount_rate);
    if (!rows) return "";

    return (
      '<div class="divergence-box">' +
        '<div class="divergence-title">MODEL ↔ PİYASA AYRIŞMASI</div>' +
        '<table class="divergence-table">' +
          '<thead><tr><th>Varsayım</th><th>Model</th><th>Piyasa fiyatlıyor</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div class="divergence-referee">Üç yöntem de aynı büyüme/marj varsayımından beslendiği için ' +
          'oybirliği bağımsız bir doğrulama değil. Model büyümenin sürdüğünü, piyasa bittiğini fiyatlıyor; ' +
          'hakem önümüzdeki çeyreklerin gerçekleşen büyümesidir.</div>' +
      '</div>'
    );
  }

  function hyperGrowthExtraHtml(valuation) {
    if (!valuation || !valuation.hyper_growth) return "";
    var detail = valuation.hyper_growth_detail || {};
    if (detail.suppressed) {
      var suppressedReason = detail.suppressed_reason ||
        "Revenue-first DCF bu şirket için güvenilir bir değer üretemedi; DCF devre dışı bırakıldı.";
      // Capex-heavy names are always suppressed for the headline but still
      // carry an aggressive capex-normalized upside -- render it here too.
      return (
        '<div class="hyper-note">' +
          '<div class="hyper-implied-line">' + escapeHtml(suppressedReason) + '</div>' +
          capexNormalizationHtml(detail.capex_normalization) +
        '</div>'
      );
    }
    var implied = detail.implied || {};
    var impliedText;
    if (isNum(implied.growth) && isNum(implied.revenue_10y)) {
      var revText = fmtCompactMoney(implied.revenue_10y);
      var multText = isNum(implied.revenue_multiple) ? Number(implied.revenue_multiple).toFixed(1) : "—";
      impliedText = "Fiyatın iması: 10 yılda " + revText + " revenue (bugünün " + multText + " katı), ~" +
        fmtPctTr(implied.growth) + " büyüme, " + fmtPctTr(implied.steady_state_margin) + " olgun FCF marjı";
      if (isNum(implied.tam_share)) {
        impliedText += " = TAM'ın " + fmtPctTr(implied.tam_share) + "'si";
      }
    } else if (isNum(implied.steady_state_margin)) {
      impliedText = "Fiyatın iması: %40 büyümede bile ~" + fmtPctTr(implied.steady_state_margin) +
        " olgun FCF marjı gerektiriyor (makul büyüme aralığının çok üstünde)";
    } else {
      impliedText = "Fiyat, makul büyüme aralığının belirgin şekilde dışında bir beklenti ima ediyor.";
    }

    var evHtml = isNum(detail.expected_value)
      ? '<div class="hyper-ev-line">Olasılık-ağırlıklı beklenen değer: ' + fmtMoney(detail.expected_value) + '</div>'
      : "";
    var capexHtml = capexNormalizationHtml(detail.capex_normalization);

    return (
      divergenceHtml(valuation) +
      '<div class="hyper-note">' +
        '<div class="hyper-implied-line">' + escapeHtml(impliedText) + '</div>' +
        evHtml +
        capexHtml +
      '</div>'
    );
  }

  // ---- Mid-growth (12-20%) loss-making revenue-first DCF extra (SPEC.md --
  // Sec.8d) -- mirrors hyperGrowthExtraHtml's structure/guard pattern for
  // the sibling revenue-first headline that sits between the mature
  // (Sec.8b) and hyper-grower (Sec.3) paths. Only rendered when
  // valuation.midgrowth_revenue_headline is true; every other render path
  // is unaffected since this returns "" otherwise.
  function midgrowthRevenueExtraHtml(valuation) {
    if (!valuation || !valuation.midgrowth_revenue_headline) return "";
    var detail = valuation.midgrowth_revenue_detail || {};
    if (detail.suppressed) {
      var suppressedReason = detail.suppressed_reason ||
        "Orta-büyüme gelir bazlı DCF bu şirket için güvenilir bir değer üretemedi; DCF devre dışı bırakıldı.";
      return (
        '<div class="hyper-note">' +
          '<div class="hyper-implied-line">' + escapeHtml(suppressedReason) + '</div>' +
        '</div>'
      );
    }
    var scenarios = detail.scenarios || {};
    var base = scenarios.base || {};
    var startGrowthText = fmtPctTr(detail.start_growth);
    var targetMarginText = fmtPctTr(detail.target_margin_base);
    var fadeText = isNum(detail.steady_state_year) ? Number(detail.steady_state_year) + " yıl" : "—";
    var basePerShareText = fmtMoney(base.per_share);

    var headlineText = "Orta-büyüme (%12-20) gelir bazlı DCF: gerçekleşen büyüme " + startGrowthText +
      ", olgun FCF marjı hedefi " + targetMarginText + ", " + fadeText + " içinde olgunlaşma; " +
      "baz senaryo hisse başı değer " + basePerShareText;

    var capexHtml = capexNormalizationHtml(detail.capex_normalization);

    return (
      '<div class="hyper-note">' +
        '<div class="hyper-implied-line">' + escapeHtml(headlineText) + '</div>' +
        capexHtml +
      '</div>'
    );
  }

  function fanChartCardHtml(result, price) {
    var fv = result.fair_value_range || {};
    var scale = computeFanScale(fv, price);
    var innerHtml;
    if (!scale) {
      innerHtml = '<div class="fan-empty muted">Not enough data for a valuation scenario.</div>';
    } else {
      var minV = scale.minV, maxV = scale.maxV;
      var span = (maxV - minV) || 1;
      var pctOf = function (v) { return ((v - minV) / span) * 100; };

      var labelsHtml = SCENARIO_ORDER.map(function (k) {
        return "<span>" + SCENARIO_LABEL[k] + "</span>";
      }).join("");

      var EDGE_THRESHOLD_PCT = 12;

      var rowsHtml = SCENARIO_ORDER.map(function (key) {
        var b = fv[key];
        var bandHtml = "";
        if (b && isNum(b.lo) && isNum(b.hi)) {
          var left = pctOf(Number(b.lo));
          var right = pctOf(Number(b.hi));
          var width = Math.max(0.6, right - left);
          var hex = SCENARIO_HEX[key];

          var loInside = left < EDGE_THRESHOLD_PCT;
          var hiInside = (100 - right) < EDGE_THRESHOLD_PCT;
          var loValHtml =
            '<span class="fan-val fan-val-lo ' + (loInside ? "fan-val-inside" : "fan-val-outside") + '">' +
              fmtMoney(b.lo) +
            '</span>';
          var hiValHtml =
            '<span class="fan-val fan-val-hi ' + (hiInside ? "fan-val-inside" : "fan-val-outside") + '">' +
              fmtMoney(b.hi) +
            '</span>';

          bandHtml =
            '<div class="fan-band" style="left:' + left + '%; width:' + width + '%; ' +
            'background:' + hexToRgba(hex, 0.35) + '; border-color:' + hex + ';">' +
              loValHtml + hiValHtml +
            '</div>';
        }
        return '<div class="fan-row-track" data-scenario="' + key + '">' + bandHtml + '</div>';
      }).join("");

      var markerHtml = "";
      if (isNum(price)) {
        var markerLeft = Math.min(99, Math.max(0, pctOf(Number(price))));
        markerHtml =
          '<div class="fan-marker" style="left:' + markerLeft + '%;">' +
            '<span class="fan-marker-price">▼ ' + fmtMoney(price) + '</span>' +
            '<span class="fan-marker-arrow">▼</span>' +
          '</div>';
      }

      innerHtml =
        '<div class="fan-outer">' +
          '<div class="fan-labels">' + labelsHtml + '</div>' +
          '<div class="fan-plot">' + rowsHtml + markerHtml + '</div>' +
        '</div>' +
        '<div class="fan-ticks">' +
          '<span>' + fmtMoney(minV) + '</span>' +
          '<span>' + fmtMoney((minV + maxV) / 2) + '</span>' +
          '<span>' + fmtMoney(maxV) + '</span>' +
        '</div>' +
        '<div class="assumption-strip" id="assumption-strip">' +
          '<div class="assum-col"><div class="assum-label">Scenario</div><div class="assum-value" id="assum-scenario">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Growth</div><div class="assum-value" id="assum-growth">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Discount</div><div class="assum-value" id="assum-discount">—</div></div>' +
          '<div class="assum-col assum-rationale"><div class="assum-label">Rationale</div><div class="assum-value" id="assum-rationale">—</div></div>' +
        '</div>';
    }
    innerHtml += hyperGrowthExtraHtml(result.valuation);
    innerHtml += midgrowthRevenueExtraHtml(result.valuation);
    return '<div class="card"><div class="card-title">Valuation Scenarios</div>' + innerHtml + '</div>';
  }

  // Updates the assumption strip's four cells for one scenario key
  // (bear/base/bull) and highlights the matching fan row -- called once on
  // initial render (defaulting to "base") and again on every row click.
  function selectFanScenario(fv, key, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    rows.forEach(function (r) {
      r.classList.toggle("selected", r.getAttribute("data-scenario") === key);
    });
    var b = (fv || {})[key] || {};
    var scenarioEl = document.getElementById("assum-scenario");
    var growthEl = document.getElementById("assum-growth");
    var discountEl = document.getElementById("assum-discount");
    var rationaleEl = document.getElementById("assum-rationale");
    if (!scenarioEl) return;
    scenarioEl.textContent = SCENARIO_LABEL[key] || String(key || "—").toUpperCase();
    growthEl.textContent = safeText(b.growth);
    discountEl.textContent = safeText(b.discount_rate);
    var ret = (scenarioReturns || {})[key];
    var rationale = safeText(b.note);
    if (ret && (isNum(ret.ret_lo_pct) || isNum(ret.ret_hi_pct))) {
      var retText = "Return " + fmtSignedPct(ret.ret_lo_pct) + " to " + fmtSignedPct(ret.ret_hi_pct);
      rationale = rationale === "—" ? retText : rationale + " · " + retText;
    }
    rationaleEl.textContent = rationale;
  }

  function wireFanChart(fv, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    if (rows.length === 0) return;
    rows.forEach(function (r) {
      r.addEventListener("click", function () {
        selectFanScenario(fv, r.getAttribute("data-scenario"), scenarioReturns);
      });
    });
    selectFanScenario(fv, "base", scenarioReturns);
  }

  // ---- Triangulation card ---------------------------------------------
  // Only rendered when result.valuation.triangulation is present; older/
  // simpler result dicts simply skip this card.

  // Badge color for one method's OWN signal (independent of consensus):
  // ucuz -> green, makul -> amber, yuksek_beklenti -> caution, pahali ->
  // red, veri_yok/unknown -> muted (no-data is not a point on the
  // cheap<->expensive spectrum, so it gets a neutral bucket, not amber).
  function signalBadgeColor(sig) {
    var s = sig ? String(sig).toLowerCase() : "";
    if (s === "ucuz") return "green";
    if (s === "makul") return "amber";
    if (s === "yuksek_beklenti") return "caution";
    if (s === "pahali") return "red";
    if (s === "karisik") return "caution";
    return "muted";
  }

  // Agreement-marker kind for one method against the overall consensus
  // direction. Deliberately distinguishes "no consensus" from "this method
  // dissents": a veri_yok method, or any method when tri.direction is
  // "belirsiz" (no real consensus), gets a neutral "muted" marker rather
  // than a red X -- showing X on every method when there simply isn't an
  // agreed direction reads as "all methods are wrong", which is false.
  function triAgreementKind(sig, direction) {
    var s = sig ? String(sig).toLowerCase() : "";
    if (!s || s === "veri_yok") return "muted";
    // "karisik" is an ambiguity, not a dissent-against-consensus: show it
    // neutral rather than a red ✗ (the raw multiple and its growth-adjusted
    // counterpart simply point different ways).
    if (s === "karisik") return "muted";
    var dir = direction ? String(direction).toLowerCase() : "";
    if (!dir || dir === "belirsiz") return "muted";
    return s === dir ? "agree" : "disagree";
  }

  var TRI_MARKER_ICON = { agree: "✓", disagree: "✗", muted: "•" };

  function triangulationRowHtml(valuation, confidenceOverride) {
    var tri = (valuation || {}).triangulation;
    if (!tri) return "";
    var signals = tri.signals || {};
    var direction = tri.direction;
    var confidence = confidenceOverride || tri.confidence;
    var rationale = tri.rationale;
    var confColor = confidenceColor(confidence);

    // For financial/reit sectors the DCF slot is really the P/B×ROE anchor
    // (dcf.enabled === false in that case) -- label it accordingly.
    var dcfLabel = (valuation.dcf && valuation.dcf.enabled === false) ? "P/B×ROE" : "DCF";
    var methods = [
      { key: "dcf", label: dcfLabel },
      { key: "reverse_dcf", label: "REVERSE DCF" },
      { key: "multiples", label: "MULTIPLES" },
    ];

    // Defensive fallback: older payloads without tri.rationale render the
    // original compact chip-only row, no rationale lines, so this never
    // crashes on a payload predating the rationale field.
    if (!rationale) {
      var chips = methods.map(function (m) {
        var sig = signals[m.key];
        var kind = triAgreementKind(sig, direction);
        return (
          '<div class="tri-chip tri-' + kind + '">' +
            '<span class="tri-icon">' + TRI_MARKER_ICON[kind] + '</span>' +
            '<span class="tri-label">' + escapeHtml(m.label) + '</span>' +
            '<span class="tri-signal">' + escapeHtml(signalLabel(sig)) + '</span>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="card">' +
          '<div class="card-title">Triangulation</div>' +
          '<div class="triangulation-row">' +
            '<div class="tri-chips">' + chips + '</div>' +
            '<span><span class="badge-label">Confidence</span><span class="badge badge-' + confColor + '">' +
              escapeHtml(confidence || "—") + '</span></span>' +
          '</div>' +
        '</div>'
      );
    }

    var rows = methods.map(function (m) {
      var sig = signals[m.key];
      var kind = triAgreementKind(sig, direction);
      var reason = rationale[m.key];
      return (
        '<div class="tri-method">' +
          '<div class="tri-method-head">' +
            '<span class="tri-label">' + escapeHtml(m.label) + '</span>' +
            '<span class="badge badge-' + signalBadgeColor(sig) + '">' + escapeHtml(signalLabel(sig)) + '</span>' +
            '<span class="tri-marker tri-marker-' + kind + '">' + TRI_MARKER_ICON[kind] + '</span>' +
          '</div>' +
          (reason ? '<div class="tri-reason">' + escapeHtml(reason) + '</div>' : "") +
        '</div>'
      );
    }).join("");

    var confReason = rationale.confidence;
    return (
      '<div class="card">' +
        '<div class="card-title">Triangulation</div>' +
        '<div class="tri-methods">' + rows + '</div>' +
        '<div class="tri-confidence">' +
          '<div class="tri-method-head">' +
            '<span class="badge-label">Confidence</span>' +
            '<span class="badge badge-' + confColor + '">' + escapeHtml(confidence || "—") + '</span>' +
          '</div>' +
          (confReason ? '<div class="tri-reason">' + escapeHtml(confReason) + '</div>' : "") +
        '</div>' +
      '</div>'
    );
  }

  // ---- Price chart: close line + S/R range bands + fair-value bands -------
  // Self-contained inline SVG (no libraries -- CSP blocks them), same
  // hand-rolled approach as the fan chart. Overlays only what the user asked
  // for: support/resistance ranges and the fair-value band.
  // Parse a "YYYY-MM-DD" price-series date into a Date (local midnight), or
  // null if it doesn't look like one.
  function parseYMD(s) {
    var parts = String(s || "").split("-");
    if (parts.length !== 3) return null;
    var y = Number(parts[0]), m = Number(parts[1]), d = Number(parts[2]);
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d);
  }

  // Slice the (up-to-5y, multi-resolution) price_series down to the calendar
  // window for a range (3m/1y/5y). The 3m/1y windows land entirely in the
  // daily tail; 5y returns the whole series. Falls back to the last ~40
  // points if a window would leave too few to draw.
  function sliceSeriesByHorizon(series, range) {
    if (!series || series.length < 2) return series || [];
    var days = HORIZON_DAYS[range];
    if (!days) return series;
    var last = parseYMD(series[series.length - 1].t);
    if (!last) return series;
    var cutoff = last.getTime() - days * 86400000;
    var out = series.filter(function (p) {
      var d = parseYMD(p.t);
      return d && d.getTime() >= cutoff;
    });
    return out.length >= 2 ? out : series.slice(-Math.min(series.length, 40));
  }

  // Implied annualized return IF price converged to `fv` by the end of the
  // range: (fv/price)^(1/years) - 1. Not a forecast -- see the chart caption.
  function annualizedReturn(fv, price, range) {
    if (!isNum(fv) || !isNum(price) || Number(price) <= 0 || Number(fv) <= 0) return null;
    var years = HORIZON_YEARS[range] || 1;
    return Math.pow(Number(fv) / Number(price), 1 / years) - 1;
  }

  // Total return over the sliced window and its annualized volatility. Vol is
  // resolution-aware: it annualizes the log-return stdev by the periods-per-
  // year implied by the median calendar gap between points, so the daily
  // (3m/1y) and weekly-tail (5y) slices are both handled correctly.
  function computeRangeStats(slice) {
    if (!slice || slice.length < 2) return null;
    var first = Number(slice[0].c), last = Number(slice[slice.length - 1].c);
    var ret = (isNum(first) && isNum(last) && first > 0) ? (last / first - 1) : null;
    var rets = [], gaps = [];
    for (var i = 1; i < slice.length; i++) {
      var c0 = Number(slice[i - 1].c), c1 = Number(slice[i].c);
      if (c0 > 0 && c1 > 0) rets.push(Math.log(c1 / c0));
      var d0 = parseYMD(slice[i - 1].t), d1 = parseYMD(slice[i].t);
      if (d0 && d1) gaps.push((d1.getTime() - d0.getTime()) / 86400000);
    }
    var vol = null;
    if (rets.length >= 5) {
      var mean = rets.reduce(function (a, b) { return a + b; }, 0) / rets.length;
      var varr = rets.reduce(function (a, b) { return a + (b - mean) * (b - mean); }, 0) / (rets.length - 1);
      var sd = Math.sqrt(varr);
      gaps.sort(function (a, b) { return a - b; });
      var medGap = gaps.length ? gaps[Math.floor(gaps.length / 2)] : 1.4;
      var perYear = medGap > 0 ? 365 / medGap : 252;
      vol = sd * Math.sqrt(perYear);
    }
    return { ret: ret, vol: vol };
  }

  // Two stat tiles above the chart: realized return over the selected window
  // and its annualized volatility. Both recompute on a range switch.
  function rangeStatsTilesHtml(slice, range) {
    var s = computeRangeStats(slice);
    if (!s) return "";
    var retTxt = isNum(s.ret) ? fmtSignedPct(s.ret * 100) : "—";
    var retCls = isNum(s.ret) ? (s.ret >= 0 ? "tech-pos" : "tech-neg") : "";
    var volTxt = isNum(s.vol) ? Math.round(s.vol * 100) + "%" : "—";
    return '<div class="tech-stats" style="margin-bottom:12px;">' +
      '<div class="tech-stat"><div class="tech-stat-label">Getiri (' + escapeHtml(horizonLabel(range)) + ')</div>' +
        '<div class="tech-stat-val ' + retCls + '">' + retTxt + '</div></div>' +
      '<div class="tech-stat"><div class="tech-stat-label">Volatilite (yıl.)</div>' +
        '<div class="tech-stat-val">' + volTxt + '</div></div>' +
      '</div>';
  }

  // Client-side range switch (3m/1y/5y). Reuses the shared horizon-toggle
  // styling; scoped by the .range-toggle wrapper so its clicks are distinct
  // from the header's read-only analyzed-horizon indicator.
  function rangeToggleHtml(current) {
    var pills = ["3m", "1y", "5y"].map(function (v) {
      return '<button type="button" class="horizon-pill' + (v === current ? " active" : "") +
        '" data-range="' + v + '">' + escapeHtml(horizonLabel(v)) + '</button>';
    }).join("");
    return '<div class="horizon-toggle interactive range-toggle">' + pills + '</div>';
  }

  // The SVG price chart + fan for one range, plus its legend and caption.
  // `slice` is the range-windowed series; `range` drives the horizon label and
  // the annualized-return figures on the fan endpoints.
  function priceChartSvg(t, result, range, slice, analyst) {
    var W = 760, H = 340, PL = 48, PR = 112, PT = 14, PB = 28;
    var plotW = W - PL - PR, plotH = H - PT - PB;

    var supports = (t.support_levels || []).filter(function (z) { return isNum(z.low) && isNum(z.high); });
    var resistances = (t.resistance_levels || []).filter(function (z) { return isNum(z.low) && isNum(z.high); });
    var fv = (result || {}).fair_value_range || {};

    // Analyst consensus price target (external reference, not the model's
    // own fair value) -- drawn as a distinct amber dashed line + faint band,
    // separate from the scenario fan below.
    var a = analyst || {};
    var atMean = isNum(a.target_mean) ? Number(a.target_mean) : null;
    var atLow = isNum(a.target_low) ? Number(a.target_low) : null;
    var atHigh = isNum(a.target_high) ? Number(a.target_high) : null;

    function bandMid(b) { return (b && isNum(b.lo) && isNum(b.hi)) ? (Number(b.lo) + Number(b.hi)) / 2 : null; }
    var baseMid = bandMid(fv.base);
    var bullTop = (fv.bull && isNum(fv.bull.hi)) ? Number(fv.bull.hi)
      : (fv.base && isNum(fv.base.hi) ? Number(fv.base.hi) : baseMid);
    var bearBot = (fv.bear && isNum(fv.bear.lo)) ? Number(fv.bear.lo)
      : (fv.base && isNum(fv.base.lo) ? Number(fv.base.lo) : baseMid);
    var sens = ((result || {}).valuation || {}).sensitivity || {};
    var sensLo = isNum(sens.lo) ? Number(sens.lo) : null;
    var sensHi = isNum(sens.hi) ? Number(sens.hi) : null;
    var highUncertainty = !!sens.high_uncertainty;

    var hasFan = baseMid !== null && bullTop !== null && bearBot !== null && isNum(t.price);

    var vals = slice.map(function (p) { return p.c; });
    if (isNum(t.price)) vals.push(t.price);
    supports.concat(resistances).forEach(function (z) { vals.push(z.low, z.high); });
    if (hasFan) {
      vals.push(bullTop, bearBot, baseMid);
      if (sensLo !== null) vals.push(sensLo);
      if (sensHi !== null) vals.push(sensHi);
    }
    if (atMean !== null) {
      vals.push(atMean);
      if (atLow !== null) vals.push(atLow);
      if (atHigh !== null) vals.push(atHigh);
    }
    var vmin = Math.min.apply(null, vals), vmax = Math.max.apply(null, vals);
    if (vmax <= vmin) vmax = vmin + 1;
    var padY = (vmax - vmin) * 0.06;
    var lo = vmin - padY, hi = vmax + padY;

    var fanFrac = 0.30;
    var histW = hasFan ? plotW * (1 - fanFrac) : plotW;
    var xToday = PL + histW;
    var xEnd = PL + plotW;

    var n = slice.length;
    function xOf(i) { return PL + histW * (i / (n - 1)); }
    function yOf(v) { return PT + plotH * (hi - v) / (hi - lo); }

    var linePts = slice.map(function (p, i) { return (i ? "L" : "M") + xOf(i).toFixed(1) + " " + yOf(p.c).toFixed(1); }).join(" ");
    var areaPath = "M" + PL + " " + (PT + plotH).toFixed(1) + " " +
      slice.map(function (p, i) { return "L" + xOf(i).toFixed(1) + " " + yOf(p.c).toFixed(1); }).join(" ") +
      " L" + xToday.toFixed(1) + " " + (PT + plotH).toFixed(1) + " Z";

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Price and fair-value fan chart">';

    // Analyst consensus overlay: a distinct amber reference level, separate
    // from the model's own scenario fan. Drawn first (behind grid, S/R,
    // fan, and the price line/area) so it reads as background context.
    if (atMean !== null) {
      if (atLow !== null && atHigh !== null) {
        var yAtHigh = yOf(atHigh), yAtLow = yOf(atLow);
        svg += '<rect class="pchart-analyst-band" x="' + PL + '" y="' + Math.min(yAtHigh, yAtLow).toFixed(1) +
          '" width="' + (xEnd - PL).toFixed(1) + '" height="' + Math.abs(yAtLow - yAtHigh).toFixed(1) + '"/>';
      }
      var yAtMean = yOf(atMean);
      svg += '<line class="pchart-analyst-line" x1="' + PL + '" y1="' + yAtMean.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yAtMean.toFixed(1) + '"/>';
      svg += '<text class="pchart-analyst-label" x="' + (xEnd + 5) + '" y="' + (yAtMean + 3).toFixed(1) + '">Analist ' + fmtMoney(atMean) + '</text>';
    }

    for (var g = 0; g <= 4; g++) {
      var vy = lo + (hi - lo) * g / 4;
      var yy = yOf(vy).toFixed(1);
      svg += '<line class="pchart-grid" x1="' + PL + '" y1="' + yy + '" x2="' + xEnd + '" y2="' + yy + '"/>';
      svg += '<text class="pchart-tick" x="' + (PL - 5) + '" y="' + (Number(yy) + 3) + '" text-anchor="end">' + fmtMoney(vy) + '</text>';
    }
    [0, Math.floor((n - 1) / 2), n - 1].forEach(function (i) {
      var parts = String(slice[i].t || "").split("-");
      var lbl = parts.length === 3 ? (parts[1] + "/" + parts[0].slice(2)) : slice[i].t;
      var anchor = i === 0 ? "start" : (i === n - 1 ? "end" : "middle");
      svg += '<text class="pchart-tick" x="' + xOf(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="' + anchor + '">' + escapeHtml(lbl) + '</text>';
    });

    function srLine(z, sideLabel) {
      var y = yOf(z.price).toFixed(1);
      return '<line class="pchart-sr-line" x1="' + PL + '" y1="' + y + '" x2="' + xToday.toFixed(1) + '" y2="' + y + '"/>' +
        '<text class="pchart-band-label" x="' + (xEnd + 5) + '" y="' + (Number(y) + 3) + '">' + sideLabel + " " + fmtMoney(z.price) + '</text>';
    }
    resistances.forEach(function (z) { svg += srLine(z, "R"); });
    supports.forEach(function (z) { svg += srLine(z, "S"); });

    if (hasFan) {
      var apexY = yOf(Number(t.price));
      var yBull = yOf(bullTop), yBear = yOf(bearBot), yBase = yOf(baseMid);

      svg += '<line class="pchart-now-line" x1="' + xToday.toFixed(1) + '" y1="' + PT + '" x2="' + xToday.toFixed(1) + '" y2="' + (PT + plotH).toFixed(1) + '"/>';

      if (sensLo !== null && sensHi !== null) {
        var ySensHi = yOf(sensHi), ySensLo = yOf(sensLo);
        svg += '<polygon class="pchart-fan-outer" points="' +
          xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
          xEnd.toFixed(1) + ',' + ySensHi.toFixed(1) + ' ' +
          xEnd.toFixed(1) + ',' + ySensLo.toFixed(1) + '"/>';
      }

      svg += '<polygon class="pchart-fan-up" points="' +
        xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBull.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBase.toFixed(1) + '"/>';
      svg += '<polygon class="pchart-fan-down" points="' +
        xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBase.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBear.toFixed(1) + '"/>';

      svg += '<line class="pchart-fan-line pchart-fv-bull" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBull.toFixed(1) + '"/>';
      svg += '<line class="pchart-fan-baseline" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBase.toFixed(1) + '"/>';
      svg += '<line class="pchart-fan-line pchart-fv-bear" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBear.toFixed(1) + '"/>';

      // Scenario endpoint labels (value line + implied annualized-return line).
      var annBull = annualizedReturn(bullTop, t.price, range);
      var annBase = annualizedReturn(baseMid, t.price, range);
      var annBear = annualizedReturn(bearBot, t.price, range);
      function annLine(y, ann) {
        return ann === null ? "" :
          '<text class="pchart-fv-ann" x="' + (xEnd + 5) + '" y="' + (y + 11).toFixed(1) + '">' + fmtSignedPct(ann * 100) + '/y</text>';
      }
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBull + 1).toFixed(1) + '" fill="var(--green)">Bull ' + fmtMoney(bullTop) + '</text>' + annLine(yBull, annBull);
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBase + 1).toFixed(1) + '" fill="#5aa7ff">Base ' + fmtMoney(baseMid) + '</text>' + annLine(yBase, annBase);
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBear + 1).toFixed(1) + '" fill="var(--red)">Bear ' + fmtMoney(bearBot) + '</text>' + annLine(yBear, annBear);

      svg += '<text class="pchart-tick" x="' + ((xToday + xEnd) / 2).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle">' + escapeHtml(horizonLabel(range)) + ' →</text>';
    }

    svg += '<path class="pchart-area" d="' + areaPath + '"/>';
    svg += '<path class="pchart-line" d="' + linePts + '"/>';

    if (isNum(t.price)) {
      var yp = yOf(t.price);
      if (hasFan) {
        svg += '<circle class="pchart-apex" cx="' + xToday.toFixed(1) + '" cy="' + yp.toFixed(1) + '" r="3"/>';
        svg += '<text class="pchart-now-label" x="' + (PL + 4) + '" y="' + (PT + 12) + '">Now ' + fmtMoney(t.price) + '</text>';
      } else {
        svg += '<line class="pchart-now-line" x1="' + PL + '" y1="' + yp.toFixed(1) + '" x2="' + xEnd + '" y2="' + yp.toFixed(1) + '"/>';
        svg += '<text class="pchart-now-label" x="' + (xEnd + 5) + '" y="' + (yp + 3).toFixed(1) + '">' + fmtMoney(t.price) + '</text>';
      }
    }
    svg += '</svg>';

    var legend =
      '<div class="pchart-legend">' +
        '<span><span class="pchart-sw" style="background:#5aa7ff"></span>Price</span>' +
        ((resistances.length || supports.length) ? '<span><span class="pchart-sw" style="background:#7a1f1f"></span>Support / Resistance</span>' : "") +
        (hasFan ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#4de082", 0.5) + '"></span>Upside</span>' +
                  '<span><span class="pchart-sw" style="background:' + hexToRgba("#ffb4ab", 0.5) + '"></span>Downside</span>' +
                  (sensLo !== null && sensHi !== null ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#8b919d", 0.35) + '"></span>Sensitivity</span>' : "") : "") +
        (atMean !== null ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#ffb953", 0.5) + '"></span>Analist hedefi</span>' : "") +
      '</div>';

    var caption = hasFan
      ? '<div class="pchart-caption">Yelpaze bugünkü fiyattan senaryo değerlerine (ayı · baz · boğa) açılır; sağdaki ' +
        '<b>%/yıl</b>, fiyat ufuk sonunda o senaryoya yakınsarsa ima edilen yıllık getiridir — bir tahmin ya da ' +
        'fiyat yörüngesi değildir.' +
        (highUncertainty ? ' <span class="uncertainty-tag">Yüksek belirsizlik</span>' : "") +
        '</div>'
      : "";

    return svg + legend + caption;
  }

  // Body of the price card for one range: stat tiles + chart. Re-rendered in
  // place by wirePriceRange() when the user flips the range toggle.
  function priceRangeBodyHtml(technical, result, range, analyst) {
    var t = technical || {};
    var series = t.price_series || [];
    var slice = sliceSeriesByHorizon(series, range);
    return rangeStatsTilesHtml(slice, range) + priceChartSvg(t, result, range, slice, analyst);
  }

  function priceChartCardHtml(technical, result, horizon, analyst) {
    var t = technical || {};
    var series = t.price_series || [];
    if (series.length < 2) return "";
    var defRange = HORIZON_DAYS[horizon] ? horizon : "1y";
    return '<div class="card pchart">' +
      '<div class="pchart-head">' +
        '<div class="card-title">Price &amp; Fair-Value Fan</div>' +
        rangeToggleHtml(defRange) +
      '</div>' +
      '<div id="price-range-body">' + priceRangeBodyHtml(technical, result, defRange, analyst) + '</div>' +
      '</div>';
  }

  // Wire the client-side range toggle: flipping 3m/1y/5y re-slices the chart
  // window and recomputes the stat tiles + annualized-return figures with no
  // server round-trip (valuation is horizon-independent). This is a chart
  // *lens*, separate from the analyzed horizon shown in the header pill.
  function wirePriceRange(technical, result, analyst) {
    var toggle = bodyEl.querySelector(".range-toggle");
    var body = document.getElementById("price-range-body");
    if (!toggle || !body) return;
    toggle.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".horizon-pill") : null;
      if (!btn) return;
      var range = btn.getAttribute("data-range");
      if (!range) return;
      toggle.querySelectorAll(".horizon-pill").forEach(function (p) {
        p.classList.toggle("active", p === btn);
      });
      body.innerHTML = priceRangeBodyHtml(technical, result, range, analyst);
    });
  }

  // ---- Verdict cards (fundamental/technical/profile fit) ------------------
  function verdictCardHtml(label, verdictText, noteText) {
    var color = bucketColor(verdictText);
    var pos = GAUGE_POSITION[color];
    return (
      '<div class="card">' +
        '<div class="card-title">' + escapeHtml(label) + '</div>' +
        '<div class="verdict-card-body">' +
          '<div class="gauge"><div class="gauge-marker" style="left:' + pos + '%;">▲</div></div>' +
          '<div><span class="badge badge-' + color + '">' + escapeHtml(verdictText || "—") + '</span></div>' +
          '<div class="verdict-note">' + escapeHtml(noteText || "—") + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // ---- Technical card: verdict + momentum + support/resistance ------------
  // Signed percentage-POINT value (input already in points, e.g. 14 -> "+14%"),
  // wrapped green/red by sign. "—" when missing.
  function techSigned(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var txt = (num >= 0 ? "+" : "") + (Math.round(num * 10) / 10) + "%";
    return '<span class="' + (num >= 0 ? "tech-pos" : "tech-neg") + '">' + txt + '</span>';
  }

  // ---- S/R helpers (shared by the trigger ladder + the detail rows) -------
  // Why a level matters: 52-week extreme / how many swing points tested it /
  // Fibonacci retracement / a major moving average. `withLast` appends the
  // recency of the last test (used only in the collapsed detail section).
  function srReason(lvl, withLast) {
    var parts = [];
    if (lvl.is_52w_high) parts.push("52h tepe");
    else if (lvl.is_52w_low) parts.push("52h dip");
    else if ((lvl.touches || 0) >= 1) parts.push(lvl.touches + "× test");
    if (lvl.fib) parts.push("Fib " + lvl.fib);
    if (lvl.ma) parts.push(lvl.ma);
    var base = parts.length ? parts.join(" + ") : "seviye";
    if (withLast && lvl.last_touch) base += " · son " + lvl.last_touch;
    return base;
  }
  // Strength: a 52-week extreme, a repeatedly-tested swing, or a swing that
  // coincides with a Fibonacci level or a major moving average is Strong; a
  // lone fib / lone MA / single touch is Medium.
  function srStrength(lvl) {
    var touches = lvl.touches || 0;
    var is52wNearEnough = (lvl.is_52w_high || lvl.is_52w_low) && Math.abs(lvl.dist_pct) <= 60;
    if (is52wNearEnough || touches >= 2 || (touches >= 1 && (lvl.fib || lvl.ma))) {
      return { label: "Strong", cls: "sr-str-strong" };
    }
    if (touches === 1 || lvl.fib || lvl.ma) return { label: "Medium", cls: "sr-str-medium" };
    return { label: "Weak", cls: "sr-str-weak" };
  }
  // A level is a price RANGE (low–high); collapse to one number if the band
  // is trivially thin.
  function srRange(lvl) {
    if (lvl.low != null && lvl.high != null && lvl.high - lvl.low > 0.01) {
      return fmtMoney(lvl.low) + "–" + fmtMoney(lvl.high);
    }
    return fmtMoney(lvl.price != null ? lvl.price : lvl.low);
  }

  // The action a daily close through a resistance / support implies. SMA-tagged
  // levels get the "trend line" framing (SMA200 = long-term, SMA50 = short-term)
  // -- that's the whole point: a close through a moving average flips the trend
  // regime, not just a horizontal shelf.
  function resistanceEffect(lvl, regimeDir) {
    if (lvl.ma && /200/.test(lvl.ma)) return "uzun vadeli UPTREND onayı";
    if (lvl.ma && /50/.test(lvl.ma)) return regimeDir === "up" ? "uptrend güçlenir" : "düşüş trendi kırılır";
    return "direnç aşılır, yukarı alan açılır";
  }
  function supportEffect(lvl, regimeDir) {
    if (lvl.is_52w_low) return "yeni 52 hafta dibi";
    if (lvl.ma && /200/.test(lvl.ma)) return "uzun vadeli trend desteği kırılır";
    if (lvl.ma && /50/.test(lvl.ma)) return regimeDir === "up" ? "uptrend zayıflar" : "düşüş hızlanır";
    return "düşüş hızlanır";
  }

  // ---- Momentum synthesis: composite direction/strength score + wording ----
  // Combines 3M return, RSI14 and MACD into one [-1,1] score S so the card can
  // state a single direction instead of leaving the reader to eyeball a grid
  // of unrelated tiles. Acceleration compares the most recent month's pace
  // against the pace implied by months 2-3 to say whether that move is
  // speeding up or cooling off. All inputs are None-safe; returns null only
  // when none of r3/rsi/macd are available (nothing to synthesize).
  function computeMomentum(t) {
    function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
    var r1 = isNum(t.return_1m_pct) ? Number(t.return_1m_pct) : null;
    var r3 = isNum(t.return_3m_pct) ? Number(t.return_3m_pct) : null;
    var r6 = isNum(t.return_6m_pct) ? Number(t.return_6m_pct) : null;
    var rsi = isNum(t.rsi14) ? Number(t.rsi14) : null;
    var mh = isNum(t.macd_hist) ? Number(t.macd_hist) : null;
    var mc = (t.macd_cross === "bullish" || t.macd_cross === "bearish") ? t.macd_cross : null;

    // Returns-dominant weighting: 3M/6M returns carry most of the direction
    // call (0.45 + 0.25); RSI and MACD only nudge it (0.15 each) rather than
    // being able to drag a large multi-month move down to "flat" on their own
    // (e.g. a bearish MACD cross after a huge run should not read as neutral).
    var num = 0, sumW = 0, any = false;
    if (r3 !== null) { num += clamp(r3 / 40, -1, 1) * 0.45; sumW += 0.45; any = true; }
    if (r6 !== null) { num += clamp(r6 / 60, -1, 1) * 0.25; sumW += 0.25; any = true; }
    if (rsi !== null) { num += clamp((rsi - 50) / 40, -1, 1) * 0.15; sumW += 0.15; any = true; }
    if (mc !== null || mh !== null) {
      var macdSig = mc === "bullish" ? 1 : (mc === "bearish" ? -1 : (mh > 0 ? 0.6 : (mh < 0 ? -0.6 : 0)));
      num += macdSig * 0.15; sumW += 0.15; any = true;
    }
    if (!any) return null;

    var S = num / sumW;
    var meterPos = Math.max(0, Math.min(100, Math.round(50 + S * 50)));

    var dirLabel, dirCls, arrow, dirKind;
    if (S >= 0.5) { dirLabel = "GÜÇLÜ YUKARI MOMENTUM"; dirCls = "mom-badge-up"; arrow = "↑"; dirKind = "up"; }
    else if (S >= 0.15) { dirLabel = "YUKARI MOMENTUM"; dirCls = "mom-badge-up"; arrow = "↑"; dirKind = "up"; }
    else if (S >= -0.15) { dirLabel = "YATAY MOMENTUM"; dirCls = "mom-badge-flat"; arrow = "→"; dirKind = "flat"; }
    else if (S > -0.5) { dirLabel = "AŞAĞI MOMENTUM"; dirCls = "mom-badge-down"; arrow = "↓"; dirKind = "down"; }
    else { dirLabel = "GÜÇLÜ AŞAĞI MOMENTUM"; dirCls = "mom-badge-down"; arrow = "↓"; dirKind = "down"; }

    // Acceleration needs both the latest month and the 3-month window (to
    // back out the pace of the two months before it); TH is a deadband so
    // noise around a flat pace reads as "steady" rather than flip-flopping.
    // Every dirKind (including "flat") gets its own up/down/steady mapping --
    // a strong accel diff must never collapse to "sabit" just because the
    // direction band itself happens to be flat.
    var accelWord = null;
    if (r1 !== null && r3 !== null) {
      var paceEarlier = (r3 - r1) / 2;
      var diff = r1 - paceEarlier;
      var TH = 3;
      var accel = diff > TH ? "up" : (diff < -TH ? "down" : "steady");
      if (dirKind === "up") accelWord = accel === "up" ? "hızlanıyor" : (accel === "down" ? "yavaşlıyor" : "sabit");
      else if (dirKind === "down") accelWord = accel === "down" ? "hızlanıyor" : (accel === "up" ? "yavaşlıyor" : "sabit");
      else accelWord = accel === "up" ? "hızlanıyor" : (accel === "down" ? "yavaşlıyor" : "sabit");
    }

    return { S: S, meterPos: meterPos, dirLabel: dirLabel, dirCls: dirCls, arrow: arrow, accelWord: accelWord,
      r1: r1, r3: r3, r6: r6, rsi: rsi, mh: mh, mc: mc };
  }

  // Plain-language Turkish sentence built from the same raw numbers used by
  // computeMomentum (not from the score itself), so it stays legible even in
  // the sparse case where a score exists (e.g. RSI-only) but returns don't.
  function momentumSentence(m) {
    if (!m) return "Momentum için yeterli veri yok.";
    // Turkish sign-then-percent style ("+%12.3" / "-%12.3"): the sign has to
    // be placed before the "%" explicitly, since simple concatenation of a
    // signed number after "%" would instead put the "-" after the "%".
    function signedPct(v) {
      var r = Math.round(v * 10) / 10;
      return (r >= 0 ? "+" : "-") + "%" + Math.abs(r);
    }
    var longTermClause = null;
    if (m.r6 !== null) longTermClause = "Son 6 ayda " + signedPct(m.r6);
    else if (m.r3 !== null) longTermClause = "Son 3 ayda " + signedPct(m.r3);

    var sentence1 = "";
    if (longTermClause !== null) {
      sentence1 = longTermClause;
      if (m.r1 !== null) {
