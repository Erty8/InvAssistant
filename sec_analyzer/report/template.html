<!--
  sec_analyzer "Verdict Terminal" -- unified, self-contained HTML template.

  This single file serves BOTH consumers of the verdict card:
    - CLI `analyze --html` / GET /report (sec_analyzer.report.generator):
      a baked, one-shot report for one ticker/horizon, opened from disk
      (file://...) or served as a response body. No network calls of any
      kind -- fully self-contained.
    - GET / (sec_analyzer.web.app, via generator.render_search_page): the
      interactive ticker search. Same shell, same rendering code, but the
      top nav carries live controls and a POST to /api/analyze feeds the
      exact same body-rendering function.

  The single "__DATA_JSON__" placeholder (inside the
  <script type="application/json"> element below) is replaced by
  sec_analyzer.report.generator with one JSON payload whose "mode" field
  selects which of the two behaviors above this script runs:

    {"mode": "report", ticker, horizon, price, as_of, generated_on, result,
     metrics, technical, red_flags, entity_name}
    {"mode": "search", horizons, providers, default_horizon,
     default_provider, default_model}

  In both modes, once a result payload of the "report" shape is available
  (baked immediately, or fetched live from /api/analyze and reshaped
  client-side), the exact same renderBody() function draws the terminal:
  header, signal-weight bar, fair-value fan chart, triangulation row, three
  verdict cards, sensitivity grid, the four planning cards (entry plan,
  stop-adding, thesis metric, scenario returns), red flags, and the
  catalyst/summary panel. Nothing here is fabricated: every value not
  present in the payload renders "--" or the whole card/section is omitted,
  never "None"/"NaN"/"undefined", and no line is invented that isn't backed
  by a real field (see e.g. footerAnalysisHtml -- no "Recommendation: ..."
  line unless a real field carried one).

  No external resources anywhere: one inline <style>, unicode/inline-SVG
  glyphs only (no icon fonts), and (in report mode) zero network requests
  -- the file opens correctly straight from disk or inside an <iframe>.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verdict Terminal</title>
<style>
  /* Dark-only "terminal" palette -- this design deliberately commits to a
     single dark theme (see sec_analyzer/web/templates' prior design intent
     for the same call), matching the supplied mockup. */
  :root {
    color-scheme: dark;
    --bg: #0d1420;
    --card: #111b2b;
    --border: #223349;
    --text: #e0e2ea;
    --muted: #8b919d;
    --outline: #c0c7d3;
    --primary: #5aa7ff;
    --primary-light: #a2c9ff;
    --green: #4de082;
    --amber: #ffb953;
    --caution: #ff8a3d;
    --red: #ffb4ab;
    --red-container: #93000a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.45;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  .muted { color: var(--muted); }
  .mono { font-family: var(--mono); }

  /* ---- Top nav ---------------------------------------------------------*/
  .topnav {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(13, 20, 32, 0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    margin: 0 0 20px;
  }
  .nav-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
  }
  .brand {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--primary-light);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .nav-date {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--mono);
  }
  .nav-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    flex: 1 1 auto;
  }
  .ticker-input {
    width: 11ch;
    text-transform: uppercase;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
  }
  .ticker-input:focus {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
  }
  .provider-select {
    font-size: 0.82rem;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: var(--sans);
    max-width: 220px;
  }
  .analyze-btn {
    font-size: 0.86rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--primary);
    background: var(--primary);
    color: #06111f;
    cursor: pointer;
  }
  .analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---- Search-mode as-of date control (reuses .provider-select's box
     styling; only adds the bits a native <input type=date> needs) --------*/
  .asof-label {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .asof-input {
    max-width: 150px;
    color-scheme: dark;
  }
  .asof-input:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---- History nav button (search mode) + as-of banner (report mode) ----*/
  .history-nav-btn {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .history-nav-btn:hover { color: var(--text); border-color: var(--muted); }
  .asof-banner {
    display: inline-block;
    font-size: 0.72rem;
    color: var(--amber);
    background: rgba(255, 185, 83, 0.12);
    border: 1px solid rgba(255, 185, 83, 0.35);
    border-radius: 999px;
    padding: 3px 10px;
  }

  /* ---- Shared horizon-toggle pill row ------------------------------------*/
  .horizon-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .horizon-pill {
    font-family: var(--mono);
    font-size: 0.74rem;
    font-weight: 600;
    padding: 6px 12px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-right: 1px solid var(--border);
    cursor: default;
  }
  .horizon-pill:last-child { border-right: none; }
  .horizon-toggle.interactive .horizon-pill { cursor: pointer; }
  .horizon-pill.active {
    background: rgba(90, 167, 255, 0.18);
    color: var(--primary-light);
  }

  /* ---- Cards -------------------------------------------------------------*/
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- Header card ---------------------------------------------------- */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header-left .ticker-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ticker {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .entity-name {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .source-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .header-right {
    text-align: right;
    flex-shrink: 0;
  }
  .price-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
  }
  /* Daily change chip next to the header price. */
  .price-change {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .price-change.chg-up { color: var(--green); }
  .price-change.chg-down { color: var(--red); }
  .price-change.chg-flat { color: var(--muted); }

  /* ---- Analyst consensus reference row (display-only cross-check, NOT the
     model's own fair value -- kept visually subordinate to the header
     price/verdict) --------------------------------------------------------*/
  .analyst-consensus {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
  }
  .analyst-consensus .ac-label {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.66rem;
    color: var(--muted);
    margin-right: 6px;
  }
  .analyst-consensus .ac-mean {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--text);
  }
  .analyst-consensus .ac-up { color: var(--green); }
  .analyst-consensus .ac-down { color: var(--red); }
  .analyst-consensus .ac-count,
  .analyst-consensus .ac-range { color: var(--muted); }
  .analyst-consensus .ac-caption {
    margin-top: 4px;
    font-size: 0.7rem;
    line-height: 1.4;
  }

  /* ---- Signal-weight bar ------------------------------------------------*/
  .weight-bar {
    display: flex;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    margin: 0 0 16px;
    border: 1px solid var(--border);
  }
  .weight-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    font-family: var(--mono);
  }
  .weight-fundamental { background: rgba(90, 167, 255, 0.28); color: var(--primary-light); }
  .weight-technical { background: rgba(255, 185, 83, 0.28); color: var(--amber); }

  /* ---- Fan chart (fair-value ruler) --------------------------------------*/
  .fan-empty {
    font-size: 0.85rem;
  }
  .fan-outer {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fan-labels {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    width: 38px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--muted);
    padding-top: 2px;
    font-family: var(--mono);
  }
  .fan-labels span {
    height: 24px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
  }
  .fan-labels span:last-child { margin-bottom: 0; }
  .fan-plot {
    position: relative;
    flex: 1;
    padding-top: 2px;
  }
  .fan-row-track {
    position: relative;
    height: 24px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 5px;
    cursor: pointer;
  }
  .fan-row-track:last-child { margin-bottom: 0; }
  .fan-row-track.selected {
    box-shadow: 0 0 0 1px var(--outline) inset;
  }
  .fan-band {
    position: absolute;
    top: 0;
    bottom: 0;
    border-radius: 5px;
    border: 1px solid;
  }
  .fan-val {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.66rem;
    white-space: nowrap;
    pointer-events: none;
  }
  .fan-val-outside {
    color: var(--muted);
  }
  .fan-val-inside {
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    padding: 0 4px;
  }
  .fan-val-lo.fan-val-outside { right: 100%; margin-right: 6px; justify-content: flex-end; }
  .fan-val-hi.fan-val-outside { left: 100%; margin-left: 6px; justify-content: flex-start; }
  .fan-val-lo.fan-val-inside { left: 0; margin-left: 6px; justify-content: flex-start; }
  .fan-val-hi.fan-val-inside { right: 0; margin-right: 6px; justify-content: flex-end; }
  .fan-marker {
    position: absolute;
    top: -16px;
    bottom: 0;
    width: 0;
    border-left: 1px dashed var(--outline);
    pointer-events: none;
  }
  .fan-marker-arrow {
    position: absolute;
    top: -15px;
    left: -6px;
    font-size: 10px;
    color: var(--text);
  }
  .fan-marker-price {
    position: absolute;
    top: -30px;
    left: -24px;
    font-size: 0.66rem;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .fan-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin: 10px 0 14px 46px;
  }

  /* ---- Hyper-grower "Fiyatın iması" / expected-value note ----------------*/
  .hyper-note {
    margin: 12px 0 0 46px;
    font-size: 0.76rem;
    color: var(--outline);
    line-height: 1.5;
  }
  .hyper-implied-line { color: var(--caution); }
  .hyper-ev-line { color: var(--muted); margin-top: 4px; }
  .capex-note { color: var(--muted); margin-top: 4px; }
  @media (max-width: 560px) {
    .hyper-note { margin-left: 0; }
  }

  /* ---- Model <-> market divergence block (governor, verdict action) ------*/
  .divergence-box {
    margin: 12px 0 0 46px;
    padding: 10px 12px;
    border: 1px solid var(--caution);
    border-radius: 8px;
    background: rgba(224, 132, 42, 0.08);
    font-size: 0.76rem;
    line-height: 1.5;
  }
  .divergence-title {
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--caution);
    font-size: 0.72rem;
    margin-bottom: 8px;
  }
  .divergence-table { width: 100%; border-collapse: collapse; }
  .divergence-table th, .divergence-table td {
    text-align: right; padding: 3px 6px; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .divergence-table th:first-child, .divergence-table td:first-child { text-align: left; color: var(--muted); font-weight: 400; }
  .divergence-table thead th { color: var(--muted); font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .divergence-model { color: var(--text); }
  .divergence-market { color: var(--caution); font-weight: 600; }
  .divergence-referee { color: var(--muted); margin-top: 8px; }
  @media (max-width: 560px) {
    .divergence-box { margin-left: 0; }
  }

  /* ---- Assumption strip (SCENARIO / GROWTH / DISCOUNT / RATIONALE) -------*/
  .assumption-strip {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 6px 18px;
    margin: 0 0 0 46px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 560px) {
    .assumption-strip { grid-template-columns: 1fr 1fr; margin-left: 0; }
  }
  .assum-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .assum-value {
    font-size: 0.8rem;
    font-family: var(--mono);
  }
  .assum-rationale .assum-value {
    font-family: var(--sans);
    color: var(--outline);
  }

  /* ---- Triangulation card --------------------------------------------- */
  /* Legacy compact chip-row layout -- used only as a fallback when a
     payload doesn't carry tri.rationale (older result shape). */
  .triangulation-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tri-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.74rem;
    background: rgba(255, 255, 255, 0.03);
  }
  .tri-icon { font-size: 0.85rem; font-weight: 700; line-height: 1; }
  .tri-agree .tri-icon { color: var(--green); }
  .tri-disagree .tri-icon { color: var(--red); }
  .tri-muted .tri-icon { color: var(--muted); }
  .tri-label {
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.68rem;
  }
  .tri-signal { font-family: var(--mono); }

  /* Rationale layout -- one row per valuation method, each with its own
     signal badge, an agreement marker against the overall direction, and
     a muted note line explaining *why* (tri.rationale[method]). Falls
     through to the compact chip row above when rationale is absent. */
  .tri-methods {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tri-method + .tri-method {
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .tri-method-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-method-head .tri-label {
    min-width: 84px;
  }
  .tri-marker {
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1;
  }
  .tri-marker-agree { color: var(--green); }
  .tri-marker-disagree { color: var(--red); }
  .tri-marker-muted { color: var(--muted); }
  .tri-reason {
    font-size: 0.78rem;
    color: var(--outline);
    line-height: 1.45;
    margin-top: 4px;
  }
  /* Sector-relative comparison line under the MULTIPLES method: current
     primary multiple vs its Damodaran sector median (VALUATION.md Sec.7
     axis-b), coloured by the sector bucket. */
  .tri-sector {
    font-size: 0.78rem;
    line-height: 1.45;
    margin-top: 6px;
    font-family: var(--mono);
  }
  .tri-sector .tri-sector-label {
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-weight: 700;
    font-size: 0.66rem;
    color: var(--muted);
    font-family: inherit;
    margin-right: 4px;
  }
  .sector-cmp-red { color: var(--red); }
  .sector-cmp-green { color: var(--green); }
  .sector-cmp-muted { color: var(--muted); }
  .tri-confidence {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  /* ---- Badges (status / confidence) -------------------------------------*/
  .badge {
    display: inline-block;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 0.76rem;
    font-weight: 700;
    max-width: 100%;
    overflow-wrap: break-word;
    white-space: nowrap;
  }
  .badge-green { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .badge-amber { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  /* Distinct "caution" bucket for the hyper-grower YÜKSEK BEKLENTİ FİYATLANMIŞ
     verdict -- deliberately a different hue from both the neutral MAKUL
     amber and the PAHALI red, since it signals a different kind of risk
     (price implies an aggressive-but-not-yet-disqualified growth path). */
  .badge-caution { background: rgba(255, 138, 61, 0.16); color: var(--caution); border: 1px solid rgba(255, 138, 61, 0.5); }
  .badge-red { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  /* Neutral bucket for a triangulation method with no usable signal
     (veri_yok) -- deliberately muted/gray rather than any of the four
     verdict colors, since "no data" isn't a point on the cheap<->expensive
     spectrum. */
  .badge-muted { background: rgba(139, 145, 157, 0.14); color: var(--muted); border: 1px solid rgba(139, 145, 157, 0.4); }
  .badge-label {
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-right: 6px;
  }

  /* ---- Verdict cards (fundamental/technical/profile fit) -----------------*/
  .verdict-card-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .gauge {
    position: relative;
    height: 6px;
    border-radius: 3px;
    margin: 2px 2px 2px;
    background: linear-gradient(to right, var(--green), var(--amber), var(--red));
  }
  .gauge-marker {
    position: absolute;
    top: -9px;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--text);
  }
  .verdict-note {
    font-size: 0.82rem;
    color: var(--outline);
    line-height: 1.45;
  }

  /* ---- Technical detail (momentum + support/resistance) ------------------*/
  .tech-section-title {
    font-size: 0.66rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 8px;
  }
  .rsi-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .rsi-gauge {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 4px;
    /* oversold (<30) green zone · neutral mid · overbought (>70) red zone */
    background: linear-gradient(to right,
      rgba(77,224,130,0.55) 0%, rgba(77,224,130,0.55) 30%,
      #2a3547 30%, #2a3547 70%,
      rgba(255,180,171,0.65) 70%, rgba(255,180,171,0.65) 100%);
  }
  .rsi-gauge-marker {
    position: absolute; top: -4px; width: 2px; height: 16px;
    background: var(--text); transform: translateX(-1px); border-radius: 1px;
  }
  .rsi-val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 2em; text-align: right; }
  .rsi-side { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }

  /* ---- Momentum synthesis: verdict badge + directional meter + sentence -- */
  .mom-badge-row { margin-bottom: 10px; }
  .mom-badge { display: inline-block; border-radius: 999px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; }
  .mom-badge-up { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .mom-badge-down { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  .mom-badge-flat { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  .mom-meter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .mom-meter {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 4px;
    /* strong-down (red) -> neutral -> strong-up (green) */
    background: linear-gradient(to right,
      rgba(255,180,171,0.6) 0%, #2a3547 45%, #2a3547 55%, rgba(77,224,130,0.6) 100%);
  }
  .mom-meter-marker {
    position: absolute; top: -4px; width: 2px; height: 16px;
    background: var(--text); transform: translateX(-1px); border-radius: 1px;
  }
  .mom-ends { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  .mom-meter-cap { font-size: 0.72rem; color: var(--muted); text-align: center; margin-bottom: 8px; }
  .mom-note {
    font-size: 0.75rem; line-height: 1.4; margin-top: 4px; margin-bottom: 4px;
    padding: 7px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  /* Swing reversal-confirmation checklist (momentumReversalHtml). */
  .rev-block {
    margin-top: 8px; padding: 9px 11px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .rev-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
  .rev-title { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; }
  .rev-verdict { font-size: 0.72rem; font-weight: 700; }
  .rev-verdict.rev-none { color: var(--muted); }
  .rev-verdict.rev-early { color: var(--amber); }
  .rev-verdict.rev-strong { color: var(--green); }
  .rev-help {
    font-size: 0.68rem; line-height: 1.4; color: var(--muted);
    margin-bottom: 8px; font-style: italic;
  }
  .rev-tune {
    margin-top: 8px; font-size: 0.66rem; line-height: 1.4; color: var(--muted);
    border-top: 1px dashed var(--outline); padding-top: 6px;
  }
  .rev-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
  .rev-row { display: flex; align-items: flex-start; gap: 7px; font-size: 0.75rem; line-height: 1.35; color: var(--outline); }
  .rev-icon { flex: none; width: 1em; font-weight: 700; text-align: center; }
  .rev-row.rev-ok .rev-icon { color: var(--green); }
  .rev-row.rev-pending .rev-icon { color: var(--amber); }
  .rev-row.rev-bad .rev-icon { color: var(--red); }
  .rev-row.rev-none .rev-icon { color: var(--muted); }
  .rev-row.rev-none, .rev-row.rev-bad { color: var(--muted); }
  .rev-watch {
    font-size: 0.72rem; line-height: 1.4; margin-top: 7px;
    padding: 6px 9px; border-radius: 7px; background: rgba(90,167,255,0.10); border: 1px solid var(--border);
    color: var(--outline);
  }
  .rev-watch-label {
    font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    font-weight: 700; margin-right: 6px;
  }
  /* Reversal-building marker chip next to the momentum badge. */
  .rev-badge-mark {
    display: inline-block; margin-left: 8px; padding: 2px 9px; border-radius: 999px;
    font-size: 0.66rem; font-weight: 700; letter-spacing: 0.02em; vertical-align: middle;
  }
  .rev-badge-mark.rev-mark-up { color: var(--green); background: rgba(77, 224, 130, 0.15); border: 1px solid rgba(77, 224, 130, 0.4); }
  .rev-badge-mark.rev-mark-down { color: var(--red); background: rgba(255, 180, 171, 0.15); border: 1px solid rgba(147, 0, 10, 0.55); }
  .rev-badge-mark.sq-mark { color: var(--amber); background: rgba(255, 185, 83, 0.15); border: 1px solid rgba(255, 185, 83, 0.4); }
  /* ATR-based risk readout line under the watch line. */
  .rev-risk {
    font-size: 0.72rem; line-height: 1.4; margin-top: 6px;
    padding: 6px 9px; border-radius: 7px; background: var(--bg); border: 1px solid var(--border);
    color: var(--outline);
  }
  .rev-risk.rev-risk-wide { background: rgba(255, 185, 83, 0.10); border-color: rgba(255, 185, 83, 0.4); }
  /* ---- MOMENTUM card (result.momentum three-layer synthesis) ------------- */
  .mom-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .mom-sub-rows { display: flex; flex-direction: column; gap: 8px; }
  .mom-sub-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  .mom-sub-label {
    flex: none; width: 78px; padding-top: 2px;
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700;
  }
  .mom-sub-body { flex: 1; min-width: 0; font-size: 0.8rem; line-height: 1.4; color: var(--outline); }
  .mom-sub-score { font-size: 0.72rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .mom-mini-spark-wrap { margin-top: 6px; width: 140px; max-width: 100%; }
  .mom-mini-spark { width: 100%; height: 28px; display: block; overflow: visible; }
  .mom-cross-title {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700;
    margin: 10px 0 8px;
  }
  .mom-cross-list { display: flex; flex-direction: column; gap: 6px; }
  .mom-chip { font-size: 0.75rem; line-height: 1.4; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); color: var(--outline); }
  .mom-chip-warn { background: rgba(255, 185, 83, 0.10); border-color: rgba(255, 185, 83, 0.4); }
  .mom-chip-good { background: rgba(77, 224, 130, 0.10); border-color: rgba(77, 224, 130, 0.4); }
  .mom-chip-info { background: var(--bg); }
  /* Synthesis sentence -- the one-line "why" the composite verdict is what it
     is, built in JS from the three layers. */
  .mom-synth { font-size: 0.82rem; line-height: 1.45; color: var(--outline); margin-bottom: 12px; }
  /* Closing disclaimer -- momentum is timing context, never a fair-value input. */
  .mom-help { font-size: 0.68rem; line-height: 1.4; color: var(--muted); font-style: italic; margin-top: 10px; }
  /* ---- Price x Fundamental momentum quadrant (the "combine" element) ----- */
  .mom-quad-wrap { margin: 4px 0 10px; }
  .mom-quad-yaxis-row { display: flex; align-items: stretch; gap: 6px; }
  .mom-quad-ylabel {
    flex: none; writing-mode: vertical-rl; transform: rotate(180deg);
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    font-weight: 700; text-align: center; padding: 4px 0;
  }
  .mom-quad-box { flex: 1; min-width: 0; }
  .mom-quad-svg { width: 100%; height: auto; display: block; overflow: visible; max-width: 100%; }
  .mom-quad-zone { opacity: 0.9; }
  .mom-quad-zone-confirmed { fill: rgba(77, 224, 130, 0.12); }
  .mom-quad-zone-opportunity { fill: rgba(45, 212, 191, 0.12); }
  .mom-quad-zone-trap { fill: rgba(255, 185, 83, 0.12); }
  .mom-quad-zone-weak { fill: rgba(255, 180, 171, 0.10); }
  .mom-quad-axis { stroke: var(--border); stroke-width: 1.2; }
  .mom-quad-label { font-size: 7.5px; font-weight: 700; letter-spacing: 0.01em; }
  .mom-quad-label-confirmed { fill: var(--green); }
  .mom-quad-label-opportunity { fill: #2dd4bf; }
  .mom-quad-label-trap { fill: var(--amber); }
  .mom-quad-label-weak { fill: var(--muted); }
  .mom-quad-dot { stroke: var(--text); stroke-width: 1.2; }
  .mom-quad-dot-confirmed { fill: var(--green); }
  .mom-quad-dot-opportunity { fill: #2dd4bf; }
  .mom-quad-dot-trap { fill: var(--amber); }
  .mom-quad-dot-weak { fill: var(--red); }
  .mom-quad-axis-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
  .mom-quad-end { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  .mom-quad-axis-caption { font-size: 0.66rem; color: var(--muted); flex: 1; text-align: center; }
  .mom-quad-legend { font-size: 0.62rem; color: var(--muted); text-align: center; margin-top: 6px; line-height: 1.4; }
  /* ---- Değer seyri (verdict-momentum) context strip ----------------------- */
  .mom-vt-strip { margin-top: 10px; padding: 9px 11px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); }
  .mom-vt-title { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .mom-vt-body { font-size: 0.8rem; line-height: 1.4; color: var(--outline); }
  .mom-spark-caption { font-size: 0.66rem; color: var(--muted); margin-top: 2px; }
  /* ---- Score breakdown: what each score is made of ----------------------- */
  .mom-breakdown { display: flex; flex-wrap: wrap; gap: 10px 18px; margin: 4px 0 2px; }
  .mom-bd-col { flex: 1 1 260px; min-width: 0; }
  .mom-bd-title { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .mom-bd-title b { color: var(--text); font-weight: 700; }
  .mom-bd-row { display: grid; grid-template-columns: 1fr 74px 34px; align-items: center; gap: 8px; padding: 2.5px 0; font-size: 0.74rem; }
  .mom-bd-label { color: var(--outline); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Signed bar: a fixed track with a center line; the fill grows left (neg)
     or right (pos) from the middle, so contributions are comparable at a glance. */
  .mom-bd-bar-track { position: relative; height: 8px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .mom-bd-bar-track::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .mom-bd-bar { position: absolute; top: 1px; bottom: 1px; border-radius: 2px; }
  .mom-bd-bar-pos { background: var(--green); left: 50%; }
  .mom-bd-bar-neg { background: var(--red); right: 50%; }
  .mom-bd-val { font-variant-numeric: tabular-nums; text-align: right; font-size: 0.7rem; }
  .mom-bd-val-pos { color: var(--green); }
  .mom-bd-val-neg { color: var(--red); }
  .mom-bd-val-zero { color: var(--muted); }
  .mom-bd-sig { display: grid; grid-template-columns: 16px 1fr; align-items: baseline; gap: 6px; padding: 2.5px 0; font-size: 0.74rem; color: var(--outline); }
  .mom-bd-icon { font-weight: 700; text-align: center; }
  .mom-bd-icon-ok { color: var(--green); }
  .mom-bd-icon-bad { color: var(--red); }
  .mom-bd-icon-neutral { color: var(--muted); }
  .tech-stat-sub { color: var(--muted); font-size: 0.72rem; font-weight: 400; }
  /* ---- Swing setup grade card -------------------------------------------- */
  .setup-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .setup-grade {
    flex: none; width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 800; line-height: 1;
  }
  .setup-grade.grade-a { color: var(--green); background: rgba(77, 224, 130, 0.16); border: 1px solid rgba(77, 224, 130, 0.5); }
  .setup-grade.grade-b { color: var(--amber); background: rgba(255, 185, 83, 0.16); border: 1px solid rgba(255, 185, 83, 0.5); }
  .setup-grade.grade-c { color: var(--muted); background: rgba(139, 145, 157, 0.16); border: 1px solid var(--border); }
  .setup-note { font-size: 0.82rem; line-height: 1.4; color: var(--text); }
  .setup-parts { display: flex; flex-wrap: wrap; gap: 8px; }
  .setup-part {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 7px; background: var(--bg); border: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .setup-part-icon { font-weight: 700; }
  .setup-part.setup-ok .setup-part-icon { color: var(--green); }
  .setup-part.setup-pending .setup-part-icon { color: var(--amber); }
  .setup-part.setup-bad .setup-part-icon { color: var(--red); }
  .setup-part.setup-none .setup-part-icon { color: var(--muted); }
  .setup-part-label { color: var(--muted); text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.04em; font-weight: 700; }
  .setup-part-text { font-weight: 600; }
  .setup-earn {
    margin-top: 10px; font-size: 0.74rem; line-height: 1.4; color: var(--outline);
    padding: 7px 10px; border-radius: 7px; background: rgba(255, 185, 83, 0.10); border: 1px solid rgba(255, 185, 83, 0.4);
  }
  .setup-earn-badge { color: var(--amber); font-weight: 700; margin-right: 4px; }
  .setup-disc { margin-top: 10px; font-size: 0.66rem; color: var(--muted); font-style: italic; }
  .tech-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 8px;
  }
  .tech-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 9px;
    min-width: 0;
  }
  .tech-stat-label {
    font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
  }
  .tech-stat-val { font-size: 0.9rem; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .tech-pos { color: var(--green); }
  .tech-neg { color: var(--red); }
  .tech-div-note {
    font-size: 0.75rem; line-height: 1.4; margin-top: 8px;
    padding: 7px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  .sr-ladder { display: flex; flex-direction: column; gap: 4px; }
  .sr-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 10px; border-radius: 7px; font-variant-numeric: tabular-nums;
  }
  .sr-res { background: rgba(255,180,171,0.10); }
  .sr-sup { background: rgba(77,224,130,0.10); }
  .sr-price { background: rgba(90,167,255,0.16); border: 1px solid var(--border); }
  .sr-side { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); min-width: 72px; }
  .sr-lvl { font-weight: 600; min-width: 8.5em; white-space: nowrap; }
  .sr-dist { font-size: 0.8rem; min-width: 3.6em; }
  .sr-why { flex: 1; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-strength-badge {
    font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 1px 7px; border-radius: 6px; white-space: nowrap;
  }
  .sr-str-strong { color: var(--green); background: rgba(77, 224, 130, 0.14); }
  .sr-str-medium { color: var(--amber); background: rgba(255, 185, 83, 0.14); }
  .sr-str-weak { color: var(--muted); background: rgba(139, 145, 157, 0.16); }
  .sr-fib-caption { font-size: 0.68rem; color: var(--muted); margin-bottom: 6px; }
  .tech-empty { color: var(--muted); font-size: 0.82rem; }

  /* ---- Trend & triggers (Technical card primary view) --------------------*/
  .trend-regime { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 4px 0 6px; }
  .regime-badge { display: inline-block; border-radius: 999px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; }
  .regime-up { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .regime-down { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  .regime-neutral { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  .regime-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
  .regime-evi { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .trend-callout { display: flex; align-items: flex-start; gap: 8px; border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; font-size: 0.84rem; line-height: 1.45; }
  .callout-up { background: rgba(77, 224, 130, 0.10); border: 1px solid rgba(77, 224, 130, 0.35); }
  .callout-up .co-arrow { color: var(--green); }
  .callout-down { background: rgba(255, 180, 171, 0.10); border: 1px solid rgba(147, 0, 10, 0.5); }
  .callout-down .co-arrow { color: var(--red); }
  .co-arrow { font-size: 1rem; line-height: 1.2; flex-shrink: 0; }
  .trigger-ladder { display: flex; flex-direction: column; gap: 5px; }
  .trig-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; border-left: 3px solid transparent; background: rgba(255, 255, 255, 0.03); }
  .trig-up { border-left-color: var(--green); }
  .trig-down { border-left-color: var(--red); }
  .trig-now { border-left-color: var(--primary); background: rgba(90, 167, 255, 0.14); }
  .trig-nearest { box-shadow: 0 0 0 1px rgba(192, 199, 211, 0.5) inset; }
  .trig-arrow { width: 14px; text-align: center; font-size: 0.8rem; flex-shrink: 0; }
  .trig-up .trig-arrow { color: var(--green); }
  .trig-down .trig-arrow { color: var(--red); }
  .trig-now .trig-arrow { color: var(--primary); }
  .trig-price { font-family: var(--mono); font-weight: 700; font-size: 0.9rem; min-width: 104px; flex-shrink: 0; }
  .trig-rule { flex: 1; font-size: 0.8rem; line-height: 1.35; min-width: 0; }
  .trig-reason { color: var(--muted); }
  .trig-now-tag { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; color: var(--primary-light); }
  .trig-dist { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; min-width: 60px; text-align: right; flex-shrink: 0; }
  .tech-toggle { margin-top: 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 7px 12px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; cursor: pointer; font-family: var(--mono); }
  .tech-toggle:hover { border-color: var(--outline); color: var(--text); }
  .tech-details { margin-top: 14px; }
  @media (max-width: 560px) {
    .trig-rule { flex-basis: 100%; order: 3; }
  }

  /* ---- Price chart (price line + S/R + fair-value bands) -----------------*/
  .pchart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pchart-head .card-title { margin: 0; }
  .pchart svg { width: 100%; height: auto; display: block; }
  .pchart-area { fill: rgba(90, 167, 255, 0.12); stroke: none; }
  .pchart-line { fill: none; stroke: #5aa7ff; stroke-width: 1.6; }
  .pchart-grid { stroke: var(--border); stroke-width: 1; opacity: 0.55; }
  .pchart-tick { fill: var(--muted); font-size: 10px; }
  /* Support & resistance are drawn identically (a single dark-red line at
     each zone's price, no fill) -- only the R/S label distinguishes them.
     Simpler than a filled band: less visual clutter, no overlap fights with
     the fair-value box. */
  .pchart-sr-line { stroke: #7a1f1f; stroke-width: 1.5; opacity: 0.9; }
  .pchart-band-label { font-size: 9px; font-weight: 600; fill: #c0605f; }
  .pchart-fv-bull { stroke: var(--green); }
  .pchart-fv-bear { stroke: var(--red); }
  .pchart-fv-label { font-size: 9px; }
  .pchart-fv-ann { font-size: 8px; fill: var(--muted); }
  .pchart-now-line { stroke: var(--text); stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.75; }
  .pchart-now-label { font-size: 10px; fill: var(--text); font-weight: 700; }
  /* ---- Analyst consensus overlay (horizontal reference line + band) ----- */
  .pchart-analyst-band { fill: rgba(255, 185, 83, 0.12); stroke: none; }
  .pchart-analyst-line { stroke: var(--amber); stroke-width: 1.3; stroke-dasharray: 5 3; fill: none; opacity: 0.9; }
  .pchart-analyst-label { font-size: 9px; fill: var(--amber); }
  /* ---- Fair-value fan (today -> horizon projection cone) ---------------- */
  .pchart-fan-outer { fill: rgba(139, 145, 157, 0.14); stroke: none; }
  .pchart-fan-up { fill: rgba(77, 224, 130, 0.15); stroke: none; }
  .pchart-fan-down { fill: rgba(255, 180, 171, 0.15); stroke: none; }
  .pchart-fan-line { stroke-width: 1.2; fill: none; opacity: 0.85; }
  .pchart-fan-baseline { stroke: #5aa7ff; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; }
  .pchart-apex { fill: var(--text); stroke: var(--bg); stroke-width: 1; }
  .pchart-caption { font-size: 0.72rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .pchart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 0.7rem; color: var(--muted); }
  .pchart-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .pchart-sw { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }

  /* ---- Sensitivity table -------------------------------------------------*/
  .uncertainty-tag {
    display: inline-block;
    background: rgba(255, 185, 83, 0.15);
    color: var(--amber);
    border: 1px solid rgba(255, 185, 83, 0.4);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 0.64rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .sensitivity-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.76rem;
  }
  .sensitivity-table th, .sensitivity-table td {
    border: 1px solid var(--border);
    padding: 6px 4px;
    text-align: center;
  }
  .sensitivity-table thead th {
    color: var(--muted);
    font-weight: 400;
  }
  .sens-row-h {
    color: var(--muted);
    font-weight: 400;
  }
  .sens-base {
    background: rgba(90, 167, 255, 0.18);
    border-color: var(--primary);
    font-weight: 700;
  }
  .sens-axis-note {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ---- Entry plan table (reuses .sensitivity-table/.sens-base) -----------*/
  .entry-plan-table td.entry-trigger {
    text-align: left;
    font-family: var(--sans);
    font-size: 0.72rem;
    line-height: 1.4;
  }
  .entry-kind-tag {
    display: inline-block;
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 0.62rem;
    font-weight: 700;
    margin-right: 6px;
    white-space: nowrap;
    vertical-align: middle;
  }
  .entry-kind-breakout {
    background: rgba(77, 224, 130, 0.15);
    color: var(--green);
    border: 1px solid rgba(77, 224, 130, 0.4);
  }
  .entry-kind-dip {
    background: rgba(255, 180, 171, 0.15);
    color: var(--red);
    border: 1px solid rgba(147, 0, 10, 0.55);
  }
  .entry-plan-table tr.entry-note-row td {
    text-align: left;
    color: var(--amber);
    font-family: var(--sans);
    font-size: 0.72rem;
  }
  .card-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin: -8px 0 14px;
    line-height: 1.5;
  }

  /* ---- History mode (verdict-history table, reuses .sensitivity-table's
     border/spacing but left-aligns text and uses the sans font) -----------*/
  .history-header {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0 0 14px;
  }
  .history-caption {
    font-size: 0.78rem;
    color: var(--muted);
    margin: -6px 0 14px;
  }
  .history-table th, .history-table td {
    text-align: left;
    font-family: var(--sans);
  }
  .history-table td.history-num { font-family: var(--mono); white-space: nowrap; }
  .asof-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(90, 167, 255, 0.18);
    color: var(--primary-light);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ---- Scenario returns list ---------------------------------------------*/
  .scenario-returns-list { display: flex; flex-direction: column; gap: 6px; }
  .scen-ret-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
  }
  .scen-ret-name { color: var(--muted); font-family: var(--mono); font-weight: 700; }
  .scen-ret-value { font-family: var(--mono); }

  /* ---- Thesis metric -------------------------------------------------- */
  .thesis-metric-line { font-size: 0.9rem; margin: 0 0 8px; }
  .thesis-rationale {
    font-size: 0.78rem;
    color: var(--outline);
    line-height: 1.5;
    margin: 0;
  }
  /* Level sparkline: the anchor metric's year-by-year trajectory
     (cycle.series). Sits above the positional bar -- the sparkline's x-axis
     is TIME (fiscal years), the bar's is VALUE position, so each carries its
     own label to keep the two axes from being read as one. */
  .spark-block {
    margin: 12px 0 0;
    padding: 12px 0 0;
    border-top: 1px solid var(--border);
  }
  .spark-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .spark-svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }
  .spark-line {
    fill: none;
    stroke: var(--primary);
    stroke-width: 1.6;
    vector-effect: non-scaling-stroke;
  }
  .spark-dot { fill: var(--muted); }
  .spark-dot-last { fill: var(--primary-light); }
  .spark-fy { fill: var(--muted); font-size: 11px; font-family: var(--mono); }

  /* Cycle-position bar: where the anchor metric's latest value sits inside
     its own multi-year trough->peak range (planning._compute_cycle_position).
     Deliberately a NEUTRAL track -- near-peak is danger for a cyclical but
     health for a mature name, so the bar states position without colouring
     a verdict; the marker (bright) carries the reading. */
  .cycle-block {
    margin: 12px 0 4px;
    padding: 12px 0 0;
    border-top: 1px solid var(--border);
  }
  .cycle-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .cycle-track {
    position: relative;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.12));
    border: 1px solid var(--border);
  }
  .cycle-mid {
    position: absolute;
    left: 50%;
    top: -3px;
    bottom: -3px;
    width: 1px;
    background: var(--border);
  }
  .cycle-marker {
    position: absolute;
    top: -5px;
    width: 2px;
    height: 18px;
    background: var(--text);
    transform: translateX(-1px);
    border-radius: 1px;
    box-shadow: 0 0 0 2px rgba(13, 20, 32, 0.7);
  }
  .cycle-ends {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-family: var(--mono);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    margin-top: 9px;
  }
  .cycle-ends span:nth-child(2) { opacity: 0.65; }
  .cycle-caption {
    font-size: 0.76rem;
    color: var(--outline);
    line-height: 1.5;
    margin-top: 9px;
  }
  .cycle-thin { color: var(--amber); font-style: italic; }

  /* ---- Alert-style boxes (red flags / stop-adding) -----------------------*/
  .alert-box ul {
    margin: 0;
    padding-left: 18px;
  }
  .alert-box li {
    margin-bottom: 8px;
    font-size: 0.84rem;
  }
  .alert-box li:last-child { margin-bottom: 0; }
  .alert-box li .item-detail {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 2px;
  }
  .alert-box li .event-sev {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .alert-box li.event-critical .event-sev { background: rgba(220, 38, 38, 0.18); color: #f87171; }
  .alert-box li.event-warning  .event-sev { background: rgba(217, 119, 6, 0.18); color: #fbbf24; }
  .alert-box li.event-info     .event-sev { background: rgba(148, 163, 184, 0.18); color: var(--muted); }
  .empty-note {
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* ---- Footer analysis (catalyst + summary) -------------------------------*/
  .catalyst-line {
    font-family: var(--mono);
    font-size: 0.86rem;
    margin: 0 0 10px;
  }
  .summary-text {
    font-size: 0.9rem;
    line-height: 1.55;
    margin: 0;
    color: var(--outline);
  }

  /* ---- Global footer ---------------------------------------------------- */
  .global-footer {
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
    line-height: 1.6;
    text-align: center;
  }
  .global-footer a { color: var(--muted); }

  /* ---- Search-mode empty/loading/error states -----------------------------*/
  .empty-state, .loading-state {
    text-align: center;
    padding: 34px 16px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-top-color: var(--primary-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -2px;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner {
    border: 1px solid rgba(255, 180, 171, 0.5);
    background: rgba(147, 0, 10, 0.18);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.86rem;
    color: var(--red);
  }

  /* ---- Error card (analysis failed / result.error) ------------------------*/
  .error-box {
    border: 1px solid rgba(255, 180, 171, 0.5);
    background: rgba(147, 0, 10, 0.15);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .error-box strong {
    display: block;
    margin-bottom: 6px;
    color: var(--red);
  }
  .error-box p { margin: 0; font-size: 0.88rem; color: var(--outline); }
</style>
</head>
<body>

<script id="report-data" type="application/json">__DATA_JSON__</script>

<div class="page">
  <nav class="topnav" id="topnav"></nav>
  <div id="body"></div>
</div>

<script>
(function () {
  "use strict";

  var raw = document.getElementById("report-data").textContent;
  var data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    document.getElementById("body").innerHTML =
      '<div class="card"><p>Report data could not be read.</p></div>';
    return;
  }

  var topnavEl = document.getElementById("topnav");
  var bodyEl = document.getElementById("body");

  // -------------------------------------------------------------------
  // Formatting helpers -- every one of these is None-safe: a missing/
  // non-numeric value always renders "--", never "None"/"NaN"/"undefined".
  // -------------------------------------------------------------------

  function isNum(v) {
    return v !== null && v !== undefined && v !== "" && !Number.isNaN(Number(v));
  }

  function escapeHtml(value) {
    var div = document.createElement("div");
    div.textContent = value === null || value === undefined ? "" : String(value);
    return div.innerHTML;
  }

  function fmtMoney(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "";
    var abs = Math.abs(num);
    var decimals = Number.isInteger(abs) ? 0 : 2;
    return sign + "$" + abs.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  // Renders a decimal fraction (0.08 -> "8%") -- used for sensitivity-table
  // axis labels (growth_values/dr_values, which arrive as decimal fractions).
  function fmtPct(v) {
    if (!isNum(v)) return "—";
    var pct = Number(v) * 100;
    var rounded = Math.round(pct * 10) / 10;
    var text = (Math.abs(rounded % 1) < 1e-9) ? rounded.toFixed(0) : rounded.toFixed(1);
    return text + "%";
  }

  // Renders an already-percentage number (e.g. 40.0, NOT a decimal fraction)
  // with no sign -- used for entry_plan's size_pct (interpret layer already
  // computes this as a percentage, not a decimal fraction).
  function fmtRawPct(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var rounded = Math.round(num * 10) / 10;
    var text = (Math.abs(rounded % 1) < 1e-9) ? rounded.toFixed(0) : rounded.toFixed(1);
    return text + "%";
  }

  // Renders an already-percentage number with an explicit +/- sign -- used
  // for scenario_returns' ret_lo_pct/ret_hi_pct.
  function fmtSignedPct(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "+";
    return sign + Math.abs(num).toFixed(1) + "%";
  }

  // Compact dollar formatting for large revenue figures (e.g. 25378308623.19
  // -> "$25.4B") -- used only by the hyper-grower "Fiyatın iması" line, where
  // fmtMoney's full-precision output would be unreadable.
  function fmtCompactMoney(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "";
    var abs = Math.abs(num);
    var scaled = abs, suffix = "";
    if (abs >= 1e12) { scaled = abs / 1e12; suffix = "T"; }
    else if (abs >= 1e9) { scaled = abs / 1e9; suffix = "B"; }
    else if (abs >= 1e6) { scaled = abs / 1e6; suffix = "M"; }
    else if (abs >= 1e3) { scaled = abs / 1e3; suffix = "K"; }
    return sign + "$" + scaled.toFixed(1) + suffix;
  }

  // Renders a decimal fraction in the Turkish percent-first convention
  // (0.481 -> "%48.1") -- matches the style already used by the engine's
  // own Turkish strings (e.g. hyper_growth_detail.reasons' "Gelir CAGR
  // %48.9"); fmtPct/fmtRawPct above are English-style (number-then-%) and
  // stay as-is for their existing (non-Turkish-prose) call sites.
  function fmtPctTr(v, decimals) {
    if (!isNum(v)) return "—";
    var pct = Number(v) * 100;
    var d = decimals === undefined ? 1 : decimals;
    return "%" + pct.toFixed(d);
  }

  // Same Turkish percent-first convention as fmtPctTr, but for a value that
  // is ALREADY a percentage (not a decimal fraction) and needs an explicit
  // +/- sign -- used for the history screen's "vs. last analysis" delta.
  function fmtSignedPctTr(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var sign = num < 0 ? "-" : "+";
    return "%" + sign + Math.abs(num).toFixed(1);
  }

  // growth/discount_rate/note arrive as ready-made, human-readable strings
  // (often Turkish, e.g. "%8 büyüme") from every provider -- never reformat
  // or translate them, just guard against missing values.
  function safeText(v) {
    return v === null || v === undefined || v === "" ? "—" : String(v);
  }

  function hexToRgba(hex, alpha) {
    var h = hex.replace("#", "");
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  // Maps a verdict/label string onto one of four color buckets. Order
  // matters: the "YÜKSEK BEKLENTİ" (hyper-grower) check runs before the red
  // check so its distinct caution styling is never swallowed by a
  // coincidental substring match, red-bucket keywords are checked before
  // falling back to amber, so e.g. "AŞIRI ALIM" (contains "ALIM") is never
  // mistaken for something else, and unrecognized/empty text defaults to
  // the neutral amber bucket.
  // UCUZ/AŞIRI SATIM/UYUMLU -> green, MAKUL/NÖTR/KISMEN -> amber,
  // YÜKSEK BEKLENTİ FİYATLANMIŞ -> caution (distinct amber/orange),
  // PAHALI/AŞIRI ALIM/UYUMSUZ -> red.
  function bucketColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("UCUZ") !== -1 || s.indexOf("AŞIRI SATIM") !== -1 || s.indexOf("UYUMLU") !== -1) return "green";
    if (s.indexOf("YÜKSEK BEKLENTİ") !== -1 || s.indexOf("YUKSEK BEKLENTI") !== -1) return "caution";
    if (s.indexOf("PAHALI") !== -1 || s.indexOf("AŞIRI ALIM") !== -1 || s.indexOf("UYUMSUZ") !== -1) return "red";
    return "amber";
  }

  // Confidence-badge color: YÜKSEK -> green, ORTA -> amber, DÜŞÜK -> red.
  function confidenceColor(text) {
    if (!text) return "amber";
    var s = String(text).toUpperCase();
    if (s.indexOf("YÜKSEK") !== -1 || s.indexOf("YUKSEK") !== -1) return "green";
    if (s.indexOf("DÜŞÜK") !== -1 || s.indexOf("DUSUK") !== -1) return "red";
    return "amber";
  }

  var GAUGE_POSITION = { green: 10, amber: 50, caution: 72, red: 90 };
  var SCENARIO_LABEL = { bear: "BEAR", base: "BASE", bull: "BULL" };
  var SCENARIO_ORDER = ["bull", "base", "bear"];
  var SCENARIO_HEX = { bear: "#ffb4ab", base: "#5aa7ff", bull: "#4de082" };
  // Chrome-level labels for the raw triangulation signal codes
  // (valuation.triangulation.signals -- lowercase internal codes, not
  // free-text meant for direct display).
  var SIGNAL_LABEL = { ucuz: "CHEAP", makul: "FAIR", yuksek_beklenti: "HIGH EXP", pahali: "EXPENSIVE", karisik: "MIXED", veri_yok: "NO DATA" };
  var HORIZON_SHORT = { "3m": "3M", "1y": "1Y", "5y": "5Y" };
  // Calendar-day windows the price chart slices its (up-to-5y) series by for
  // each range, and the year counts used to annualize the "if price converges
  // to this scenario by the horizon end" expected return.
  var HORIZON_DAYS = { "3m": 95, "1y": 370, "5y": 2000 };
  var HORIZON_YEARS = { "3m": 0.25, "1y": 1, "5y": 5 };

  function signalLabel(s) {
    if (!s) return "—";
    return SIGNAL_LABEL[String(s).toLowerCase()] || String(s).toUpperCase();
  }

  function horizonLabel(v) {
    return HORIZON_SHORT[v] || String(v || "—").toUpperCase();
  }

  // -------------------------------------------------------------------
  // Shared horizon-toggle pill row. `values` is the ordered list of
  // horizon codes to show (defaults to the standard three); `interactive`
  // wires a click handler that calls `onSelect(value)` -- used by the
  // search-mode nav control, while the header's own toggle is a plain
  // read-only indicator of which horizon the current report reflects.
  // -------------------------------------------------------------------
  function horizonToggleHtml(values, current, interactive, idAttr) {
    var pills = (values || ["3m", "1y", "5y"]).map(function (v) {
      var active = v === current ? " active" : "";
      return '<button type="button" class="horizon-pill' + active + '" data-horizon="' +
        escapeHtml(v) + '">' + escapeHtml(horizonLabel(v)) + '</button>';
    }).join("");
    var idHtml = idAttr ? ' id="' + idAttr + '"' : "";
    return '<div class="horizon-toggle' + (interactive ? " interactive" : "") + '"' + idHtml + '>' + pills + '</div>';
  }

  // ===================================================================
  // Section builders -- shared by both modes via renderBody().
  // ===================================================================

  // ---- Analyst consensus reference row (display-only cross-check) --------
  // Purely informational -- shows a third-party price-target consensus
  // (e.g. yfinance) next to the current price. This is NEVER the model's own
  // fair value; kept visually subordinate (small, muted caption explaining
  // its source) so it can't be mistaken for the verdict. Renders "" whenever
  // payload.analyst is absent/null or lacks a usable target_mean, so older
  // payloads without this key render byte-identical to before.
  function analystRowHtml(payload) {
    var a = payload && payload.analyst;
    if (!a || !isNum(a.target_mean)) return "";

    var meanText = fmtMoney(a.target_mean);

    var upsideHtml = "";
    if (isNum(payload.price) && Number(payload.price) > 0) {
      var upsidePct = (Number(a.target_mean) / Number(payload.price) - 1) * 100;
      var upsideCls = upsidePct >= 0 ? "ac-up" : "ac-down";
      upsideHtml = ' <span class="' + upsideCls + '">(' + fmtSignedPct(upsidePct) + ')</span>';
    }

    var countHtml = isNum(a.num_analysts)
      ? ' <span class="ac-count">(' + Math.round(Number(a.num_analysts)) + ' analist)</span>'
      : "";

    var rangeHtml = (isNum(a.target_low) && isNum(a.target_high))
      ? ' <span class="ac-range">· aralık ' + fmtMoney(a.target_low) + '–' + fmtMoney(a.target_high) + '</span>'
      : "";

    var sourceText = a.source ? escapeHtml(String(a.source)) : "yfinance / analist konsensüsü";

    return (
      '<div class="analyst-consensus">' +
        '<span class="ac-label">Analist Hedefi (konsensüs):</span>' +
        '<span class="ac-mean">' + meanText + '</span> <span class="muted">ort</span>' +
        upsideHtml + countHtml + rangeHtml +
        '<div class="ac-caption">Dış kaynak: ' + sourceText +
          ' — bu, modelin kendi adil değeri DEĞİLDİR; yalnızca karşılaştırma amaçlı bir dış referanstır.</div>' +
      '</div>'
    );
  }

  // Daily price change chip shown next to the header price. Reads the
  // first-class `change_1d_pct` off the technical payload; renders "" when
  // absent (older payloads / no price history) so nothing breaks.
  function dailyChangeHtml(payload) {
    var t = payload && payload.technical;
    if (!t || !isNum(t.change_1d_pct)) return "";
    var pct = Number(t.change_1d_pct);
    var cls = pct > 0 ? "chg-up" : (pct < 0 ? "chg-down" : "chg-flat");
    var arrow = pct > 0 ? "▲" : (pct < 0 ? "▼" : "•");
    return '<span class="price-change ' + cls + '">' + arrow + ' ' + fmtSignedPct(pct) + '</span>';
  }

  // ---- Header card ------------------------------------------------------
  function headerCardHtml(payload) {
    var priceText = fmtMoney(payload.price);
    // macro_asof (SPEC.md as-of mode) carries which macro-input vintage (ERP,
    // risk-free rate) fed the valuation when the run is point-in-time; only
    // present on result.valuation, so this degrades to "" for every older/
    // live payload without it.
    var macroAsof = ((payload.result || {}).valuation || {}).macro_asof;
    var macroNote = (macroAsof && (macroAsof.erp_source || macroAsof.risk_free_source))
      ? " · Makro: ERP " + escapeHtml(macroAsof.erp_source || "—") +
        ", risksiz faiz " + escapeHtml(macroAsof.risk_free_source || "—")
      : "";
    var sourceNote = "SEC EDGAR + Stooq" + (payload.as_of ? " · as of " + escapeHtml(payload.as_of) : "") + macroNote;
    var entityHtml = payload.entity_name
      ? '<span class="entity-name">' + escapeHtml(payload.entity_name) + '</span>'
      : "";
    return (
      '<div class="card">' +
        '<div class="header-row">' +
          '<div class="header-left">' +
            '<div class="ticker-line">' +
              '<span class="ticker">' + escapeHtml(payload.ticker || "—") + '</span>' +
              entityHtml +
            '</div>' +
            '<div class="source-note">' + sourceNote + '</div>' +
          '</div>' +
          '<div class="header-right">' +
            '<div class="price-value">' + priceText + dailyChangeHtml(payload) + '</div>' +
          '</div>' +
        '</div>' +
        analystRowHtml(payload) +
      '</div>'
    );
  }

  // ---- Signal-weight bar --------------------------------------------------
  function weightBarHtml(weights) {
    var w = weights || {};
    var f = typeof w.fundamental === "number" ? w.fundamental : 0.5;
    var t = typeof w.technical === "number" ? w.technical : 0.5;
    var fPct = Math.round(f * 100);
    var tPct = Math.round(t * 100);
    return (
      '<div class="weight-bar">' +
        '<div class="weight-seg weight-fundamental" style="width:' + fPct + '%;">FUNDAMENTAL ' + fPct + '%</div>' +
        '<div class="weight-seg weight-technical" style="width:' + tPct + '%;">TECHNICAL ' + tPct + '%</div>' +
      '</div>'
    );
  }

  // ---- Fair-value fan chart ------------------------------------------------
  // Horizontal-ruler price scale per scenario band: min(bear.lo, price)*0.95
  // .. max(bull.hi, price)*1.05, falling back to whatever numeric values
  // *are* available when bear/bull/price are partially missing, so the
  // chart still renders something useful rather than an all-or-nothing
  // empty state.
  function computeFanScale(fv, price) {
    var bear = fv.bear || {}, bull = fv.bull || {}, base = fv.base || {};
    var bearLo = isNum(bear.lo) ? Number(bear.lo) : null;
    var bullHi = isNum(bull.hi) ? Number(bull.hi) : null;
    var p = isNum(price) ? Number(price) : null;
    var fallback = [bearLo, bullHi, p, base.lo, base.hi, bear.hi, bull.lo]
      .map(function (v) { return isNum(v) ? Number(v) : null; })
      .filter(function (v) { return v !== null; });
    if (fallback.length === 0) return null;

    var lowAnchor = (bearLo !== null && p !== null) ? Math.min(bearLo, p) :
      (bearLo !== null ? bearLo : (p !== null ? p : Math.min.apply(null, fallback)));
    var highAnchor = (bullHi !== null && p !== null) ? Math.max(bullHi, p) :
      (bullHi !== null ? bullHi : (p !== null ? p : Math.max.apply(null, fallback)));

    var minV = lowAnchor * 0.95;
    var maxV = highAnchor * 1.05;
    if (minV > maxV) { var t = minV; minV = maxV; maxV = t; }
    if (minV === maxV) {
      var bump = Math.max(1, Math.abs(minV) * 0.1);
      minV -= bump;
      maxV += bump;
    }
    return { minV: minV, maxV: maxV };
  }

  // ---- Hyper-grower "Fiyatın iması" + expected-value note (Milestone E) --
  // Only rendered when valuation.hyper_growth is true; every existing
  // non-hyper render path is unaffected since this returns "" otherwise.
  // Degrades through the three tiers HYPER_SPEC.md Sec.6 describes,
  // depending on which implied fields the engine's reverse bisection
  // managed to solve for (it can fail to converge for either growth or
  // margin independently) -- never renders "None"/"NaN".
  // ---- Maintenance/growth CapEx normalization sub-block (SPEC.md Sec.3.6) --
  // Shared by the hyper-grower and mid-growth revenue-first extras below --
  // both read a `capex_normalization` dict (or null/absent) off their own
  // detail object with the exact same shape, so the rendering only needs to
  // exist once. Renders "" when the split wasn't applied (null/falsy
  // `.applied`), which is the common case (most filers aren't capex-heavy
  // enough to trigger the gate in engine._maintenance_adjusted_margin).
  function capexNormalizationHtml(capexNorm) {
    if (!capexNorm || !capexNorm.applied) return "";
    var intensityText = fmtPctTr(capexNorm.capex_intensity);
    var rawText = fmtPctTr(capexNorm.raw_current_margin);
    var opsText = fmtPctTr(capexNorm.ops_current_margin);
    var upsideText = isNum(capexNorm.upside_per_share) ? fmtMoney(capexNorm.upside_per_share) : "—";
    var noteText = "CapEx-yoğun agresif ÜST-SENARYO (MANŞET DEĞİL): büyüme CapEx'i bakım CapEx'inden " +
      "(D&A, gelirin en az %5'i tabanıyla) ayrıştırılınca başlangıç FCF marjı ham " + rawText + " → " +
      opsText + " olur (CapEx/gelir yoğunluğu " + intensityText + "). Bu iyimser senaryoda baz değer " +
      upsideText + "/hisse. Manşet DCF, bugünkü gerçek (düzeltilmemiş) nakit akışıyla hesaplanır ve " +
      "bastırılmıştır; bu üst-senaryo geliri büyütürken onu finanse eden CapEx'i tam yansıtmadığından " +
      "yukarı-yanlıdır -- ihtiyatla değerlendirin.";
    return '<div class="capex-note">' + escapeHtml(noteText) + '</div>';
  }

  // Model <-> market divergence block (triangulate.py governor, action="verdict"):
  // when the base fair-value band sits >2x above price, the three method votes
  // aren't independent confirmation -- they read off ONE assumption set. Show,
  // side by side, what the model assumes vs what today's price implies for the
  // three reverse-lens levers, so the divergence is concrete. Only rendered for
  // hyper-growers (the implied values live in hyper_growth_detail.implied).
  function divergenceHtml(valuation) {
    var tri = (valuation && valuation.triangulation) || {};
    var div = tri.divergence;
    if (!div || div.action !== "verdict") return "";
    var detail = (valuation && valuation.hyper_growth_detail) || {};
    var implied = detail.implied || {};
    var base = (detail.scenarios || {}).base || {};

    function row(label, modelText, marketVal) {
      if (!isNum(marketVal)) return "";
      return '<tr><td>' + escapeHtml(label) + '</td>' +
        '<td class="divergence-model">' + escapeHtml(modelText) + '</td>' +
        '<td class="divergence-market">' + fmtPctTr(marketVal) + '</td></tr>';
    }
    var rows = "";
    rows += row("Başlangıç büyüme", isNum(base.start_growth) ? fmtPctTr(base.start_growth) : "—", implied.growth);
    rows += row("Olgun FCF marjı", isNum(base.target_fcf_margin) ? fmtPctTr(base.target_fcf_margin) : "—", implied.steady_state_margin);
    var modelDr = isNum(detail.base_discount_rate)
      ? (fmtPctTr(detail.base_discount_rate) +
         (isNum(detail.mature_discount_rate) ? " → " + fmtPctTr(detail.mature_discount_rate) : ""))
      : "—";
    rows += row("İskonto oranı", modelDr, implied.discount_rate);
    if (!rows) return "";

    return (
      '<div class="divergence-box">' +
        '<div class="divergence-title">MODEL ↔ PİYASA AYRIŞMASI</div>' +
        '<table class="divergence-table">' +
          '<thead><tr><th>Varsayım</th><th>Model</th><th>Piyasa fiyatlıyor</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div class="divergence-referee">Üç yöntem de aynı büyüme/marj varsayımından beslendiği için ' +
          'oybirliği bağımsız bir doğrulama değil. Model büyümenin sürdüğünü, piyasa bittiğini fiyatlıyor; ' +
          'hakem önümüzdeki çeyreklerin gerçekleşen büyümesidir.</div>' +
      '</div>'
    );
  }

  function hyperGrowthExtraHtml(valuation) {
    if (!valuation || !valuation.hyper_growth) return "";
    var detail = valuation.hyper_growth_detail || {};
    if (detail.suppressed) {
      var suppressedReason = detail.suppressed_reason ||
        "Revenue-first DCF bu şirket için güvenilir bir değer üretemedi; DCF devre dışı bırakıldı.";
      // Capex-heavy names are always suppressed for the headline but still
      // carry an aggressive capex-normalized upside -- render it here too.
      return (
        '<div class="hyper-note">' +
          '<div class="hyper-implied-line">' + escapeHtml(suppressedReason) + '</div>' +
          capexNormalizationHtml(detail.capex_normalization) +
        '</div>'
      );
    }
    var implied = detail.implied || {};
    var impliedText;
    if (isNum(implied.growth) && isNum(implied.revenue_10y)) {
      var revText = fmtCompactMoney(implied.revenue_10y);
      var multText = isNum(implied.revenue_multiple) ? Number(implied.revenue_multiple).toFixed(1) : "—";
      impliedText = "Fiyatın iması: 10 yılda " + revText + " revenue (bugünün " + multText + " katı), ~" +
        fmtPctTr(implied.growth) + " büyüme, " + fmtPctTr(implied.steady_state_margin) + " olgun FCF marjı";
      if (isNum(implied.tam_share)) {
        impliedText += " = TAM'ın " + fmtPctTr(implied.tam_share) + "'si";
      }
    } else if (isNum(implied.steady_state_margin)) {
      impliedText = "Fiyatın iması: %40 büyümede bile ~" + fmtPctTr(implied.steady_state_margin) +
        " olgun FCF marjı gerektiriyor (makul büyüme aralığının çok üstünde)";
    } else {
      impliedText = "Fiyat, makul büyüme aralığının belirgin şekilde dışında bir beklenti ima ediyor.";
    }

    var evHtml = isNum(detail.expected_value)
      ? '<div class="hyper-ev-line">Olasılık-ağırlıklı beklenen değer: ' + fmtMoney(detail.expected_value) + '</div>'
      : "";
    var capexHtml = capexNormalizationHtml(detail.capex_normalization);

    return (
      divergenceHtml(valuation) +
      '<div class="hyper-note">' +
        '<div class="hyper-implied-line">' + escapeHtml(impliedText) + '</div>' +
        evHtml +
        capexHtml +
      '</div>'
    );
  }

  // ---- Mid-growth (12-20%) loss-making revenue-first DCF extra (SPEC.md --
  // Sec.8d) -- mirrors hyperGrowthExtraHtml's structure/guard pattern for
  // the sibling revenue-first headline that sits between the mature
  // (Sec.8b) and hyper-grower (Sec.3) paths. Only rendered when
  // valuation.midgrowth_revenue_headline is true; every other render path
  // is unaffected since this returns "" otherwise.
  function midgrowthRevenueExtraHtml(valuation) {
    if (!valuation || !valuation.midgrowth_revenue_headline) return "";
    var detail = valuation.midgrowth_revenue_detail || {};
    if (detail.suppressed) {
      var suppressedReason = detail.suppressed_reason ||
        "Orta-büyüme gelir bazlı DCF bu şirket için güvenilir bir değer üretemedi; DCF devre dışı bırakıldı.";
      return (
        '<div class="hyper-note">' +
          '<div class="hyper-implied-line">' + escapeHtml(suppressedReason) + '</div>' +
        '</div>'
      );
    }
    var scenarios = detail.scenarios || {};
    var base = scenarios.base || {};
    var startGrowthText = fmtPctTr(detail.start_growth);
    var targetMarginText = fmtPctTr(detail.target_margin_base);
    var fadeText = isNum(detail.steady_state_year) ? Number(detail.steady_state_year) + " yıl" : "—";
    var basePerShareText = fmtMoney(base.per_share);

    var headlineText = "Orta-büyüme (%12-20) gelir bazlı DCF: gerçekleşen büyüme " + startGrowthText +
      ", olgun FCF marjı hedefi " + targetMarginText + ", " + fadeText + " içinde olgunlaşma; " +
      "baz senaryo hisse başı değer " + basePerShareText;

    var capexHtml = capexNormalizationHtml(detail.capex_normalization);

    return (
      '<div class="hyper-note">' +
        '<div class="hyper-implied-line">' + escapeHtml(headlineText) + '</div>' +
        capexHtml +
      '</div>'
    );
  }

  function fanChartCardHtml(result, price) {
    var fv = result.fair_value_range || {};
    var scale = computeFanScale(fv, price);
    var innerHtml;
    if (!scale) {
      innerHtml = '<div class="fan-empty muted">Not enough data for a valuation scenario.</div>';
    } else {
      var minV = scale.minV, maxV = scale.maxV;
      var span = (maxV - minV) || 1;
      var pctOf = function (v) { return ((v - minV) / span) * 100; };

      var labelsHtml = SCENARIO_ORDER.map(function (k) {
        return "<span>" + SCENARIO_LABEL[k] + "</span>";
      }).join("");

      var EDGE_THRESHOLD_PCT = 12;

      var rowsHtml = SCENARIO_ORDER.map(function (key) {
        var b = fv[key];
        var bandHtml = "";
        if (b && isNum(b.lo) && isNum(b.hi)) {
          var left = pctOf(Number(b.lo));
          var right = pctOf(Number(b.hi));
          var width = Math.max(0.6, right - left);
          var hex = SCENARIO_HEX[key];

          var loInside = left < EDGE_THRESHOLD_PCT;
          var hiInside = (100 - right) < EDGE_THRESHOLD_PCT;
          var loValHtml =
            '<span class="fan-val fan-val-lo ' + (loInside ? "fan-val-inside" : "fan-val-outside") + '">' +
              fmtMoney(b.lo) +
            '</span>';
          var hiValHtml =
            '<span class="fan-val fan-val-hi ' + (hiInside ? "fan-val-inside" : "fan-val-outside") + '">' +
              fmtMoney(b.hi) +
            '</span>';

          bandHtml =
            '<div class="fan-band" style="left:' + left + '%; width:' + width + '%; ' +
            'background:' + hexToRgba(hex, 0.35) + '; border-color:' + hex + ';">' +
              loValHtml + hiValHtml +
            '</div>';
        }
        return '<div class="fan-row-track" data-scenario="' + key + '">' + bandHtml + '</div>';
      }).join("");

      var markerHtml = "";
      if (isNum(price)) {
        var markerLeft = Math.min(99, Math.max(0, pctOf(Number(price))));
        markerHtml =
          '<div class="fan-marker" style="left:' + markerLeft + '%;">' +
            '<span class="fan-marker-price">▼ ' + fmtMoney(price) + '</span>' +
            '<span class="fan-marker-arrow">▼</span>' +
          '</div>';
      }

      innerHtml =
        '<div class="fan-outer">' +
          '<div class="fan-labels">' + labelsHtml + '</div>' +
          '<div class="fan-plot">' + rowsHtml + markerHtml + '</div>' +
        '</div>' +
        '<div class="fan-ticks">' +
          '<span>' + fmtMoney(minV) + '</span>' +
          '<span>' + fmtMoney((minV + maxV) / 2) + '</span>' +
          '<span>' + fmtMoney(maxV) + '</span>' +
        '</div>' +
        '<div class="assumption-strip" id="assumption-strip">' +
          '<div class="assum-col"><div class="assum-label">Scenario</div><div class="assum-value" id="assum-scenario">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Growth</div><div class="assum-value" id="assum-growth">—</div></div>' +
          '<div class="assum-col"><div class="assum-label">Discount</div><div class="assum-value" id="assum-discount">—</div></div>' +
          '<div class="assum-col assum-rationale"><div class="assum-label">Rationale</div><div class="assum-value" id="assum-rationale">—</div></div>' +
        '</div>';
    }
    innerHtml += hyperGrowthExtraHtml(result.valuation);
    innerHtml += midgrowthRevenueExtraHtml(result.valuation);
    return '<div class="card"><div class="card-title">Valuation Scenarios</div>' + innerHtml + '</div>';
  }

  // Updates the assumption strip's four cells for one scenario key
  // (bear/base/bull) and highlights the matching fan row -- called once on
  // initial render (defaulting to "base") and again on every row click.
  function selectFanScenario(fv, key, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    rows.forEach(function (r) {
      r.classList.toggle("selected", r.getAttribute("data-scenario") === key);
    });
    var b = (fv || {})[key] || {};
    var scenarioEl = document.getElementById("assum-scenario");
    var growthEl = document.getElementById("assum-growth");
    var discountEl = document.getElementById("assum-discount");
    var rationaleEl = document.getElementById("assum-rationale");
    if (!scenarioEl) return;
    scenarioEl.textContent = SCENARIO_LABEL[key] || String(key || "—").toUpperCase();
    growthEl.textContent = safeText(b.growth);
    discountEl.textContent = safeText(b.discount_rate);
    var ret = (scenarioReturns || {})[key];
    var rationale = safeText(b.note);
    if (ret && (isNum(ret.ret_lo_pct) || isNum(ret.ret_hi_pct))) {
      var retText = "Return " + fmtSignedPct(ret.ret_lo_pct) + " to " + fmtSignedPct(ret.ret_hi_pct);
      rationale = rationale === "—" ? retText : rationale + " · " + retText;
    }
    rationaleEl.textContent = rationale;
  }

  function wireFanChart(fv, scenarioReturns) {
    var rows = bodyEl.querySelectorAll(".fan-row-track");
    if (rows.length === 0) return;
    rows.forEach(function (r) {
      r.addEventListener("click", function () {
        selectFanScenario(fv, r.getAttribute("data-scenario"), scenarioReturns);
      });
    });
    selectFanScenario(fv, "base", scenarioReturns);
  }

  // ---- Triangulation card ---------------------------------------------
  // Only rendered when result.valuation.triangulation is present; older/
  // simpler result dicts simply skip this card.

  // Badge color for one method's OWN signal (independent of consensus):
  // ucuz -> green, makul -> amber, yuksek_beklenti -> caution, pahali ->
  // red, veri_yok/unknown -> muted (no-data is not a point on the
  // cheap<->expensive spectrum, so it gets a neutral bucket, not amber).
