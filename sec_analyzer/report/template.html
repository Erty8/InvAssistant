  // ---- Thesis metric card ---------------------------------------------
  // result.thesis_metric is always a dict (never null) per planning.py, but
  // every field inside it may still be None -- degrades to "not available"
  // rather than "None"/blank.
  // Cycle-position bar: locate the anchor metric's latest value inside its
  // own multi-year trough->peak range (planning._compute_cycle_position).
  // cy is result.thesis_metric.cycle -- null when no series is available, in
  // which case the whole block is omitted (card falls back to value+trend).
  function thesisCycleHtml(cy) {
    if (!cy || !isNum(cy.position) || !isNum(cy.low) || !isNum(cy.high) || !isNum(cy.current)) return "";
    var isCyc = !!cy.is_cyclical;
    var markerPct = Math.max(0, Math.min(100, cy.position * 100));
    var fmtP = function (v) { return "%" + (v * 100).toFixed(1); };
    var fyTag = function (fy) { return isNum(fy) ? " (FY" + fy + ")" : ""; };

    var label = isCyc ? "Döngü konumu" : "Geçmiş aralık";
    var loEnd = isCyc ? "dip" : "en düşük";
    var midEnd = isCyc ? "orta-döngü" : "orta";
    var hiEnd = isCyc ? "zirve" : "en yüksek";

    var where;
    if (cy.position >= 0.8) where = isCyc ? "döngüsel zirveye yakın" : "aralığın üst ucunda";
    else if (cy.position <= 0.2) where = isCyc ? "döngü dibine yakın" : "aralığın alt ucunda";
    else where = isCyc ? "orta-döngü civarında" : "aralığın ortasında";

    var thinNote = (isNum(cy.n_years) && cy.n_years < 4)
      ? ' <span class="cycle-thin">(' + cy.n_years + " yıllık sınırlı geçmiş)</span>"
      : "";

    return (
      '<div class="cycle-block">' +
        '<div class="cycle-label">' + escapeHtml(label) + "</div>" +
        '<div class="cycle-track">' +
          '<div class="cycle-mid"></div>' +
          '<div class="cycle-marker" style="left:' + markerPct.toFixed(1) + '%"></div>' +
        "</div>" +
        '<div class="cycle-ends">' +
          "<span>" + escapeHtml(loEnd) + " " + fmtP(cy.low) + escapeHtml(fyTag(cy.low_fy)) + "</span>" +
          "<span>" + escapeHtml(midEnd) + "</span>" +
          "<span>" + escapeHtml(hiEnd) + " " + fmtP(cy.high) + escapeHtml(fyTag(cy.high_fy)) + "</span>" +
        "</div>" +
        '<div class="cycle-caption">Güncel' + escapeHtml(fyTag(cy.current_fy)) + " " + fmtP(cy.current) +
          " — <b>" + escapeHtml(where) + "</b>" + thinNote +
        "</div>" +
      "</div>"
    );
  }

  // Level sparkline: the anchor metric's year-by-year trajectory
  // (cy.series, sorted ascending by fy). Complements the positional cycle
  // bar by showing the *shape* of the path (steady climb vs volatile vs a
  // recent turn). Self-contained inline SVG; latest point emphasized.
  function thesisSparklineHtml(cy) {
    if (!cy || !cy.series || !cy.series.length) return "";
    var pts = cy.series.filter(function (p) { return p && isNum(p.value); });
    if (pts.length < 2) return "";

    var vals = pts.map(function (p) { return p.value; });
    var lo = Math.min.apply(null, vals), hi = Math.max.apply(null, vals);
    var W = 600, H = 60, padX = 8, padTop = 8, padBot = 18;
    var innerW = W - padX * 2, innerH = H - padTop - padBot;
    var n = pts.length;
    var xAt = function (i) { return padX + (innerW * i) / (n - 1); };
    var yAt = function (v) {
      if (hi <= lo) return padTop + innerH / 2;  // flat series -> centre line
      return padTop + innerH * (1 - (v - lo) / (hi - lo));
    };

    var path = pts.map(function (p, i) {
      return (i ? "L" : "M") + xAt(i).toFixed(1) + " " + yAt(p.value).toFixed(1);
    }).join(" ");
    var dots = pts.map(function (p, i) {
      var last = i === n - 1;
      return '<circle cx="' + xAt(i).toFixed(1) + '" cy="' + yAt(p.value).toFixed(1) +
        '" r="' + (last ? 3.2 : 2) + '" class="spark-dot' + (last ? " spark-dot-last" : "") + '"/>';
    }).join("");
    var fyLabel = function (fy, xx, anchor) {
      return isNum(fy)
        ? '<text x="' + xx + '" y="' + (H - 4) + '" class="spark-fy" text-anchor="' + anchor + '">FY' + fy + "</text>"
        : "";
    };

    return (
      '<div class="spark-block">' +
        '<div class="spark-label">Yıllık seyir</div>' +
        '<svg class="spark-svg" viewBox="0 0 ' + W + " " + H +
          '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Çapa metriğin yıllık seyri">' +
          '<path d="' + path + '" class="spark-line"/>' +
          dots +
          fyLabel(pts[0].fy, padX, "start") +
          fyLabel(pts[n - 1].fy, W - padX, "end") +
        "</svg>" +
      "</div>"
    );
  }

  function thesisMetricHtml(tm) {
    if (!tm) return "";
    var name = tm.name ? escapeHtml(tm.name) : "Thesis Metric";
    var valueText = tm.latest_value ? escapeHtml(tm.latest_value) : "not available";
    var trendColor = "amber";
    if (tm.trend) {
      var s = String(tm.trend).toLowerCase();
      if (s.indexOf("iyileş") !== -1 || s.indexOf("iyiles") !== -1) trendColor = "green";
      else if (s.indexOf("boz") !== -1) trendColor = "red";
    }
    var trendHtml = tm.trend
      ? ' <span class="badge badge-' + trendColor + '">' + escapeHtml(tm.trend) + '</span>'
      : "";
    var sparkHtml = thesisSparklineHtml(tm.cycle);
    var cycleHtml = thesisCycleHtml(tm.cycle);
    var rationaleHtml = tm.rationale
      ? '<p class="thesis-rationale">' + escapeHtml(tm.rationale) + '</p>'
      : "";
    return (
      '<div class="card"><div class="card-title">Thesis Metric</div>' +
        '<p class="thesis-metric-line">' + name + ': <b>' + valueText + '</b>' + trendHtml + '</p>' +
        sparkHtml +
        cycleHtml +
        rationaleHtml +
      '</div>'
    );
  }

  // ---- Scenario returns card -----------------------------------------------
  // None-safe: a scenario with no computable return renders "—" rather than
  // "None". Returns "" (card omitted) when the field is entirely absent.
  function scenarioReturnsListHtml(scenarioReturns) {
    if (!scenarioReturns) return "";
    var rows = SCENARIO_ORDER.map(function (key) {
      var b = scenarioReturns[key] || {};
      var loOk = isNum(b.ret_lo_pct), hiOk = isNum(b.ret_hi_pct);
      var text = (loOk || hiOk) ? (fmtSignedPct(b.ret_lo_pct) + " to " + fmtSignedPct(b.ret_hi_pct)) : "—";
      return (
        '<div class="scen-ret-row">' +
          '<span class="scen-ret-name">' + escapeHtml(SCENARIO_LABEL[key] || key) + '</span>' +
          '<span class="scen-ret-value">' + text + '</span>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">Scenario Returns</div>' +
        '<div class="scenario-returns-list">' + rows + '</div>' +
      '</div>'
    );
  }

  // ---- Red flags card (only if flags exist) --------------------------------
  function flagsCardHtml(flags) {
    if (!flags || flags.length === 0) return "";
    var items = flags.map(function (f) {
      return (
        '<li>' + escapeHtml(f.message || f.code || "") +
        (f.detail ? '<span class="item-detail">' + escapeHtml(f.detail) + '</span>' : '') +
        '</li>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">⚠ Red Flags</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +

    );

  // ---- Filing events card (recent 8-K item codes; only if events exist) ----
  // Deterministic, LLM-free: each entry is one recent 8-K classified by its
  // SEC item code(s) (see sec_analyzer/signals/events.py), colored by severity.
  function eventsCardHtml(events) {
    if (!events || events.length === 0) return "";
    var sevLabel = { critical: "KRİTİK", warning: "UYARI", info: "BİLGİ" };
    var items = events.map(function (e) {
      var severity = e.severity || "info";
      var cats = (e.categories || []).join(", ");
      var itemsTxt = (e.items || []).join(", ");
      var detail = escapeHtml(e.date || "") + (itemsTxt ? " · 8-K madde " + escapeHtml(itemsTxt) : "");
      return (
        '<li class="event-' + escapeHtml(severity) + '">' +
          '<span class="event-sev">' + escapeHtml(sevLabel[severity] || severity.toUpperCase()) + '</span>' +
          escapeHtml(cats) +
          '<span class="item-detail">' + detail + '</span>' +
        '</li>'
      );
    }).join("");
    return (
      '<div class="card"><div class="card-title">📄 Son Dosyalama Olayları (8-K)</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
  }

  // ---- Footer analysis (catalyst + summary) --------------------------------
  // No fabricated "Recommendation: ..." line -- only the real catalyst/
  // summary fields the pipeline actually produced.
  function footerAnalysisHtml(result) {
    var catalyst = result.catalyst;
    var summary = result.summary;
    var catalystHtml = catalyst
      ? '<p class="catalyst-line"><span class="badge-label">Catalyst</span>' + escapeHtml(catalyst) + '</p>'
      : "";
    return (
      '<div class="card">' +
        catalystHtml +
        '<p class="summary-text">' + escapeHtml(summary || "No summary available.") + '</p>' +
      '</div>'
    );
  }

  function globalFooterHtml() {
    return (
      '<div class="global-footer">' +
        '© Verdict Analysis Systems · SEC EDGAR + price data · educational use only, not investment advice.' +
      '</div>'
    );
  }

  // ===================================================================
  // renderBody -- the single body-rendering function shared by report
  // mode (called once, directly on `data`) and search mode (called again
  // on every successful /api/analyze fetch, on a reshaped payload).
  // `payload` shape: {ticker, horizon, price, as_of, result, metrics,
  // technical, red_flags, entity_name}.
  // ===================================================================
  function renderBody(payload) {
    var result = payload.result || {};

    if (result.error) {
      bodyEl.innerHTML = errorCardHtml(payload, result);
      return;
    }

    var fv = result.fair_value_range || {};
    var technical = payload.technical || {};
    // result.valuation (SPEC.md Sec.11) is the richer engine payload; it's
    // absent for older callers or when phase-2 interpret() never ran (e.g.
    // an LLM error) -- the triangulation/sensitivity cards simply don't
    // render in that case, degrading to the simpler pre-valuation card set.
    var valuation = result.valuation || null;

    var html =
      headerCardHtml(payload) +
      swingSetupCardHtml(payload, result, technical) +
      weightBarHtml(result._weights) +
      priceChartCardHtml(technical, result, payload.horizon, payload.analyst) +
      fanChartCardHtml(result, payload.price) +
      (valuation ? triangulationRowHtml(valuation, result.confidence) : "") +
      verdictCardHtml("Fundamental", result.fundamental_verdict, result.horizon_note) +
      momentumCardHtml(result) +
      technicalCardHtml(technical, result.technical_verdict || technical.verdict, payload.horizon) +
      // Profile Fit card intentionally removed from the UI for now (still
      // computed in the payload; just not rendered).
      (valuation ? sensitivityTableHtml(valuation.sensitivity) : "") +
      entryPlanHtml(result.entry_plan) +
      stopAddingHtml(result.stop_adding) +
      thesisMetricHtml(result.thesis_metric) +
      scenarioReturnsListHtml(result.scenario_returns) +
      flagsCardHtml(payload.red_flags) +
      eventsCardHtml(result.events) +
      footerAnalysisHtml(result) +
      globalFooterHtml();

    bodyEl.innerHTML = html;
    wireFanChart(fv, result.scenario_returns);
    wirePriceRange(technical, result, payload.analyst);
    wireTechnical();
  }

  // ===================================================================
  // Report mode: nav = brand + generated date; body renders immediately
  // from the baked payload.
  // ===================================================================
  function renderReportMode() {
    document.title = String(data.ticker || "") + " · " + String(data.horizon || "") + " · Verdict Terminal";
    // analysis_as_of (point-in-time backtest cutoff) is distinct from as_of
    // (the latest price-bar date, shown separately in the header source
    // note); null on every live run, so this banner is absent by default.
    var asofBannerHtml = data.analysis_as_of
      ? '<span class="asof-banner">Geçmiş tarih analizi — ' + escapeHtml(data.analysis_as_of) +
        ' itibarıyla bilinen verilerle üretildi</span>'
      : "";
    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        (data.generated_on ? '<span class="nav-date">Generated ' + escapeHtml(data.generated_on) + '</span>' : "") +
        asofBannerHtml +
      '</div>';
    renderBody(data);
  }

  // ===================================================================
  // Search mode: nav carries live ticker/horizon/provider controls; the
  // body starts in a prompt state and is replaced by renderBody() (the
  // exact same function report mode uses) once /api/analyze succeeds.
  // ===================================================================
  function renderSearchMode() {
    document.title = "Verdict Terminal";
    var horizons = data.horizons || [["3m", "3m"], ["1y", "1y"], ["5y", "5y"]];
    var providers = data.providers || [];
    var state = {
      horizon: data.default_horizon || "1y",
      provider: data.default_provider || (providers[0] && providers[0][0]) || "",
    };

    var providerOptions = providers.map(function (p) {
      var sel = p[0] === state.provider ? " selected" : "";
      return '<option value="' + escapeHtml(p[0]) + '"' + sel + '>' + escapeHtml(p[1]) + '</option>';
    }).join("");

    // Point-in-time (as-of) analysis is opt-in: an empty date -- the
    // default -- runs the normal live analysis exactly as before. `max`
    // pins the native date picker to today so a future cutoff can't even be
    // selected client-side (the backend rejects one too either way).
    var todayStr = new Date().toISOString().slice(0, 10);

    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        '<div class="nav-controls">' +
          '<input type="text" class="ticker-input" id="ticker-input" placeholder="TICKER" autocomplete="off" />' +
          horizonToggleHtml(horizons.map(function (h) { return h[0]; }), state.horizon, true, "nav-horizon-toggle") +
          '<select class="provider-select" id="provider-select">' + providerOptions + '</select>' +
          '<label class="asof-label" for="asof-input">Geçmiş tarih (ops.)</label>' +
          '<input type="date" class="provider-select asof-input" id="asof-input" max="' + todayStr + '" />' +
          '<button type="button" class="analyze-btn" id="analyze-btn">Analyse</button>' +
          '<button type="button" class="history-nav-btn" id="history-nav-btn">Geçmiş</button>' +
        '</div>' +
      '</div>';

    bodyEl.innerHTML = '<div class="card"><div class="empty-state">Enter a ticker above and press Analyse to generate a Verdict Terminal report.</div></div>';

    var tickerInput = document.getElementById("ticker-input");
    var providerSelect = document.getElementById("provider-select");
    var asofInput = document.getElementById("asof-input");
    var analyzeBtn = document.getElementById("analyze-btn");
    var horizonToggleEl = document.getElementById("nav-horizon-toggle");
    var historyNavBtn = document.getElementById("history-nav-btn");

    // Only meaningful once a ticker is typed -- navigates to the read-only
    // verdict-history screen (mode: "history") for that ticker.
    historyNavBtn.addEventListener("click", function () {
      var ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) return;
      window.location.href = "/history?ticker=" + encodeURIComponent(ticker);
    });

    horizonToggleEl.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".horizon-pill") : null;
      if (!btn) return;
      state.horizon = btn.getAttribute("data-horizon");
      horizonToggleEl.querySelectorAll(".horizon-pill").forEach(function (p) {
        p.classList.toggle("active", p === btn);
      });
    });

    providerSelect.addEventListener("change", function () {
      state.provider = providerSelect.value;
    });

    function showError(message) {
      bodyEl.innerHTML = '<div class="error-banner">' + escapeHtml(message) + '</div>';
    }

    // renderBody() (unlike renderReportMode()) never touches topnavEl, so a
    // search-mode as-of run needs its own small banner update here -- same
    // markup/class as the baked-report banner, injected into the still-live
    // search nav instead of rebuilding it. Called with null to clear a
    // previous run's banner before/when a live (non-as-of) run replaces it.
    function updateAsofBanner(analysisAsOf) {
      var existing = document.getElementById("search-asof-banner");
      if (existing) existing.remove();
      if (!analysisAsOf) return;
      var navInner = topnavEl.querySelector(".nav-inner");
      if (!navInner) return;
      navInner.insertAdjacentHTML(
        "beforeend",
        '<span class="asof-banner" id="search-asof-banner">Geçmiş tarih analizi — ' +
          escapeHtml(analysisAsOf) + ' itibarıyla bilinen verilerle üretildi</span>'
      );
    }

    function runAnalyze() {
      var ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) {
        showError("Please enter a ticker symbol.");
        return;
      }
      analyzeBtn.disabled = true;
      tickerInput.disabled = true;
      asofInput.disabled = true;
      updateAsofBanner(null);
      bodyEl.innerHTML =
        '<div class="card"><div class="loading-state"><span class="spinner"></span>' +
        'Running analysis for ' + escapeHtml(ticker) + ' -- this can take 10-40 seconds...</div></div>';

      var requestBody = {
        ticker: ticker,
        years: 12,
        horizon: state.horizon,
        provider: state.provider,
        no_cache: false,
      };
      // Empty date = normal live analysis (the common case, unchanged from
      // before); a filled-in date is the only switch for point-in-time mode
      // -- no separate toggle. The backend validates it and 400s on a bad
      // or future date, which the existing showError() branch below already
      // surfaces.
      var asofValue = asofInput.value ? asofInput.value.trim() : "";
      if (asofValue) {
        requestBody.as_of = asofValue;
      }

      fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(requestBody),
      })
        .then(function (response) {
          return response.json().then(function (json) {
            return { ok: response.ok, json: json };
          });
        })
        .then(function (res) {
          if (!res.ok || !res.json || !res.json.ok) {
            var message = (res.json && res.json.error) || "Failed to run analysis.";
            showError(message);
            return;
          }
          var json = res.json;
          var technical = json.technical || null;
          var reportPayload = {
            ticker: ticker,
            horizon: state.horizon,
            price: (json.metrics || {}).price,
            as_of: technical ? technical.as_of : null,
            // json.as_of is /api/analyze's echoed point-in-time cutoff (the
            // request's as_of, string or null) -- distinct from the as_of
            // above (latest price-bar date). Mapping it through is what
            // lets headerCardHtml's macro-source note and the nav banner
            // (via updateAsofBanner below) know this was a backtest run.
            analysis_as_of: json.as_of || null,
            result: json.analysis || {},
            metrics: json.metrics || {},
            technical: technical || {},
            red_flags: json.red_flags || [],
            entity_name: json.name || null,
            analyst: json.analyst || null,
          };
          updateAsofBanner(reportPayload.analysis_as_of);
          renderBody(reportPayload);
        })
        .catch(function (err) {
          showError("Network error: " + err.message);
        })
        .finally(function () {
          analyzeBtn.disabled = false;
          tickerInput.disabled = false;
          asofInput.disabled = false;
        });
    }

    analyzeBtn.addEventListener("click", runAnalyze);
    tickerInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        runAnalyze();
      }
    });
  }

  // ===================================================================
  // History mode: read-only screen listing every stored analysis run for
  // one ticker (mode: "history", built by generator.render_history_page /
  // GET /history). No live fetch, no controls -- just the stored
  // `verdicts` table rendered as a table, newest first.
  // `data` shape: {mode, ticker, rows, current_price, generated_on}.
  // ===================================================================

  // Caption above the table: current stored price plus its % change vs. the
  // most recent analysis run's price, when both are available. Renders ""
  // when current_price is absent -- the table still renders on its own.
  function historyCaptionHtml(currentPrice, rows) {
    if (!currentPrice || !isNum(currentPrice.close)) return "";
    var text = "Güncel fiyat: " + fmtMoney(currentPrice.close) +
      " (" + escapeHtml(safeText(currentPrice.date)) + ")";
    var lastPrice = (rows && rows.length && isNum(rows[0].price)) ? Number(rows[0].price) : null;
    if (lastPrice) {
      var deltaPct = (Number(currentPrice.close) / lastPrice - 1) * 100;
      text += " · en son analize göre " + fmtSignedPctTr(deltaPct);
    }
    return '<div class="history-caption">' + text + '</div>';
  }

  // One <tr> per stored verdict row. Every field is optional/nullable (see
  // generator.render_history_page docstring) -- safeText/fmtMoney/isNum
  // guard every cell so a sparse row never prints "null"/"undefined"/"NaN".
  function historyRowHtml(row) {
    row = row || {};
    var analyzedDate = row.analyzed_at ? escapeHtml(String(row.analyzed_at).slice(0, 10)) : "—";
    var asOfCell = row.as_of
      ? escapeHtml(row.as_of) + ' <span class="asof-pill" title="Geçmiş tarih (as-of) analizi">as-of</span>'
      : "—";
    var fvBase = (isNum(row.fv_base_lo) && isNum(row.fv_base_hi))
      ? fmtMoney(row.fv_base_lo) + "–" + fmtMoney(row.fv_base_hi)
      : "—";
    return (
      '<tr>' +
        '<td>' + analyzedDate + '</td>' +
        '<td>' + asOfCell + '</td>' +
        '<td>' + escapeHtml(safeText(row.horizon)) + '</td>' +
        '<td>' + escapeHtml(safeText(row.provider)) + '</td>' +
        '<td class="history-num">' + fmtMoney(row.price) + '</td>' +
        '<td class="history-num">' + fvBase + '</td>' +
        '<td>' + escapeHtml(safeText(row.fundamental_verdict)) + '</td>' +
        '<td>' + escapeHtml(safeText(row.technical_verdict)) + '</td>' +
        '<td>' + escapeHtml(safeText(row.confidence)) + '</td>' +
        '<td>' + escapeHtml(safeText(row.sector_type)) + '</td>' +
      '</tr>'
    );
  }

  function renderHistoryMode() {
    var tickerText = String(data.ticker || "—");
    document.title = tickerText + " — Analiz Geçmişi · Verdict Terminal";
    topnavEl.innerHTML =
      '<div class="nav-inner">' +
        '<span class="brand">VERDICT</span>' +
        (data.generated_on ? '<span class="nav-date">Generated ' + escapeHtml(data.generated_on) + '</span>' : "") +
      '</div>';

    var rows = data.rows || [];
    var headerHtml = '<div class="history-header">' + escapeHtml(tickerText) + ' — Analiz Geçmişi</div>';

    if (!rows.length) {
      bodyEl.innerHTML =
        '<div class="card">' +
          headerHtml +
          '<div class="empty-state">Bu hisse için kayıtlı analiz bulunamadı.</div>' +
        '</div>' +
        globalFooterHtml();
      return;
    }

    var tableHtml =
      '<table class="sensitivity-table history-table">' +
        '<thead><tr>' +
          '<th>Tarih</th><th>As-of</th><th>Vade</th><th>Sağlayıcı</th>' +
          '<th>Fiyat</th><th>FV (baz)</th><th>Temel</th><th>Teknik</th>' +
          '<th>Güven</th><th>Sektör</th>' +
        '</tr></thead>' +
        '<tbody>' + rows.map(historyRowHtml).join("") + '</tbody>' +
      '</table>';

    bodyEl.innerHTML =
      '<div class="card">' +
        headerHtml +
        historyCaptionHtml(data.current_price, rows) +
        tableHtml +
      '</div>' +
      globalFooterHtml();
  }

  function render() {
    if (data.mode === "search") {
      renderSearchMode();
    } else if (data.mode === "history") {
      renderHistoryMode();
    } else {
      renderReportMode();
    }
  }

  render();
})();
</script>

</body>
</html>
