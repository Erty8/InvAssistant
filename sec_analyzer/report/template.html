<!--
  sec_analyzer "Verdict Terminal" -- unified, self-contained HTML template.

  This single file serves BOTH consumers of the verdict card:
    - CLI `analyze --html` / GET /report (sec_analyzer.report.generator):
      a baked, one-shot report for one ticker/horizon, opened from disk
      (file://...) or served as a response body. No network calls of any
      kind -- fully self-contained.
    - GET / (sec_analyzer.web.app, via generator.render_search_page): the
      interactive ticker search. Same shell, same rendering code, but the
      top nav carries live controls and a POST to /api/analyze feeds the
      exact same body-rendering function.

  The single "__DATA_JSON__" placeholder (inside the
  <script type="application/json"> element below) is replaced by
  sec_analyzer.report.generator with one JSON payload whose "mode" field
  selects which of the two behaviors above this script runs:

    {"mode": "report", ticker, horizon, price, as_of, generated_on, result,
     metrics, technical, red_flags, entity_name}
    {"mode": "search", horizons, providers, default_horizon,
     default_provider, default_model}

  In both modes, once a result payload of the "report" shape is available
  (baked immediately, or fetched live from /api/analyze and reshaped
  client-side), the exact same renderBody() function draws the terminal:
  header, signal-weight bar, fair-value fan chart, triangulation row, three
  verdict cards, sensitivity grid, the four planning cards (entry plan,
  stop-adding, thesis metric, scenario returns), red flags, and the
  catalyst/summary panel. Nothing here is fabricated: every value not
  present in the payload renders "--" or the whole card/section is omitted,
  never "None"/"NaN"/"undefined", and no line is invented that isn't backed
  by a real field (see e.g. footerAnalysisHtml -- no "Recommendation: ..."
  line unless a real field carried one).

  No external resources anywhere: one inline <style>, unicode/inline-SVG
  glyphs only (no icon fonts), and (in report mode) zero network requests
  -- the file opens correctly straight from disk or inside an <iframe>.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verdict Terminal</title>
<style>
  /* Dark-only "terminal" palette -- this design deliberately commits to a
     single dark theme (see sec_analyzer/web/templates' prior design intent
     for the same call), matching the supplied mockup. */
  :root {
    color-scheme: dark;
    --bg: #0d1420;
    --card: #111b2b;
    --border: #223349;
    --text: #e0e2ea;
    --muted: #8b919d;
    --outline: #c0c7d3;
    --primary: #5aa7ff;
    --primary-light: #a2c9ff;
    --green: #4de082;
    --amber: #ffb953;
    --caution: #ff8a3d;
    --red: #ffb4ab;
    --red-container: #93000a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.45;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  .muted { color: var(--muted); }
  .mono { font-family: var(--mono); }

  /* ---- Top nav ---------------------------------------------------------*/
  .topnav {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(13, 20, 32, 0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    margin: 0 0 20px;
  }
  .nav-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
  }
  .brand {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--primary-light);
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .nav-date {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--mono);
  }
  .nav-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    flex: 1 1 auto;
  }
  .ticker-input {
    width: 11ch;
    text-transform: uppercase;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
  }
  .ticker-input:focus {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
  }
  .provider-select {
    font-size: 0.82rem;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: var(--sans);
    max-width: 220px;
  }
  .analyze-btn {
    font-size: 0.86rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--primary);
    background: var(--primary);
    color: #06111f;
    cursor: pointer;
  }
  .analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---- Shared horizon-toggle pill row ------------------------------------*/
  .horizon-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .horizon-pill {
    font-family: var(--mono);
    font-size: 0.74rem;
    font-weight: 600;
    padding: 6px 12px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-right: 1px solid var(--border);
    cursor: default;
  }
  .horizon-pill:last-child { border-right: none; }
  .horizon-toggle.interactive .horizon-pill { cursor: pointer; }
  .horizon-pill.active {
    background: rgba(90, 167, 255, 0.18);
    color: var(--primary-light);
  }

  /* ---- Cards -------------------------------------------------------------*/
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- Header card ---------------------------------------------------- */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header-left .ticker-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ticker {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .entity-name {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .source-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .header-right {
    text-align: right;
    flex-shrink: 0;
  }
  .price-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ---- Signal-weight bar ------------------------------------------------*/
  .weight-bar {
    display: flex;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    margin: 0 0 16px;
    border: 1px solid var(--border);
  }
  .weight-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    font-family: var(--mono);
  }
  .weight-fundamental { background: rgba(90, 167, 255, 0.28); color: var(--primary-light); }
  .weight-technical { background: rgba(255, 185, 83, 0.28); color: var(--amber); }

  /* ---- Fan chart (fair-value ruler) --------------------------------------*/
  .fan-empty {
    font-size: 0.85rem;
  }
  .fan-outer {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fan-labels {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    width: 38px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--muted);
    padding-top: 2px;
    font-family: var(--mono);
  }
  .fan-labels span {
    height: 24px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
  }
  .fan-labels span:last-child { margin-bottom: 0; }
  .fan-plot {
    position: relative;
    flex: 1;
    padding-top: 2px;
  }
  .fan-row-track {
    position: relative;
    height: 24px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 5px;
    cursor: pointer;
  }
  .fan-row-track:last-child { margin-bottom: 0; }
  .fan-row-track.selected {
    box-shadow: 0 0 0 1px var(--outline) inset;
  }
  .fan-band {
    position: absolute;
    top: 0;
    bottom: 0;
    border-radius: 5px;
    border: 1px solid;
  }
  .fan-val {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.66rem;
    white-space: nowrap;
    pointer-events: none;
  }
  .fan-val-outside {
    color: var(--muted);
  }
  .fan-val-inside {
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    padding: 0 4px;
  }
  .fan-val-lo.fan-val-outside { right: 100%; margin-right: 6px; justify-content: flex-end; }
  .fan-val-hi.fan-val-outside { left: 100%; margin-left: 6px; justify-content: flex-start; }
  .fan-val-lo.fan-val-inside { left: 0; margin-left: 6px; justify-content: flex-start; }
  .fan-val-hi.fan-val-inside { right: 0; margin-right: 6px; justify-content: flex-end; }
  .fan-marker {
    position: absolute;
    top: -16px;
    bottom: 0;
    width: 0;
    border-left: 1px dashed var(--outline);
    pointer-events: none;
  }
  .fan-marker-arrow {
    position: absolute;
    top: -15px;
    left: -6px;
    font-size: 10px;
    color: var(--text);
  }
  .fan-marker-price {
    position: absolute;
    top: -30px;
    left: -24px;
    font-size: 0.66rem;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .fan-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin: 10px 0 14px 46px;
  }

  /* ---- Hyper-grower "Fiyatın iması" / expected-value note ----------------*/
  .hyper-note {
    margin: 12px 0 0 46px;
    font-size: 0.76rem;
    color: var(--outline);
    line-height: 1.5;
  }
  .hyper-implied-line { color: var(--caution); }
  .hyper-ev-line { color: var(--muted); margin-top: 4px; }
  .capex-note { color: var(--muted); margin-top: 4px; }
  @media (max-width: 560px) {
    .hyper-note { margin-left: 0; }
  }

  /* ---- Model <-> market divergence block (governor, verdict action) ------*/
  .divergence-box {
    margin: 12px 0 0 46px;
    padding: 10px 12px;
    border: 1px solid var(--caution);
    border-radius: 8px;
    background: rgba(224, 132, 42, 0.08);
    font-size: 0.76rem;
    line-height: 1.5;
  }
  .divergence-title {
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--caution);
    font-size: 0.72rem;
    margin-bottom: 8px;
  }
  .divergence-table { width: 100%; border-collapse: collapse; }
  .divergence-table th, .divergence-table td {
    text-align: right; padding: 3px 6px; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .divergence-table th:first-child, .divergence-table td:first-child { text-align: left; color: var(--muted); font-weight: 400; }
  .divergence-table thead th { color: var(--muted); font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .divergence-model { color: var(--text); }
  .divergence-market { color: var(--caution); font-weight: 600; }
  .divergence-referee { color: var(--muted); margin-top: 8px; }
  @media (max-width: 560px) {
    .divergence-box { margin-left: 0; }
  }

  /* ---- Assumption strip (SCENARIO / GROWTH / DISCOUNT / RATIONALE) -------*/
  .assumption-strip {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 6px 18px;
    margin: 0 0 0 46px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 560px) {
    .assumption-strip { grid-template-columns: 1fr 1fr; margin-left: 0; }
  }
  .assum-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .assum-value {
    font-size: 0.8rem;
    font-family: var(--mono);
  }
  .assum-rationale .assum-value {
    font-family: var(--sans);
    color: var(--outline);
  }

  /* ---- Triangulation card --------------------------------------------- */
  /* Legacy compact chip-row layout -- used only as a fallback when a
     payload doesn't carry tri.rationale (older result shape). */
  .triangulation-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tri-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.74rem;
    background: rgba(255, 255, 255, 0.03);
  }
  .tri-icon { font-size: 0.85rem; font-weight: 700; line-height: 1; }
  .tri-agree .tri-icon { color: var(--green); }
  .tri-disagree .tri-icon { color: var(--red); }
  .tri-muted .tri-icon { color: var(--muted); }
  .tri-label {
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.68rem;
  }
  .tri-signal { font-family: var(--mono); }

  /* Rationale layout -- one row per valuation method, each with its own
     signal badge, an agreement marker against the overall direction, and
     a muted note line explaining *why* (tri.rationale[method]). Falls
     through to the compact chip row above when rationale is absent. */
  .tri-methods {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tri-method + .tri-method {
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .tri-method-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tri-method-head .tri-label {
    min-width: 84px;
  }
  .tri-marker {
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1;
  }
  .tri-marker-agree { color: var(--green); }
  .tri-marker-disagree { color: var(--red); }
  .tri-marker-muted { color: var(--muted); }
  .tri-reason {
    font-size: 0.78rem;
    color: var(--outline);
    line-height: 1.45;
    margin-top: 4px;
  }
  .tri-confidence {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  /* ---- Badges (status / confidence) -------------------------------------*/
  .badge {
    display: inline-block;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 0.76rem;
    font-weight: 700;
    max-width: 100%;
    overflow-wrap: break-word;
    white-space: nowrap;
  }
  .badge-green { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .badge-amber { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  /* Distinct "caution" bucket for the hyper-grower YÜKSEK BEKLENTİ FİYATLANMIŞ
     verdict -- deliberately a different hue from both the neutral MAKUL
     amber and the PAHALI red, since it signals a different kind of risk
     (price implies an aggressive-but-not-yet-disqualified growth path). */
  .badge-caution { background: rgba(255, 138, 61, 0.16); color: var(--caution); border: 1px solid rgba(255, 138, 61, 0.5); }
  .badge-red { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  /* Neutral bucket for a triangulation method with no usable signal
     (veri_yok) -- deliberately muted/gray rather than any of the four
     verdict colors, since "no data" isn't a point on the cheap<->expensive
     spectrum. */
  .badge-muted { background: rgba(139, 145, 157, 0.14); color: var(--muted); border: 1px solid rgba(139, 145, 157, 0.4); }
  .badge-label {
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-right: 6px;
  }

  /* ---- Verdict cards (fundamental/technical/profile fit) -----------------*/
  .verdict-card-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .gauge {
    position: relative;
    height: 6px;
    border-radius: 3px;
    margin: 2px 2px 2px;
    background: linear-gradient(to right, var(--green), var(--amber), var(--red));
  }
  .gauge-marker {
    position: absolute;
    top: -9px;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--text);
  }
  .verdict-note {
    font-size: 0.82rem;
    color: var(--outline);
    line-height: 1.45;
  }

  /* ---- Technical detail (momentum + support/resistance) ------------------*/
  .tech-section-title {
    font-size: 0.66rem;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 8px;
  }
  .rsi-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .rsi-gauge {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 4px;
    /* oversold (<30) green zone · neutral mid · overbought (>70) red zone */
    background: linear-gradient(to right,
      rgba(77,224,130,0.55) 0%, rgba(77,224,130,0.55) 30%,
      #2a3547 30%, #2a3547 70%,
      rgba(255,180,171,0.65) 70%, rgba(255,180,171,0.65) 100%);
  }
  .rsi-gauge-marker {
    position: absolute; top: -4px; width: 2px; height: 16px;
    background: var(--text); transform: translateX(-1px); border-radius: 1px;
  }
  .rsi-val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 2em; text-align: right; }
  .rsi-side { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .tech-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 8px;
  }
  .tech-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 9px;
    min-width: 0;
  }
  .tech-stat-label {
    font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
  }
  .tech-stat-val { font-size: 0.9rem; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .tech-pos { color: var(--green); }
  .tech-neg { color: var(--red); }
  .tech-div-note {
    font-size: 0.75rem; line-height: 1.4; margin-top: 8px;
    padding: 7px 10px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border);
  }
  .sr-ladder { display: flex; flex-direction: column; gap: 4px; }
  .sr-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 10px; border-radius: 7px; font-variant-numeric: tabular-nums;
  }
  .sr-res { background: rgba(255,180,171,0.10); }
  .sr-sup { background: rgba(77,224,130,0.10); }
  .sr-price { background: rgba(90,167,255,0.16); border: 1px solid var(--border); }
  .sr-side { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); min-width: 72px; }
  .sr-lvl { font-weight: 600; min-width: 8.5em; white-space: nowrap; }
  .sr-dist { font-size: 0.8rem; min-width: 3.6em; }
  .sr-why { flex: 1; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-strength-badge {
    font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 1px 7px; border-radius: 6px; white-space: nowrap;
  }
  .sr-str-strong { color: var(--green); background: rgba(77, 224, 130, 0.14); }
  .sr-str-medium { color: var(--amber); background: rgba(255, 185, 83, 0.14); }
  .sr-str-weak { color: var(--muted); background: rgba(139, 145, 157, 0.16); }
  .sr-fib-caption { font-size: 0.68rem; color: var(--muted); margin-bottom: 6px; }
  .tech-empty { color: var(--muted); font-size: 0.82rem; }

  /* ---- Trend & triggers (Technical card primary view) --------------------*/
  .trend-regime { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 4px 0 6px; }
  .regime-badge { display: inline-block; border-radius: 999px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; }
  .regime-up { background: rgba(77, 224, 130, 0.15); color: var(--green); border: 1px solid rgba(77, 224, 130, 0.4); }
  .regime-down { background: rgba(255, 180, 171, 0.15); color: var(--red); border: 1px solid rgba(147, 0, 10, 0.55); }
  .regime-neutral { background: rgba(255, 185, 83, 0.15); color: var(--amber); border: 1px solid rgba(255, 185, 83, 0.4); }
  .regime-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
  .regime-evi { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .trend-callout { display: flex; align-items: flex-start; gap: 8px; border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; font-size: 0.84rem; line-height: 1.45; }
  .callout-up { background: rgba(77, 224, 130, 0.10); border: 1px solid rgba(77, 224, 130, 0.35); }
  .callout-up .co-arrow { color: var(--green); }
  .callout-down { background: rgba(255, 180, 171, 0.10); border: 1px solid rgba(147, 0, 10, 0.5); }
  .callout-down .co-arrow { color: var(--red); }
  .co-arrow { font-size: 1rem; line-height: 1.2; flex-shrink: 0; }
  .trigger-ladder { display: flex; flex-direction: column; gap: 5px; }
  .trig-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; border-left: 3px solid transparent; background: rgba(255, 255, 255, 0.03); }
  .trig-up { border-left-color: var(--green); }
  .trig-down { border-left-color: var(--red); }
  .trig-now { border-left-color: var(--primary); background: rgba(90, 167, 255, 0.14); }
  .trig-nearest { box-shadow: 0 0 0 1px rgba(192, 199, 211, 0.5) inset; }
  .trig-arrow { width: 14px; text-align: center; font-size: 0.8rem; flex-shrink: 0; }
  .trig-up .trig-arrow { color: var(--green); }
  .trig-down .trig-arrow { color: var(--red); }
  .trig-now .trig-arrow { color: var(--primary); }
  .trig-price { font-family: var(--mono); font-weight: 700; font-size: 0.9rem; min-width: 104px; flex-shrink: 0; }
  .trig-rule { flex: 1; font-size: 0.8rem; line-height: 1.35; min-width: 0; }
  .trig-reason { color: var(--muted); }
  .trig-now-tag { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; color: var(--primary-light); }
  .trig-dist { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; min-width: 60px; text-align: right; flex-shrink: 0; }
  .tech-toggle { margin-top: 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 7px 12px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; cursor: pointer; font-family: var(--mono); }

  @media (max-width: 560px) {
    .trig-rule { flex-basis: 100%; order: 3; }

  /* ---- Price chart (price line + S/R + fair-value bands) -----------------*/
  .pchart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pchart-head .card-title { margin: 0; }
  .pchart svg { width: 100%; height: auto; display: block; }
  .pchart-area { fill: rgba(90, 167, 255, 0.12); stroke: none; }
  .pchart-line { fill: none; stroke: #5aa7ff; stroke-width: 1.6; }
  .pchart-grid { stroke: var(--border); stroke-width: 1; opacity: 0.55; }
  .pchart-tick { fill: var(--muted); font-size: 10px; }
  /* Support & resistance are drawn identically (a single dark-red line at
     each zone's price, no fill) -- only the R/S label distinguishes them.
     Simpler than a filled band: less visual clutter, no overlap fights with
     the fair-value box. */
  .pchart-sr-line { stroke: #7a1f1f; stroke-width: 1.5; opacity: 0.9; }
  .pchart-band-label { font-size: 9px; font-weight: 600; fill: #c0605f; }
  .pchart-fv-bull { stroke: var(--green); }
  .pchart-fv-bear { stroke: var(--red); }
  .pchart-fv-label { font-size: 9px; }
  .pchart-fv-ann { font-size: 8px; fill: var(--muted); }
  .pchart-now-line { stroke: var(--text); stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.75; }
  .pchart-now-label { font-size: 10px; fill: var(--text); font-weight: 700; }
  /* ---- Fair-value fan (today -> horizon projection cone) ---------------- */
  .pchart-fan-outer { fill: rgba(139, 145, 157, 0.14); stroke: none; }
  .pchart-fan-up { fill: rgba(77, 224, 130, 0.15); stroke: none; }
  .pchart-fan-down { fill: rgba(255, 180, 171, 0.15); stroke: none; }
  .pchart-fan-line { stroke-width: 1.2; fill: none; opacity: 0.85; }
  .pchart-fan-baseline { stroke: #5aa7ff; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; }
  .pchart-apex { fill: var(--text); stroke: var(--bg); stroke-width: 1; }
  .pchart-caption { font-size: 0.72rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .pchart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 0.7rem; color: var(--muted); }
  .pchart-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .pchart-sw { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }

  /* ---- Sensitivity table -------------------------------------------------*/
  .uncertainty-tag {
    display: inline-block;
    background: rgba(255, 185, 83, 0.15);
    color: var(--amber);
    border: 1px solid rgba(255, 185, 83, 0.4);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 0.64rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .sensitivity-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.76rem;
  }
  .sensitivity-table th, .sensitivity-table td {
    border: 1px solid var(--border);
    padding: 6px 4px;
    text-align: center;
  }
  .sensitivity-table thead th {
    color: var(--muted);
    font-weight: 400;
  }
  .sens-row-h {
    color: var(--muted);
    font-weight: 400;
  }
  .sens-base {
    background: rgba(90, 167, 255, 0.18);
    border-color: var(--primary);
    font-weight: 700;
  }
  .sens-axis-note {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ---- Entry plan table (reuses .sensitivity-table/.sens-base) -----------*/
  .entry-plan-table td.entry-trigger {
    text-align: left;
    font-family: var(--sans);
    font-size: 0.72rem;
    line-height: 1.4;
  }
  .entry-plan-table tr.entry-note-row td {
    text-align: left;
    color: var(--amber);
    font-family: var(--sans);
    font-size: 0.72rem;
  }
  .card-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin: -8px 0 14px;
    line-height: 1.5;
  }

  /* ---- Scenario returns list ---------------------------------------------*/
  .scenario-returns-list { display: flex; flex-direction: column; gap: 6px; }
  .scen-ret-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
  }
  .scen-ret-name { color: var(--muted); font-family: var(--mono); font-weight: 700; }
  .scen-ret-value { font-family: var(--mono); }

  /* ---- Thesis metric -------------------------------------------------- */
  .thesis-metric-line { font-size: 0.9rem; margin: 0 0 8px; }
  .thesis-rationale {
    font-size: 0.78rem;
    color: var(--outline);
    line-height: 1.5;
    margin: 0;
  }

  /* ---- Alert-style boxes (red flags / stop-adding) -----------------------*/
  .alert-box ul {
    margin: 0;
    padding-left: 18px;
  }
  .alert-box li {
    margin-bottom: 8px;
    font-size: 0.84rem;
  }
  .alert-box li:last-child { margin-bottom: 0; }
  .alert-box li .item-detail {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 2px;
  }
  .alert-box li .event-sev {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .alert-box li.event-critical .event-sev { background: rgba(220, 38, 38, 0.18); color: #f87171; }
  .alert-box li.event-warning  .event-sev { background: rgba(217, 119, 6, 0.18); color: #fbbf24; }
  .alert-box li.event-info     .event-sev { background: rgba(148, 163, 184, 0.18); color: var(--muted); }
  .empty-note {
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* ---- Footer analysis (catalyst + summary) -------------------------------*/
  .catalyst-line {
    font-family: var(--mono);
    font-size: 0.86rem;
    margin: 0 0 10px;
  }
  .summary-text {
    font-size: 0.9rem;
    line-height: 1.55;
    margin: 0;
    color: var(--outline);
  }

  /* ---- Global footer ---------------------------------------------------- */
  .global-footer {
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
    line-height: 1.6;
    text-align: center;
  }
  .global-footer a { color: var(--muted); }

  /* ---- Search-mode empty/loading/error states -----------------------------*/
  .empty-state, .loading-state {
    text-align: center;
    padding: 34px 16px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-top-color: var(--primary-light);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -2px;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner {
    border: 1px solid rgba(255, 180, 171, 0.5);
    background: rgba(147, 0, 10, 0.18);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.86rem;
    color: var(--red);
  }

  /* ---- Error card (analysis failed / result.error) ------------------------*/
  .error-box {
    border: 1px solid rgba(255, 180, 171, 0.5);
    background: rgba(147, 0, 10, 0.15);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .error-box strong {
    display: block;
    margin-bottom: 6px;
    color: var(--red);
  }
  .error-box p { margin: 0; font-size: 0.88rem; color: var(--outline); }
</style>
