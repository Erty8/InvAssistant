  function signalBadgeColor(sig) {
    var s = sig ? String(sig).toLowerCase() : "";
    if (s === "ucuz") return "green";
    if (s === "makul") return "amber";
    if (s === "yuksek_beklenti") return "caution";
    if (s === "pahali") return "red";
    if (s === "karisik") return "caution";
    return "muted";
  }

  // Agreement-marker kind for one method against the overall consensus
  // direction. Deliberately distinguishes "no consensus" from "this method
  // dissents": a veri_yok method, or any method when tri.direction is
  // "belirsiz" (no real consensus), gets a neutral "muted" marker rather
  // than a red X -- showing X on every method when there simply isn't an
  // agreed direction reads as "all methods are wrong", which is false.
  function triAgreementKind(sig, direction) {
    var s = sig ? String(sig).toLowerCase() : "";
    if (!s || s === "veri_yok") return "muted";
    // "karisik" is an ambiguity, not a dissent-against-consensus: show it
    // neutral rather than a red ✗ (the raw multiple and its growth-adjusted
    // counterpart simply point different ways).
    if (s === "karisik") return "muted";
    var dir = direction ? String(direction).toLowerCase() : "";
    if (!dir || dir === "belirsiz") return "muted";
    return s === dir ? "agree" : "disagree";
  }

  var TRI_MARKER_ICON = { agree: "✓", disagree: "✗", muted: "•" };

  // Sector-relative comparison line for the MULTIPLES method (VALUATION.md
  // Sec.7 axis-b): shows the current primary multiple vs its Damodaran sector
  // median explicitly, so the sector standing stays visible even when the
  // signal itself reads "MIXED". Renders nothing when no sector median
  // matched (comparison numbers absent).
  var SECTOR_BUCKET_WORD = {
    pahali: "sektöre göre pahalı",
    ucuz: "sektöre göre ucuz",
    makul: "sektör medyanıyla uyumlu",
  };
  function sectorComparisonLineHtml(valuation) {
    var cmp = (((valuation || {}).multiples || {}).sector || {}).comparison;
    if (!cmp || !isNum(cmp.current) || !isNum(cmp.median) || !isNum(cmp.ratio)) return "";
    var word = SECTOR_BUCKET_WORD[cmp.bucket] || "";
    var cls = cmp.bucket === "pahali" ? "sector-cmp-red"
            : cmp.bucket === "ucuz" ? "sector-cmp-green"
            : "sector-cmp-muted";
    var label = cmp.label || "Çarpan";
    return (
      '<div class="tri-sector ' + cls + '">' +
        '<span class="tri-sector-label">Sektör</span>' +
        escapeHtml(label) + " " + Number(cmp.current).toFixed(1) +
        " vs medyan " + Number(cmp.median).toFixed(1) +
        " (" + Number(cmp.ratio).toFixed(2) + "×" + (word ? " → " + word : "") + ")" +
      '</div>'
    );
  }

  function triangulationRowHtml(valuation, confidenceOverride) {
    var tri = (valuation || {}).triangulation;
    if (!tri) return "";
    var signals = tri.signals || {};
    var direction = tri.direction;
    var confidence = confidenceOverride || tri.confidence;
    var rationale = tri.rationale;
    var confColor = confidenceColor(confidence);

    // For financial/reit sectors the DCF slot is really the P/B×ROE anchor
    // (dcf.enabled === false in that case) -- label it accordingly.
    var dcfLabel = (valuation.dcf && valuation.dcf.enabled === false) ? "P/B×ROE" : "DCF";
    var methods = [
      { key: "dcf", label: dcfLabel },
      { key: "reverse_dcf", label: "REVERSE DCF" },
      { key: "multiples", label: "MULTIPLES" },
    ];

    // Defensive fallback: older payloads without tri.rationale render the
    // original compact chip-only row, no rationale lines, so this never
    // crashes on a payload predating the rationale field.
    if (!rationale) {
      var chips = methods.map(function (m) {
        var sig = signals[m.key];
        var kind = triAgreementKind(sig, direction);
        return (
          '<div class="tri-chip tri-' + kind + '">' +
            '<span class="tri-icon">' + TRI_MARKER_ICON[kind] + '</span>' +
            '<span class="tri-label">' + escapeHtml(m.label) + '</span>' +
            '<span class="tri-signal">' + escapeHtml(signalLabel(sig)) + '</span>' +
          '</div>'
        );
      }).join("");
      return (
        '<div class="card">' +
          '<div class="card-title">Triangulation</div>' +
          '<div class="triangulation-row">' +
            '<div class="tri-chips">' + chips + '</div>' +
            '<span><span class="badge-label">Confidence</span><span class="badge badge-' + confColor + '">' +
              escapeHtml(confidence || "—") + '</span></span>' +
          '</div>' +
        '</div>'
      );
    }

    var rows = methods.map(function (m) {
      var sig = signals[m.key];
      var kind = triAgreementKind(sig, direction);
      var reason = rationale[m.key];
      var extra = (m.key === "multiples") ? sectorComparisonLineHtml(valuation) : "";
      return (
        '<div class="tri-method">' +
          '<div class="tri-method-head">' +
            '<span class="tri-label">' + escapeHtml(m.label) + '</span>' +
            '<span class="badge badge-' + signalBadgeColor(sig) + '">' + escapeHtml(signalLabel(sig)) + '</span>' +
            '<span class="tri-marker tri-marker-' + kind + '">' + TRI_MARKER_ICON[kind] + '</span>' +
          '</div>' +
          (reason ? '<div class="tri-reason">' + escapeHtml(reason) + '</div>' : "") +
          extra +
        '</div>'
      );
    }).join("");

    var confReason = rationale.confidence;
    return (
      '<div class="card">' +
        '<div class="card-title">Triangulation</div>' +
        '<div class="tri-methods">' + rows + '</div>' +
        '<div class="tri-confidence">' +
          '<div class="tri-method-head">' +
            '<span class="badge-label">Confidence</span>' +
            '<span class="badge badge-' + confColor + '">' + escapeHtml(confidence || "—") + '</span>' +
          '</div>' +
          (confReason ? '<div class="tri-reason">' + escapeHtml(confReason) + '</div>' : "") +
        '</div>' +
      '</div>'
    );
  }

  // ---- Price chart: close line + S/R range bands + fair-value bands -------
  // Self-contained inline SVG (no libraries -- CSP blocks them), same
  // hand-rolled approach as the fan chart. Overlays only what the user asked
  // for: support/resistance ranges and the fair-value band.
  // Parse a "YYYY-MM-DD" price-series date into a Date (local midnight), or
  // null if it doesn't look like one.
  function parseYMD(s) {
    var parts = String(s || "").split("-");
    if (parts.length !== 3) return null;
    var y = Number(parts[0]), m = Number(parts[1]), d = Number(parts[2]);
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d);
  }

  // Slice the (up-to-5y, multi-resolution) price_series down to the calendar
  // window for a range (3m/1y/5y). The 3m/1y windows land entirely in the
  // daily tail; 5y returns the whole series. Falls back to the last ~40
  // points if a window would leave too few to draw.
  function sliceSeriesByHorizon(series, range) {
    if (!series || series.length < 2) return series || [];
    var days = HORIZON_DAYS[range];
    if (!days) return series;
    var last = parseYMD(series[series.length - 1].t);
    if (!last) return series;
    var cutoff = last.getTime() - days * 86400000;
    var out = series.filter(function (p) {
      var d = parseYMD(p.t);
      return d && d.getTime() >= cutoff;
    });
    return out.length >= 2 ? out : series.slice(-Math.min(series.length, 40));
  }

  // Implied annualized return IF price converged to `fv` by the end of the
  // range: (fv/price)^(1/years) - 1. Not a forecast -- see the chart caption.
  function annualizedReturn(fv, price, range) {
    if (!isNum(fv) || !isNum(price) || Number(price) <= 0 || Number(fv) <= 0) return null;
    var years = HORIZON_YEARS[range] || 1;
    return Math.pow(Number(fv) / Number(price), 1 / years) - 1;
  }

  // Total return over the sliced window and its annualized volatility. Vol is
  // resolution-aware: it annualizes the log-return stdev by the periods-per-
  // year implied by the median calendar gap between points, so the daily
  // (3m/1y) and weekly-tail (5y) slices are both handled correctly.
  function computeRangeStats(slice) {
    if (!slice || slice.length < 2) return null;
    var first = Number(slice[0].c), last = Number(slice[slice.length - 1].c);
    var ret = (isNum(first) && isNum(last) && first > 0) ? (last / first - 1) : null;
    var rets = [], gaps = [];
    for (var i = 1; i < slice.length; i++) {
      var c0 = Number(slice[i - 1].c), c1 = Number(slice[i].c);
      if (c0 > 0 && c1 > 0) rets.push(Math.log(c1 / c0));
      var d0 = parseYMD(slice[i - 1].t), d1 = parseYMD(slice[i].t);
      if (d0 && d1) gaps.push((d1.getTime() - d0.getTime()) / 86400000);
    }
    var vol = null;
    if (rets.length >= 5) {
      var mean = rets.reduce(function (a, b) { return a + b; }, 0) / rets.length;
      var varr = rets.reduce(function (a, b) { return a + (b - mean) * (b - mean); }, 0) / (rets.length - 1);
      var sd = Math.sqrt(varr);
      gaps.sort(function (a, b) { return a - b; });
      var medGap = gaps.length ? gaps[Math.floor(gaps.length / 2)] : 1.4;
      var perYear = medGap > 0 ? 365 / medGap : 252;
      vol = sd * Math.sqrt(perYear);
    }
    return { ret: ret, vol: vol };
  }

  // Two stat tiles above the chart: realized return over the selected window
  // and its annualized volatility. Both recompute on a range switch.
  function rangeStatsTilesHtml(slice, range) {
    var s = computeRangeStats(slice);
    if (!s) return "";
    var retTxt = isNum(s.ret) ? fmtSignedPct(s.ret * 100) : "—";
    var retCls = isNum(s.ret) ? (s.ret >= 0 ? "tech-pos" : "tech-neg") : "";
    var volTxt = isNum(s.vol) ? Math.round(s.vol * 100) + "%" : "—";
    return '<div class="tech-stats" style="margin-bottom:12px;">' +
      '<div class="tech-stat"><div class="tech-stat-label">Getiri (' + escapeHtml(horizonLabel(range)) + ')</div>' +
        '<div class="tech-stat-val ' + retCls + '">' + retTxt + '</div></div>' +
      '<div class="tech-stat"><div class="tech-stat-label">Volatilite (yıl.)</div>' +
        '<div class="tech-stat-val">' + volTxt + '</div></div>' +
      '</div>';
  }

  // Client-side range switch (3m/1y/5y). Reuses the shared horizon-toggle
  // styling; scoped by the .range-toggle wrapper so its clicks are distinct
  // from the header's read-only analyzed-horizon indicator.
  function rangeToggleHtml(current) {
    var pills = ["3m", "1y", "5y"].map(function (v) {
      return '<button type="button" class="horizon-pill' + (v === current ? " active" : "") +
        '" data-range="' + v + '">' + escapeHtml(horizonLabel(v)) + '</button>';
    }).join("");
    return '<div class="horizon-toggle interactive range-toggle">' + pills + '</div>';
  }

  // The SVG price chart + fan for one range, plus its legend and caption.
  // `slice` is the range-windowed series; `range` drives the horizon label and
  // the annualized-return figures on the fan endpoints.
  function priceChartSvg(t, result, range, slice, analyst) {
    var W = 760, H = 340, PL = 48, PR = 112, PT = 14, PB = 28;
    var plotW = W - PL - PR, plotH = H - PT - PB;

    var supports = (t.support_levels || []).filter(function (z) { return isNum(z.low) && isNum(z.high); });
    var resistances = (t.resistance_levels || []).filter(function (z) { return isNum(z.low) && isNum(z.high); });
    var fv = (result || {}).fair_value_range || {};

    // Analyst consensus price target (external reference, not the model's
    // own fair value) -- drawn as a distinct amber dashed line + faint band,
    // separate from the scenario fan below.
    var a = analyst || {};
    var atMean = isNum(a.target_mean) ? Number(a.target_mean) : null;
    var atLow = isNum(a.target_low) ? Number(a.target_low) : null;
    var atHigh = isNum(a.target_high) ? Number(a.target_high) : null;

    function bandMid(b) { return (b && isNum(b.lo) && isNum(b.hi)) ? (Number(b.lo) + Number(b.hi)) / 2 : null; }
    var baseMid = bandMid(fv.base);
    var bullTop = (fv.bull && isNum(fv.bull.hi)) ? Number(fv.bull.hi)
      : (fv.base && isNum(fv.base.hi) ? Number(fv.base.hi) : baseMid);
    var bearBot = (fv.bear && isNum(fv.bear.lo)) ? Number(fv.bear.lo)
      : (fv.base && isNum(fv.base.lo) ? Number(fv.base.lo) : baseMid);
    var sens = ((result || {}).valuation || {}).sensitivity || {};
    var sensLo = isNum(sens.lo) ? Number(sens.lo) : null;
    var sensHi = isNum(sens.hi) ? Number(sens.hi) : null;
    var highUncertainty = !!sens.high_uncertainty;

    var hasFan = baseMid !== null && bullTop !== null && bearBot !== null && isNum(t.price);

    var vals = slice.map(function (p) { return p.c; });
    if (isNum(t.price)) vals.push(t.price);
    supports.concat(resistances).forEach(function (z) { vals.push(z.low, z.high); });
    if (hasFan) {
      vals.push(bullTop, bearBot, baseMid);
      if (sensLo !== null) vals.push(sensLo);
      if (sensHi !== null) vals.push(sensHi);
    }
    if (atMean !== null) {
      vals.push(atMean);
      if (atLow !== null) vals.push(atLow);
      if (atHigh !== null) vals.push(atHigh);
    }
    var vmin = Math.min.apply(null, vals), vmax = Math.max.apply(null, vals);
    if (vmax <= vmin) vmax = vmin + 1;
    var padY = (vmax - vmin) * 0.06;
    var lo = vmin - padY, hi = vmax + padY;

    var fanFrac = 0.30;
    var histW = hasFan ? plotW * (1 - fanFrac) : plotW;
    var xToday = PL + histW;
    var xEnd = PL + plotW;

    var n = slice.length;
    function xOf(i) { return PL + histW * (i / (n - 1)); }
    function yOf(v) { return PT + plotH * (hi - v) / (hi - lo); }

    var linePts = slice.map(function (p, i) { return (i ? "L" : "M") + xOf(i).toFixed(1) + " " + yOf(p.c).toFixed(1); }).join(" ");
    var areaPath = "M" + PL + " " + (PT + plotH).toFixed(1) + " " +
      slice.map(function (p, i) { return "L" + xOf(i).toFixed(1) + " " + yOf(p.c).toFixed(1); }).join(" ") +
      " L" + xToday.toFixed(1) + " " + (PT + plotH).toFixed(1) + " Z";

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Price and fair-value fan chart">';

    // Analyst consensus overlay: a distinct amber reference level, separate
    // from the model's own scenario fan. Drawn first (behind grid, S/R,
    // fan, and the price line/area) so it reads as background context.
    if (atMean !== null) {
      if (atLow !== null && atHigh !== null) {
        var yAtHigh = yOf(atHigh), yAtLow = yOf(atLow);
        svg += '<rect class="pchart-analyst-band" x="' + PL + '" y="' + Math.min(yAtHigh, yAtLow).toFixed(1) +
          '" width="' + (xEnd - PL).toFixed(1) + '" height="' + Math.abs(yAtLow - yAtHigh).toFixed(1) + '"/>';
      }
      var yAtMean = yOf(atMean);
      svg += '<line class="pchart-analyst-line" x1="' + PL + '" y1="' + yAtMean.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yAtMean.toFixed(1) + '"/>';
      svg += '<text class="pchart-analyst-label" x="' + (xEnd + 5) + '" y="' + (yAtMean + 3).toFixed(1) + '">Analist ' + fmtMoney(atMean) + '</text>';
    }

    for (var g = 0; g <= 4; g++) {
      var vy = lo + (hi - lo) * g / 4;
      var yy = yOf(vy).toFixed(1);
      svg += '<line class="pchart-grid" x1="' + PL + '" y1="' + yy + '" x2="' + xEnd + '" y2="' + yy + '"/>';
      svg += '<text class="pchart-tick" x="' + (PL - 5) + '" y="' + (Number(yy) + 3) + '" text-anchor="end">' + fmtMoney(vy) + '</text>';
    }
    [0, Math.floor((n - 1) / 2), n - 1].forEach(function (i) {
      var parts = String(slice[i].t || "").split("-");
      var lbl = parts.length === 3 ? (parts[1] + "/" + parts[0].slice(2)) : slice[i].t;
      var anchor = i === 0 ? "start" : (i === n - 1 ? "end" : "middle");
      svg += '<text class="pchart-tick" x="' + xOf(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="' + anchor + '">' + escapeHtml(lbl) + '</text>';
    });

    function srLine(z, sideLabel) {
      var y = yOf(z.price).toFixed(1);
      return '<line class="pchart-sr-line" x1="' + PL + '" y1="' + y + '" x2="' + xToday.toFixed(1) + '" y2="' + y + '"/>' +
        '<text class="pchart-band-label" x="' + (PL + 4) + '" y="' + (Number(y) - 3) + '" text-anchor="start">' + sideLabel + " " + fmtMoney(z.price) + '</text>';
    }
    resistances.forEach(function (z) { svg += srLine(z, "R"); });
    supports.forEach(function (z) { svg += srLine(z, "S"); });

    if (hasFan) {
      var apexY = yOf(Number(t.price));
      var yBull = yOf(bullTop), yBear = yOf(bearBot), yBase = yOf(baseMid);

      svg += '<line class="pchart-now-line" x1="' + xToday.toFixed(1) + '" y1="' + PT + '" x2="' + xToday.toFixed(1) + '" y2="' + (PT + plotH).toFixed(1) + '"/>';

      if (sensLo !== null && sensHi !== null) {
        var ySensHi = yOf(sensHi), ySensLo = yOf(sensLo);
        svg += '<polygon class="pchart-fan-outer" points="' +
          xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
          xEnd.toFixed(1) + ',' + ySensHi.toFixed(1) + ' ' +
          xEnd.toFixed(1) + ',' + ySensLo.toFixed(1) + '"/>';
      }

      svg += '<polygon class="pchart-fan-up" points="' +
        xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBull.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBase.toFixed(1) + '"/>';
      svg += '<polygon class="pchart-fan-down" points="' +
        xToday.toFixed(1) + ',' + apexY.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBase.toFixed(1) + ' ' +
        xEnd.toFixed(1) + ',' + yBear.toFixed(1) + '"/>';

      svg += '<line class="pchart-fan-line pchart-fv-bull" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBull.toFixed(1) + '"/>';
      svg += '<line class="pchart-fan-baseline" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBase.toFixed(1) + '"/>';
      svg += '<line class="pchart-fan-line pchart-fv-bear" x1="' + xToday.toFixed(1) + '" y1="' + apexY.toFixed(1) + '" x2="' + xEnd.toFixed(1) + '" y2="' + yBear.toFixed(1) + '"/>';

      // Scenario endpoint labels (value line + implied annualized-return line).
      var annBull = annualizedReturn(bullTop, t.price, range);
      var annBase = annualizedReturn(baseMid, t.price, range);
      var annBear = annualizedReturn(bearBot, t.price, range);
      function annLine(y, ann) {
        return ann === null ? "" :
          '<text class="pchart-fv-ann" x="' + (xEnd + 5) + '" y="' + (y + 11).toFixed(1) + '">' + fmtSignedPct(ann * 100) + '/y</text>';
      }
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBull + 1).toFixed(1) + '" fill="var(--green)">Bull ' + fmtMoney(bullTop) + '</text>' + annLine(yBull, annBull);
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBase + 1).toFixed(1) + '" fill="#5aa7ff">Base ' + fmtMoney(baseMid) + '</text>' + annLine(yBase, annBase);
      svg += '<text class="pchart-fv-label" x="' + (xEnd + 5) + '" y="' + (yBear + 1).toFixed(1) + '" fill="var(--red)">Bear ' + fmtMoney(bearBot) + '</text>' + annLine(yBear, annBear);

      svg += '<text class="pchart-tick" x="' + ((xToday + xEnd) / 2).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle">' + escapeHtml(horizonLabel(range)) + ' →</text>';
    }

    svg += '<path class="pchart-area" d="' + areaPath + '"/>';
    svg += '<path class="pchart-line" d="' + linePts + '"/>';

    if (isNum(t.price)) {
      var yp = yOf(t.price);
      if (hasFan) {
        svg += '<circle class="pchart-apex" cx="' + xToday.toFixed(1) + '" cy="' + yp.toFixed(1) + '" r="3"/>';
        svg += '<text class="pchart-now-label" x="' + (PL + 4) + '" y="' + (PT + 12) + '">Now ' + fmtMoney(t.price) + '</text>';
      } else {
        svg += '<line class="pchart-now-line" x1="' + PL + '" y1="' + yp.toFixed(1) + '" x2="' + xEnd + '" y2="' + yp.toFixed(1) + '"/>';
        svg += '<text class="pchart-now-label" x="' + (xEnd + 5) + '" y="' + (yp + 3).toFixed(1) + '">' + fmtMoney(t.price) + '</text>';
      }
    }
    svg += '</svg>';

    var legend =
      '<div class="pchart-legend">' +
        '<span><span class="pchart-sw" style="background:#5aa7ff"></span>Price</span>' +
        ((resistances.length || supports.length) ? '<span><span class="pchart-sw" style="background:#7a1f1f"></span>Support / Resistance</span>' : "") +
        (hasFan ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#4de082", 0.5) + '"></span>Upside</span>' +
                  '<span><span class="pchart-sw" style="background:' + hexToRgba("#ffb4ab", 0.5) + '"></span>Downside</span>' +
                  (sensLo !== null && sensHi !== null ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#8b919d", 0.35) + '"></span>Sensitivity</span>' : "") : "") +
        (atMean !== null ? '<span><span class="pchart-sw" style="background:' + hexToRgba("#ffb953", 0.5) + '"></span>Analist hedefi</span>' : "") +
      '</div>';

    var caption = hasFan
      ? '<div class="pchart-caption">Yelpaze bugünkü fiyattan senaryo değerlerine (ayı · baz · boğa) açılır; sağdaki ' +
        '<b>%/yıl</b>, fiyat ufuk sonunda o senaryoya yakınsarsa ima edilen yıllık getiridir — bir tahmin ya da ' +
        'fiyat yörüngesi değildir.' +
        (highUncertainty ? ' <span class="uncertainty-tag">Yüksek belirsizlik</span>' : "") +
        '</div>'
      : "";

    return svg + legend + caption;
  }

  // Body of the price card for one range: stat tiles + chart. Re-rendered in
  // place by wirePriceRange() when the user flips the range toggle.
  function priceRangeBodyHtml(technical, result, range, analyst) {
    var t = technical || {};
    var series = t.price_series || [];
    var slice = sliceSeriesByHorizon(series, range);
    return rangeStatsTilesHtml(slice, range) + priceChartSvg(t, result, range, slice, analyst);
  }

  function priceChartCardHtml(technical, result, horizon, analyst) {
    var t = technical || {};
    var series = t.price_series || [];
    if (series.length < 2) return "";
    var defRange = HORIZON_DAYS[horizon] ? horizon : "1y";
    return '<div class="card pchart">' +
      '<div class="pchart-head">' +
        '<div class="card-title">Price &amp; Fair-Value Fan</div>' +
        rangeToggleHtml(defRange) +
      '</div>' +
      '<div id="price-range-body">' + priceRangeBodyHtml(technical, result, defRange, analyst) + '</div>' +
      '</div>';
  }

  // Wire the client-side range toggle: flipping 3m/1y/5y re-slices the chart
  // window and recomputes the stat tiles + annualized-return figures with no
  // server round-trip (valuation is horizon-independent). This is a chart
  // *lens*, separate from the analyzed horizon shown in the header pill.
  function wirePriceRange(technical, result, analyst) {
    var toggle = bodyEl.querySelector(".range-toggle");
    var body = document.getElementById("price-range-body");
    if (!toggle || !body) return;
    toggle.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".horizon-pill") : null;
      if (!btn) return;
      var range = btn.getAttribute("data-range");
      if (!range) return;
      toggle.querySelectorAll(".horizon-pill").forEach(function (p) {
        p.classList.toggle("active", p === btn);
      });
      body.innerHTML = priceRangeBodyHtml(technical, result, range, analyst);
    });
  }

  // ---- Verdict cards (fundamental/technical/profile fit) ------------------
  function verdictCardHtml(label, verdictText, noteText) {
    var color = bucketColor(verdictText);
    var pos = GAUGE_POSITION[color];
    return (
      '<div class="card">' +
        '<div class="card-title">' + escapeHtml(label) + '</div>' +
        '<div class="verdict-card-body">' +
          '<div class="gauge"><div class="gauge-marker" style="left:' + pos + '%;">▲</div></div>' +
          '<div><span class="badge badge-' + color + '">' + escapeHtml(verdictText || "—") + '</span></div>' +
          '<div class="verdict-note">' + escapeHtml(noteText || "—") + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // ---- Technical card: verdict + momentum + support/resistance ------------
  // Signed percentage-POINT value (input already in points, e.g. 14 -> "+14%"),
  // wrapped green/red by sign. "—" when missing.
  function techSigned(v) {
    if (!isNum(v)) return "—";
    var num = Number(v);
    var txt = (num >= 0 ? "+" : "") + (Math.round(num * 10) / 10) + "%";
    return '<span class="' + (num >= 0 ? "tech-pos" : "tech-neg") + '">' + txt + '</span>';
  }

  // ---- S/R helpers (shared by the trigger ladder + the detail rows) -------
  // Why a level matters: 52-week extreme / how many swing points tested it /
  // Fibonacci retracement / a major moving average. `withLast` appends the
  // recency of the last test (used only in the collapsed detail section).
  function srReason(lvl, withLast) {
    var parts = [];
    if (lvl.is_52w_high) parts.push("52h tepe");
    else if (lvl.is_52w_low) parts.push("52h dip");
    else if ((lvl.touches || 0) >= 1) parts.push(lvl.touches + "× test");
    if (lvl.fib) parts.push("Fib " + lvl.fib);
    if (lvl.ma) parts.push(lvl.ma);
    var base = parts.length ? parts.join(" + ") : "seviye";
    if (withLast && lvl.last_touch) base += " · son " + lvl.last_touch;
    return base;
  }
  // Strength: a 52-week extreme, a repeatedly-tested swing, or a swing that
  // coincides with a Fibonacci level or a major moving average is Strong; a
  // lone fib / lone MA / single touch is Medium.
  function srStrength(lvl) {
    var touches = lvl.touches || 0;
    var is52wNearEnough = (lvl.is_52w_high || lvl.is_52w_low) && Math.abs(lvl.dist_pct) <= 60;
    if (is52wNearEnough || touches >= 2 || (touches >= 1 && (lvl.fib || lvl.ma))) {
      return { label: "Strong", cls: "sr-str-strong" };
    }
    if (touches === 1 || lvl.fib || lvl.ma) return { label: "Medium", cls: "sr-str-medium" };
    return { label: "Weak", cls: "sr-str-weak" };
  }
  // A level is a price RANGE (low–high); collapse to one number if the band
  // is trivially thin.
  function srRange(lvl) {
    if (lvl.low != null && lvl.high != null && lvl.high - lvl.low > 0.01) {
      return fmtMoney(lvl.low) + "–" + fmtMoney(lvl.high);
    }
    return fmtMoney(lvl.price != null ? lvl.price : lvl.low);
  }

  // The action a daily close through a resistance / support implies. SMA-tagged
  // levels get the "trend line" framing (SMA200 = long-term, SMA50 = short-term)
  // -- that's the whole point: a close through a moving average flips the trend
  // regime, not just a horizontal shelf.
  function resistanceEffect(lvl, regimeDir) {
    if (lvl.ma && /200/.test(lvl.ma)) return "uzun vadeli UPTREND onayı";
    if (lvl.ma && /50/.test(lvl.ma)) return regimeDir === "up" ? "uptrend güçlenir" : "düşüş trendi kırılır";
    return "direnç aşılır, yukarı alan açılır";
  }
  function supportEffect(lvl, regimeDir) {
    if (lvl.is_52w_low) return "yeni 52 hafta dibi";
    if (lvl.ma && /200/.test(lvl.ma)) return "uzun vadeli trend desteği kırılır";
    if (lvl.ma && /50/.test(lvl.ma)) return regimeDir === "up" ? "uptrend zayıflar" : "düşüş hızlanır";
    return "düşüş hızlanır";
  }

  // ---- Momentum synthesis: adapter over the Python-computed composite ------
  // The composite direction/strength score (weighting, thresholds,
  // acceleration) is now computed server-side in
  // sec_analyzer/technical/momentum.py::compute_price_momentum and delivered
  // as t.momentum (see SPEC's payload.technical.momentum shape). This
  // function no longer re-derives S from raw indicators -- it only MAPS the
  // Python payload onto the internal field shape the rest of this file
  // (computeReversal, momentumSentence, the badge/meter render) already
  // consumes, so none of those call sites had to change. r1/r3/r6/rsi/mh/mc
  // are still read from the raw technical indicators (not from t.momentum)
  // because momentumSentence's prose is built from those, not from the score.
  function computeMomentum(t) {
    if (!t || !t.momentum) return null;
    var m = t.momentum;
    var r1 = isNum(t.return_1m_pct) ? Number(t.return_1m_pct) : null;
    var r3 = isNum(t.return_3m_pct) ? Number(t.return_3m_pct) : null;
    var r6 = isNum(t.return_6m_pct) ? Number(t.return_6m_pct) : null;
    var rsi = isNum(t.rsi14) ? Number(t.rsi14) : null;
    var mh = isNum(t.macd_hist) ? Number(t.macd_hist) : null;
    var mc = (t.macd_cross === "bullish" || t.macd_cross === "bearish") ? t.macd_cross : null;

    var dirKind = m.direction === "up" || m.direction === "down" ? m.direction : "flat";
    var dirCls = dirKind === "up" ? "mom-badge-up" : (dirKind === "down" ? "mom-badge-down" : "mom-badge-flat");

    return {
      S: isNum(m.s) ? Number(m.s) : null,
      meterPos: isNum(m.meter_pos) ? Number(m.meter_pos) : 50,
      dirLabel: m.label || "—",
      dirCls: dirCls,
      arrow: m.arrow || "→",
      accelWord: m.accel || null,
      dirKind: dirKind,

  }

  // ---- Swing reversal-confirmation checklist ------------------------------
  // Turns the momentum readout into an actionable "is the trend turning?"

  // BEARISH one. Each row is a deterministic check over already-computed

  // (t.macd_cross), OBV money flow (t.obv_trend), and RSI divergence
  // (t.rsi_divergence). A confirmed row is a ✓; a still-pending precondition

  var _REV_VOLUME_MIN = 1.5; // rel_volume at/above which the turn has real participation

  // historical default (volMin 1.5, 2-of-N confirm, 12% wide-stop line), so a
  // 1y report is unchanged. Only timing/stop-acceptability shifts — the price

  function swingHorizonTuning(horizon) {
    if (horizon === "3m") return { volMin: 1.3, strongConfirm: 1, wideStopPct: 8,
      note: "Zamanlama ufku 3 ay: hızlı teyit (1 sinyal), dar stop (>%8 geniş sayılır)." };
    if (horizon === "5y") return { volMin: 1.8, strongConfirm: 3, wideStopPct: 18,
      note: "Zamanlama ufku 5 yıl: güçlü teyit (3 sinyal) beklenir, geniş stop toleransı (>%18)." };
    return { volMin: 1.5, strongConfirm: 2, wideStopPct: 12,

  }
  function computeReversal(t, momentum, horizon) {
    if (!momentum || (momentum.dirKind !== "up" && momentum.dirKind !== "down")) return null;
    var tuning = swingHorizonTuning(horizon);
    var bull = momentum.dirKind === "down"; // downtrend -> watch for a bullish turn
    var rows = [];
    function row(state, text) { rows.push({ state: state, text: text }); }

    // 1. RSI reclaim of the extreme line.
    var rsi = isNum(t.rsi14) ? Number(t.rsi14) : null;
    if (bull) {
      if (t.rsi_reclaim === "bullish") row("ok", "RSI aşırı satımdan çıktı (30 üstünü geri aldı)");
      else if (rsi !== null && rsi < 30) row("pending", "RSI aşırı satımda (" + rsi.toFixed(0) + ") — henüz 30 üstünü geri almadı");
      else row("none", "RSI aşırı satım dönüşü yok");
    } else {
      if (t.rsi_reclaim === "bearish") row("ok", "RSI aşırı alımdan döndü (70 altına indi)");
      else if (rsi !== null && rsi > 70) row("pending", "RSI aşırı alımda (" + rsi.toFixed(0) + ") — henüz 70 altına inmedi");
      else row("none", "RSI aşırı alım dönüşü yok");
    }

    // 2. MACD signal-line crossover.
    if (t.macd_cross === (bull ? "bullish" : "bearish")) row("ok", "MACD " + (bull ? "yukarı" : "aşağı") + " kesişim (taze)");
    else if (t.macd_cross === (bull ? "bearish" : "bullish")) row("bad", "MACD ters yönde kesişti");
    else row("none", "MACD kesişimi yok");

    // 3. OBV money flow.
    if (t.obv_trend === (bull ? "up" : "down")) row("ok", "OBV " + (bull ? "para girişi (toplama)" : "para çıkışı (dağıtım)"));
    else if (t.obv_trend === (bull ? "down" : "up")) row("bad", "OBV ters yönde (" + (bull ? "dağıtım" : "toplama") + ")");
    else row("none", "OBV yatay");

    // 4. Volume participation at the turn (rel_volume = last vol / 20d avg). A
    // reversal on elevated volume is far more trustworthy than one on thin
    // trade; direction-neutral, so it reads the same for a bullish/bearish turn.
    var rv = isNum(t.rel_volume) ? Number(t.rel_volume) : null;
    if (rv !== null) {
      if (rv >= tuning.volMin) row("ok", "Hacim ortalamanın belirgin üstünde (" + rv.toFixed(1) + "×) — dönüşe katılım var");
      else row("none", "Hacim sıradan (" + rv.toFixed(1) + "×) — dönüşe güçlü katılım yok");
    }

    // 5. Volume climax / capitulation bar in the last ~10 sessions. A
    // wide-range, huge-volume bar in the direction of the exhausting trend

    // exhaustion -- a classic reversal tell. Adds a row only when detected.
    var vc = t.volume_climax;
    if (vc && vc.detected && vc.direction === (bull ? "down" : "up")) {

      row("ok", (bull ? "Kapitülasyon mumu" : "Alım klimaksı") + " (" + ago + ", " + Number(vc.rel_volume).toFixed(1) + "× hacim) — tükeniş");
    }

    // 6. RSI divergence (bonus corroboration; only adds a row when present).

    var total = rows.length;
    var verdict, vcls;

    else if (confirmed < tuning.strongConfirm) { verdict = "Erken dönüş sinyali — teyit zayıf, bekle"; vcls = "rev-early"; }
    else { verdict = (bull ? "Dönüş teyitleniyor — boğa tarafı güçleniyor" : "Dönüş teyitleniyor — ayı tarafı güçleniyor"); vcls = "rev-strong"; }

    // turn (nearest support the invalidation), mirrored for a bearish turn.
    var watchHtml = "";
    var trig = bull ? t.nearest_resistance : t.nearest_support;
    var inval = bull ? t.nearest_support : t.nearest_resistance;
    if (isNum(trig) || isNum(inval)) {

      if (isNum(trig)) parts.push((bull ? "$" + Number(trig).toFixed(2) + " direncini geri alması dönüşü teyit eder" : "$" + Number(trig).toFixed(2) + " desteğini kaybetmesi dönüşü teyit eder"));
      if (isNum(inval)) parts.push((bull ? "$" + Number(inval).toFixed(2) + " desteği kırılırsa senaryo bozulur" : "$" + Number(inval).toFixed(2) + " direnci aşılırsa senaryo bozulur"));

    }

    // in % and ATR multiples -- the yardstick for position sizing (risk per
    // share). Only when both an invalidation level and ATR are available.
    var px = isNum(t.price) ? Number(t.price) : null;
    var atr = isNum(t.atr14) ? Number(t.atr14) : null;
    var riskHtml = "";
    if (px !== null && px > 0 && atr !== null && atr > 0 && isNum(inval)) {
      var stopDist = Math.abs(px - Number(inval));
      var riskPct = stopDist / px * 100;
      var atrMult = stopDist / atr;
      var wide = riskPct > tuning.wideStopPct; // horizon-scaled: tighter for a short swing, wider for a long hold
      riskHtml = '<div class="rev-risk' + (wide ? " rev-risk-wide" : "") + '">' +
        '<span class="rev-watch-label">Risk</span>' +
        escapeHtml("Stop $" + Number(inval).toFixed(2) + " ≈ girişten %" + riskPct.toFixed(1) +
          " uzakta (" + atrMult.toFixed(1) + "× ATR); ATR $" + atr.toFixed(2) +
          (wide ? " — geniş stop, pozisyonu küçült" : "")) + '.</div>';
    }

    var tuneHtml = '<div class="rev-tune">' + escapeHtml(tuning.note) + '</div>';

    return { bull: bull, rows: rows, confirmed: confirmed, total: total, verdict: verdict, vcls: vcls, watchHtml: watchHtml + riskHtml + tuneHtml };
  }

  // Compact badge marker: only once the turn has ≥2 confirmations, so the
  // momentum badge itself flags "a reversal is building" at a glance.
  function reversalBadgeMarkerHtml(rev) {
    if (!rev || rev.confirmed < 2) return "";
    var word = rev.bull ? "dönüş yakın ⤴" : "dönüş riski ⤵";
    var cls = rev.bull ? "rev-mark-up" : "rev-mark-down";
    return '<span class="rev-badge-mark ' + cls + '">↺ ' + word + '</span>';
  }

  // Bollinger squeeze chip: flags volatility compression (band width in the
  // tightest fifth of its ~6-month range) -- an expansion move often follows,
  // so a squeeze is a "get ready" for swing timing (direction-agnostic).
  function squeezeBadgeHtml(t) {
    var sq = t.bb_squeeze;
    if (!sq || !sq.active) return "";
    return '<span class="rev-badge-mark sq-mark">⇉ SIKIŞMA (' + Math.round(Number(sq.percentile)) + 'p)</span>';
  }

  function reversalBlockHtml(rev) {
    if (!rev) return "";
    var ICON = { ok: "✓", pending: "◦", bad: "✗", none: "◦" };
    var rowsHtml = rev.rows.map(function (r) {
      return '<li class="rev-row rev-' + r.state + '"><span class="rev-icon">' + ICON[r.state] + '</span>' + escapeHtml(r.text) + '</li>';
    }).join("");
    var help = "Değerleme 'ne alınır'ı, bu liste 'ne zaman'ı gösterir: kaç bağımsız gösterge " +
      "trendin döndüğünü teyit ediyor. ✓ arttıkça sinyal güçlenir; tek başına 'ucuz' + düşen trend " +
      "genelde erkendir. 'İzle' satırı giriş/geçersizlik seviyesini verir.";
    return (
      '<div class="rev-block">' +
        '<div class="rev-head"><span class="rev-title">Dönüş Teyidi</span>' +
          '<span class="rev-verdict ' + rev.vcls + '">' + rev.confirmed + '/' + rev.total + ' · ' + escapeHtml(rev.verdict) + '</span>' +
        '</div>' +
        '<div class="rev-help">' + escapeHtml(help) + '</div>' +
        '<ul class="rev-list">' + rowsHtml + '</ul>' +
        rev.watchHtml +

  }

  // ---- Swing setup grade (A/B/C) ------------------------------------------
  // A single composite of the three things a swing entry needs: VALUE (is it
  // cheap? -> triangulation direction), TIMING (is a bullish reversal
  // confirming? -> computeReversal), and REWARD (best tranche R/R from the
  // entry plan). Each contributes 0-2 points; the grade is the score ratio.
  // Long-biased (the common retail swing case) and fully transparent -- the
  // three component chips are shown so the letter is never a black box.
  function bestEntryRR(entryPlan) {
    if (!Array.isArray(entryPlan)) return null;
    var best = null;
    entryPlan.forEach(function (tr) {

    });

  }

  function swingSetupCardHtml(payload, result, technical) {
    var t = technical || {};

    maxScore += 2;
    if (dir === "ucuz") { score += 2; parts.push({ state: "ok", label: "Değer", text: "ucuz" }); }
    else if (dir === "makul") { score += 1; parts.push({ state: "pending", label: "Değer", text: "makul" }); }
    else if (dir === "pahali" || dir === "yuksek_beklenti") { parts.push({ state: "bad", label: "Değer", text: "pahalı" }); }
    else if (dir === "karisik") { parts.push({ state: "none", label: "Değer", text: "karışık" }); }
    else parts.push({ state: "none", label: "Değer", text: "—" });

    // 2. Timing (0-2): bullish reversal confirmation (long-biased).
    maxScore += 2;

      if (reversal.confirmed >= 2) { score += 2; parts.push({ state: "ok", label: "Zamanlama", text: "dönüş teyitli (" + reversal.confirmed + "/" + reversal.total + ")" }); }
      else if (reversal.confirmed === 1) { score += 1; parts.push({ state: "pending", label: "Zamanlama", text: "erken dönüş (" + reversal.confirmed + "/" + reversal.total + ")" }); }
      else parts.push({ state: "bad", label: "Zamanlama", text: "dönüş yok, düşüyor" });

    } else parts.push({ state: "none", label: "Zamanlama", text: "—" });

    maxScore += 2;
    var rr = bestEntryRR(result.entry_plan);
    if (rr !== null) {
      if (rr >= 2.5) { score += 2; parts.push({ state: "ok", label: "R/R", text: rr.toFixed(1) + "×" }); }
      else if (rr >= 1.5) { score += 1; parts.push({ state: "pending", label: "R/R", text: rr.toFixed(1) + "×" }); }
      else parts.push({ state: "bad", label: "R/R", text: rr.toFixed(1) + "× (düşük)" });

    else if (ratio >= 0.5) { grade = "B"; gcls = "grade-b"; gnote = "Kısmi hizalanma — bir bacak eksik, teyit bekle."; }

  // Plain-language Turkish sentence built from the same raw numbers used by

    else if (m.r3 !== null) longTermClause = "Son 3 ayda " + signedPct(m.r3);

    if (longTermClause !== null) {
      sentence1 = longTermClause;
      if (m.r1 !== null) {
        sentence1 += ", son 1 ayda " + signedPct(m.r1);
        if (m.accelWord) sentence1 += " — momentum " + m.accelWord.toLowerCase();
      }

    if (m.rsi !== null) oscParts.push("RSI " + Math.round(m.rsi));

  // ---- MOMENTUM card: three-layer synthesis (result.momentum) -------------
  // Renders the Python-side synthesis of price momentum (t.momentum),

  // across stored analyses) into one card, plus the cross-signal readings
  // that intersect momentum with the fundamental (value) verdict. Renders

  // no data); each of the three sub-layers renders "—" independently when
  // its own layer is missing, so a partial payload never crashes the card.
  function momentumVerdictColor(v) {
    if (v === "GÜÇLÜ+" || v === "POZİTİF") return "green";

    return "muted";
  }

  // Small inline-SVG line, reusing the same .spark-line/.spark-dot visual
  // language as thesisSparklineHtml but sized for a compact sub-row (no axis
  // labels). Returns "" when fewer than two plottable points are given.
  function miniSparkSvg(values) {

  function momentumSubRowHtml(label, bodyHtml) {
    return (
      '<div class="mom-sub-row">' +
        '<div class="mom-sub-label">' + escapeHtml(label) + '</div>' +
        '<div class="mom-sub-body">' + bodyHtml + '</div>' +
      '</div>'
    );
  }

  function momentumCrossSignalHtml(sig) {
    if (!sig) return "";
    var sevCls = sig.severity === "warn" ? "mom-chip-warn" : (sig.severity === "good" ? "mom-chip-good" : "mom-chip-info");

  // Which quadrant a (price.s, fundamental.s) pair falls in -- the same

  function momentumQuadrantSvg(priceS, fundS, zoneKey) {

    var cx = pad + innerW / 2, cy = pad + innerH / 2;
    var halfW = innerW / 2, halfH = innerH / 2;
    function clamp(v) { return Math.max(-1, Math.min(1, v)); }
    function xAt(s) { return pad + innerW * (clamp(s) + 1) / 2; }
    function yAt(s) { return pad + innerH * (1 - (clamp(s) + 1) / 2); }
    var dotX = xAt(priceS), dotY = yAt(fundS);

    var zones =
      '<rect x="' + cx + '" y="' + pad + '" width="' + halfW + '" height="' + halfH + '" class="mom-quad-zone mom-quad-zone-confirmed"/>' +
      '<rect x="' + pad + '" y="' + pad + '" width="' + halfW + '" height="' + halfH + '" class="mom-quad-zone mom-quad-zone-opportunity"/>' +
      '<rect x="' + cx + '" y="' + cy + '" width="' + halfW + '" height="' + halfH + '" class="mom-quad-zone mom-quad-zone-trap"/>' +
      '<rect x="' + pad + '" y="' + cy + '" width="' + halfW + '" height="' + halfH + '" class="mom-quad-zone mom-quad-zone-weak"/>';

    var axes =
      '<line x1="' + pad + '" y1="' + cy + '" x2="' + (W - pad) + '" y2="' + cy + '" class="mom-quad-axis"/>' +
      '<line x1="' + cx + '" y1="' + pad + '" x2="' + cx + '" y2="' + (H - pad) + '" class="mom-quad-axis"/>';

    function zoneLabel(x, y, cls, text) {
      return '<text x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" text-anchor="middle" class="mom-quad-label ' + cls + '">' + text + '</text>';
    }
    var labels =
      zoneLabel(cx + halfW / 2, pad + halfH / 2, "mom-quad-label-confirmed", "TEYİTLİ İVME") +
      zoneLabel(pad + halfW / 2, pad + halfH / 2, "mom-quad-label-opportunity", "FIRSAT BÖLGESİ") +
      zoneLabel(cx + halfW / 2, cy + halfH / 2 + 3, "mom-quad-label-trap", "MOMENTUM TUZAĞI") +
      zoneLabel(pad + halfW / 2, cy + halfH / 2 + 3, "mom-quad-label-weak", "ZAYIF");

    var dot = '<circle cx="' + dotX.toFixed(1) + '" cy="' + dotY.toFixed(1) + '" r="5.5" class="mom-quad-dot mom-quad-dot-' + (zoneKey || "weak") + '"/>';

    return '<svg class="mom-quad-svg" viewBox="0 0 ' + W + ' ' + H +
      '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Fiyat ve fundamental momentum dörtgeni">' +
      zones + axes + labels + dot + '</svg>';
  }

  // Wraps the quadrant SVG with its axis captions ("← Fiyat momentumu →" /
  // "Fundamental ↑") and a legend line carrying the raw 0-100 scores (50 =
  // nötr) plus the zone the dot landed in.
  function momentumQuadrantBlockHtml(price, fund, zone) {
    var svg = momentumQuadrantSvg(Number(price.s), Number(fund.s), zone.key);
    var pScore = isNum(price.score) ? Math.round(Number(price.score)) + "/100" : "—";
    var fScore = isNum(fund.score) ? Math.round(Number(fund.score)) + "/100" : "—";
    return (
      '<div class="mom-quad-wrap">' +
        '<div class="mom-quad-yaxis-row">' +
          '<div class="mom-quad-ylabel">Fundamental ↑</div>' +
          '<div class="mom-quad-box">' + svg + '</div>' +
        '</div>' +
        '<div class="mom-quad-axis-row">' +
          '<span class="mom-quad-end">zayıf</span>' +
          '<span class="mom-quad-axis-caption">← Fiyat momentumu →</span>' +
          '<span class="mom-quad-end">güçlü</span>' +
        '</div>' +
        '<div class="mom-quad-legend">Fiyat ' + escapeHtml(pScore) + ' · Fundamental ' + escapeHtml(fScore) +
          ' · 0-100 ölçek, 50 = nötr · ● mevcut konum (' + escapeHtml(zone.label) + ')</div>' +
      '</div>'
    );
  }

  // Fallback "Fiyat" sub-row body (used only when the quadrant can't be
  // drawn because fundamental.s is missing -- e.g. quarterly fundamentals
  // too sparse). Same content the quadrant's legend would otherwise carry.
  function momentumPriceBodyHtml(price) {
    if (!price) return '<span class="muted">—</span>';
    var scoreTxt = isNum(price.score) ? Math.round(Number(price.score)) + "/100 (50=nötr)" : "—";
    var accelTxt = price.accel ? " · " + escapeHtml(price.accel) : "";
    var pCls = price.direction === "up" ? "mom-badge-up" : (price.direction === "down" ? "mom-badge-down" : "mom-badge-flat");
    return '<span class="mom-badge ' + pCls + '">' + escapeHtml(price.arrow || "") + ' ' + escapeHtml(price.label || "—") + '</span> ' +
      '<span class="mom-sub-score">' + scoreTxt + accelTxt + '</span>';
  }

  // Fallback "Fundamental" sub-row body (used only when the quadrant can't
  // be drawn because price.s is missing -- e.g. no price history at all).
  // Labels its YoY sparkline explicitly (first->last), per the "explanatory"
  // requirement -- a bare sparkline with no caption reads as decoration.
  function momentumFundamentalBodyHtml(fund) {
    if (!fund) return '<span class="muted">—</span>';
    var scoreTxt = isNum(fund.score) ? Math.round(Number(fund.score)) + "/100 (50=nötr)" : "";
    var scoreHtml = scoreTxt ? ' <span class="mom-sub-score">(' + scoreTxt + ')</span>' : "";
    var yoy = fund.revenue_accel && fund.revenue_accel.yoy_series;
    var sparkHtml = "";
    if (Array.isArray(yoy) && yoy.length >= 2) {
      var vals = yoy.map(function (y) { return y.yoy_pct; }).filter(isNum);
      if (vals.length >= 2) {
        var caption = "YoY büyüme: " + fmtSignedPct(vals[0]) + "→" + fmtSignedPct(vals[vals.length - 1]);
        sparkHtml = '<div class="mom-mini-spark-wrap">' + miniSparkSvg(vals) +
          '<div class="mom-spark-caption">' + escapeHtml(caption) + '</div></div>';
      }
    }
    return escapeHtml(fund.detail || "—") + scoreHtml + sparkHtml;
  }

  // Değer seyri (verdict momentum) -- the model's OWN fair-value/price
  // trajectory across stored analyses. A different axis from the security's
  // own price/fundamental momentum above, so it's rendered as a separate
  // context strip below the quadrant rather than folded into it. Labels its
  // sparkline with the first->last FV/price ratio, per the "explanatory"
  // requirement.
  function momentumVerdictTrendHtml(vt) {
    var body;
    if (vt) {
      var sparkHtml = "";
      var series = vt.series;
      if (Array.isArray(series) && series.length >= 2) {
        var ratios = series.map(function (p) { return p.ratio; }).filter(isNum);
        if (ratios.length >= 2) {
          var caption = "FV/fiyat: " + ratios[0].toFixed(2) + "→" + ratios[ratios.length - 1].toFixed(2);
          sparkHtml = '<div class="mom-mini-spark-wrap">' + miniSparkSvg(ratios) +
            '<div class="mom-spark-caption">' + escapeHtml(caption) + '</div></div>';
        }
      }
      body = escapeHtml(vt.detail || "—") + sparkHtml;
    } else {
      body = '<span class="muted">—</span>';
    }
    return (
      '<div class="mom-vt-strip">' +
        '<div class="mom-vt-title">Değer seyri</div>' +
        '<div class="mom-vt-body">' + body + '</div>' +
      '</div>'
    );
  }

  // One muted line explaining WHY the composite verdict is what it is:
  // leads with the price/fundamental labels (+ raw scores), a middle clause
  // derived from the quadrant zone (only when both s values are available),
  // and closes with the verdict-momentum's own detail sentence. Fully
  // None-safe -- degrades to a shorter sentence, never "None"/"undefined",
  // and falls back to a placeholder when nothing at all is available.
  function momentumSynthesisSentence(mo) {
    var price = mo.price, fund = mo.fundamental, vt = mo.verdict_trend;
    var leadParts = [];
    if (price && price.label) {
      var pScore = isNum(price.score) ? Math.round(Number(price.score)) : null;
      leadParts.push("Fiyat momentumu " + price.label + (pScore !== null ? " (" + pScore + "/100)" : ""));
    }
    if (fund && fund.label) {
      var fScore = isNum(fund.score) ? Math.round(Number(fund.score)) : null;
      leadParts.push("fundamental momentum " + fund.label + (fScore !== null ? " (" + fScore + "/100)" : ""));
    }
    var lead = leadParts.join(", ");

    var zoneClause = "";
    if (price && isNum(price.s) && fund && isNum(fund.s)) {
      var zone = momentumQuadrantZone(Number(price.s), Number(fund.s));
      if (zone.key === "confirmed") zoneClause = "fiyat ve iş performansı aynı yönde: trend teyitli";
      else if (zone.key === "opportunity") zoneClause = "iş hızlanıyor ama fiyat henüz teyit etmedi";
      else if (zone.key === "trap") zoneClause = "fiyat yükseliyor ama iş yavaşlıyor — momentum tuzağı riski";
      else zoneClause = "fiyat ve iş performansı ikisi de zayıf";
    }

    var sentence1 = lead;
    if (zoneClause) sentence1 += (lead ? "; " : "") + zoneClause;
    if (sentence1) sentence1 += ".";

    var sentence2 = (vt && vt.detail) ? vt.detail : "";

    var full = [sentence1, sentence2].filter(function (s) { return s; }).join(" ");
    return full || "Momentum sentezi için yeterli veri yok.";
  }

  // Price-score breakdown: one signed bar per component (the same
  // {key,label,points} objects Python's compute_price_momentum emits), so the
  // reader sees WHY the 0-100 score is what it is -- which levers pushed it up
  // (getiri/trend...) and which dragged it down. Bars are scaled to the
  // largest absolute contribution in the set. Returns "" if no components.
  function momentumPriceBreakdownHtml(price) {
    if (!price || !Array.isArray(price.components) || !price.components.length) return "";
    var comps = price.components.filter(function (c) { return c && isNum(c.points); });
    if (!comps.length) return "";
    var maxAbs = comps.reduce(function (m, c) { return Math.max(m, Math.abs(Number(c.points))); }, 0) || 1;
    var scoreTxt = isNum(price.score) ? Math.round(Number(price.score)) : "—";
    var rows = comps.map(function (c) {
      var pts = Number(c.points);
      var w = Math.min(50, Math.abs(pts) / maxAbs * 50);   // % of half-track
      var barCls = pts > 0 ? "mom-bd-bar-pos" : "mom-bd-bar-neg";
      var valCls = pts > 0.05 ? "mom-bd-val-pos" : (pts < -0.05 ? "mom-bd-val-neg" : "mom-bd-val-zero");
      var bar = Math.abs(pts) < 0.05 ? "" :
        '<span class="mom-bd-bar ' + barCls + '" style="width:' + w.toFixed(1) + '%;"></span>';
      return (
        '<div class="mom-bd-row">' +
          '<span class="mom-bd-label">' + escapeHtml(c.label || c.key || "—") + '</span>' +
          '<span class="mom-bd-bar-track">' + bar + '</span>' +
          '<span class="mom-bd-val ' + valCls + '">' + (pts >= 0 ? "+" : "") + pts.toFixed(1) + '</span>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="mom-bd-col">' +
        '<div class="mom-bd-title">FİYAT <b>' + escapeHtml(String(scoreTxt)) + '/100</b> · katkılar</div>' +
        rows +
      '</div>'
    );
  }

  // Fundamental-signal breakdown: the sub-signals behind the fundamental score
  // as ✓/◦/✗ rows (revenue-growth acceleration, gross & FCF margin trend,
  // model-based surprise). Icon reflects each signal's direction. "" if no
  // fundamental layer.
  function momentumFundamentalBreakdownHtml(fund) {
    if (!fund) return "";
    function icon(kind) {
      var g = kind === "ok" ? "mom-bd-icon-ok" : (kind === "bad" ? "mom-bd-icon-bad" : "mom-bd-icon-neutral");
      var ch = kind === "ok" ? "✓" : (kind === "bad" ? "✗" : "◦");
      return '<span class="mom-bd-icon ' + g + '">' + ch + '</span>';
    }
    function trendKind(word) {
      if (word === "hızlanıyor" || word === "iyileşiyor") return "ok";
      if (word === "yavaşlıyor" || word === "bozuluyor") return "bad";
      return "neutral";
    }
    function sig(kind, text) { return '<div class="mom-bd-sig">' + icon(kind) + '<span>' + escapeHtml(text) + '</span></div>'; }

    var rows = [];
    var ra = fund.revenue_accel;
    if (ra && ra.word) {
      // "Çeyreklik" is explicit so this never looks like it contradicts the
      // thesis card's *annual* growth metric -- they measure different periods.
      // An unconfirmed (single-quarter) move is flagged and shown neutral, not
      // as a full ✓/✗, matching the reduced weight it carries in the score.
      var unconfirmed = ra.confirmed === false;
      var yoyTxt = isNum(ra.latest_yoy_pct) ? " (son çeyrek YoY " + fmtSignedPct(ra.latest_yoy_pct) + ")" : "";
      var caveat = unconfirmed ? " — tek çeyrek, teyit bekliyor" : "";
      var kind = unconfirmed ? "neutral" : trendKind(ra.word);
      rows.push(sig(kind, "Çeyreklik gelir büyümesi " + ra.word + yoyTxt + caveat));
    }
    var mt = fund.margin_trend || {};
    if (mt.gross) rows.push(sig(trendKind(mt.gross), "Brüt marj " + mt.gross));
    if (mt.fcf) rows.push(sig(trendKind(mt.fcf), "FCF marjı " + mt.fcf));
    var ms = fund.model_surprise;
    if (ms && ms.direction) {
      var msKind = ms.direction === "beat" ? "ok" : (ms.direction === "miss" ? "bad" : "neutral");
      var msWord = ms.direction === "beat" ? "modeli aştı" : (ms.direction === "miss" ? "modelin altında" : "modelle uyumlu");
      var msPct = isNum(ms.surprise_pct) ? " (" + fmtSignedPct(ms.surprise_pct) + ")" : "";
      rows.push(sig(msKind, "Gerçekleşen gelir " + msWord + msPct));
    } else {
      rows.push(sig("neutral", "Model-sürpriz: veri yok"));
    }
    if (!rows.length) return "";
    var scoreTxt = isNum(fund.score) ? Math.round(Number(fund.score)) : "—";
    return (
      '<div class="mom-bd-col">' +
        '<div class="mom-bd-title">FUNDAMENTAL <b>' + escapeHtml(String(scoreTxt)) + '/100</b> · sinyaller</div>' +
        rows.join("") +
      '</div>'
    );
  }

  function momentumCardHtml(result) {
    var mo = result && result.momentum;
    if (!mo) return "";

    var vColor = momentumVerdictColor(mo.verdict);
    var price = mo.price;
    var fund = mo.fundamental;
    var vt = mo.verdict_trend;

    // The quadrant is the headline visual whenever BOTH axes have a
    // continuous score; otherwise fall back to the old labeled sub-rows so
    // whichever single layer exists is never lost.
    var hasQuadrant = !!(price && isNum(price.s) && fund && isNum(fund.s));
    var bodyHtml;
    if (hasQuadrant) {
      var zone = momentumQuadrantZone(Number(price.s), Number(fund.s));
      bodyHtml = momentumQuadrantBlockHtml(price, fund, zone);
    } else {
      bodyHtml =
        '<div class="mom-sub-rows">' +
          momentumSubRowHtml("Fiyat", momentumPriceBodyHtml(price)) +
          momentumSubRowHtml("Fundamental", momentumFundamentalBodyHtml(fund)) +
        '</div>';
    }

    // Score breakdown: what each 0-100 score is actually made of (price
    // component contributions + fundamental sub-signals). Shown whenever the
    // underlying data exists, in either the quadrant or the fallback layout.
    var breakdownCols = momentumPriceBreakdownHtml(price) + momentumFundamentalBreakdownHtml(fund);
    var breakdownHtml = breakdownCols ? '<div class="mom-breakdown">' + breakdownCols + '</div>' : "";

    var crossHtml = "";
    if (Array.isArray(mo.cross_signals) && mo.cross_signals.length) {
      crossHtml =
        '<div class="mom-cross-title">Çapraz Sinyaller</div>' +
        '<div class="mom-cross-list">' + mo.cross_signals.map(momentumCrossSignalHtml).join("") + '</div>';
    }

    return (
      '<div class="card mom-card">' +
        '<div class="mom-card-head">' +
          '<div class="card-title" style="margin:0;">MOMENTUM</div>' +
          '<span class="badge badge-' + vColor + '">' + escapeHtml(mo.verdict || "—") + '</span>' +
        '</div>' +
        '<div class="mom-synth">' + escapeHtml(momentumSynthesisSentence(mo)) + '</div>' +
        bodyHtml +
        breakdownHtml +
        momentumVerdictTrendHtml(vt) +
        crossHtml +
        '<div class="mom-help">Momentum, giriş zamanlaması bağlamıdır — adil değer hesaplamasına asla girmez.</div>' +
      '</div>'
    );
  }

  function technicalCardHtml(technical, verdictText, horizon) {
    var t = technical || {};
    // No usable indicators at all -> fall back to the plain verdict card.
    if (!isNum(t.rsi14) && !isNum(t.price)) {
      return verdictCardHtml("Technical", verdictText, t.verdict_detail || "Price data unavailable.");
    }
    var color = bucketColor(verdictText);

    // ---- Trend regime: price vs SMA50/SMA200 (the two trend lines) --------
    var p = isNum(t.price) ? Number(t.price) : null;
    var s50 = isNum(t.sma50) ? Number(t.sma50) : null;
    var s200 = isNum(t.sma200) ? Number(t.sma200) : null;
    var above50 = (p !== null && s50 !== null) ? p >= s50 : null;
    var above200 = (p !== null && s200 !== null) ? p >= s200 : null;
    var regime;
    if (above50 === true && above200 === true) regime = { label: "YÜKSELİŞ TRENDİ", cls: "regime-up", dir: "up", arrow: "↑" };
    else if (above50 === false && above200 === false) regime = { label: "DÜŞÜŞ TRENDİ", cls: "regime-down", dir: "down", arrow: "↓" };
    else if (above50 !== null || above200 !== null) regime = { label: "GEÇİŞ / NÖTR", cls: "regime-neutral", dir: "flat", arrow: "→" };
    else regime = { label: "—", cls: "regime-neutral", dir: "flat", arrow: "" };

    var evi = [];
    if (s50 !== null && s200 !== null) {
      var lead = (above50 === above200)
        ? (above50 ? "Fiyat iki ortalamanın da üstünde" : "Fiyat iki ortalamanın da altında")
        : "Fiyat ortalamalar arasında";
      evi.push(lead + " (SMA50 " + fmtMoney(s50) + ", SMA200 " + fmtMoney(s200) + ")");
    } else if (s50 !== null) {
      evi.push("SMA50 " + fmtMoney(s50) + (above50 ? " üstünde" : " altında"));
    }
    if (t.golden_cross) evi.push("altın kesişim");
    else if (t.death_cross) evi.push("ölüm kesişimi");
    if (isNum(t.macd_hist)) evi.push("MACD " + (t.macd_hist > 0 ? "bullish" : t.macd_hist < 0 ? "bearish" : "flat"));
    if (t.obv_trend) evi.push("OBV " + (t.obv_trend === "up" ? "toplama" : t.obv_trend === "down" ? "dağıtım" : "yatay"));

    var regimeHtml =
      '<div class="trend-regime">' +
        '<span class="regime-badge ' + regime.cls + '">' + regime.arrow + ' ' + regime.label + '</span>' +
        (isNum(t.rsi14) ? '<span class="regime-sub">RSI ' + Math.round(Number(t.rsi14)) + '</span>' : '') +
      '</div>' +
      (evi.length ? '<div class="regime-evi">' + escapeHtml(evi.join(" · ")) + '</div>' : '');

    // ---- Trigger ladder: every S/R level as a "close above/below -> X" rule.
    var res = (t.resistance_levels || []).filter(function (z) { return isNum(z.price) || isNum(z.low); });
    var sup = (t.support_levels || []).filter(function (z) { return isNum(z.price) || isNum(z.low); });

    function absDist(lvl) { return isNum(lvl.dist_pct) ? Math.abs(Number(lvl.dist_pct)) : Infinity; }
    function nearestOf(list) {
      var best = null;
      list.forEach(function (l) { if (!best || absDist(l) < absDist(best)) best = l; });
      return best;
    }
    var nearRes = nearestOf(res), nearSup = nearestOf(sup);
    // The PRIMARY trigger is the one that flips the current regime: in a
    // downtrend/neutral that's the nearest resistance (a close above breaks the
    // downtrend); in an uptrend it's the nearest support (a close below ends it).
    // Falls back to the other side when the preferred side has no level.
    var nearest;
    if (regime.dir === "up") {
      nearest = nearSup ? { lvl: nearSup, side: "sup" } : (nearRes ? { lvl: nearRes, side: "res" } : null);
    } else {
      nearest = nearRes ? { lvl: nearRes, side: "res" } : (nearSup ? { lvl: nearSup, side: "sup" } : null);
    }

    var calloutHtml = "";
    if (nearest) {
      var nl = nearest.lvl;
      if (nearest.side === "res") {
        calloutHtml = '<div class="trend-callout callout-up"><span class="co-arrow">▲</span><div>' +
          'Sıradaki tetik: <b>' + srRange(nl) + ' üstünde günlük kapanış</b> (' + techSigned(nl.dist_pct) + ') → ' +
          escapeHtml(resistanceEffect(nl, regime.dir)) + '.</div></div>';
      } else {
        calloutHtml = '<div class="trend-callout callout-down"><span class="co-arrow">▼</span><div>' +
          'Sıradaki tetik: <b>' + srRange(nl) + ' altında günlük kapanış</b> (' + techSigned(nl.dist_pct) + ') → ' +
          escapeHtml(supportEffect(nl, regime.dir)) + '.</div></div>';
      }
    }

    function trigRow(side, lvl) {
      var s = srStrength(lvl);
      var isNear = nearest && nearest.side === side && nearest.lvl === lvl;
      var effect = side === "res" ? resistanceEffect(lvl, regime.dir) : supportEffect(lvl, regime.dir);
      var verb = side === "res" ? "Üstünde kapanış" : "Altında kapanış";
      var arrow = side === "res" ? "▲" : "▼";
      return '<div class="trig-row trig-' + (side === "res" ? "up" : "down") + (isNear ? " trig-nearest" : "") + '">' +
        '<span class="trig-arrow">' + arrow + '</span>' +
        '<span class="trig-price">' + srRange(lvl) + '</span>' +
        '<span class="sr-strength-badge ' + s.cls + '">' + s.label + '</span>' +
        '<span class="trig-rule"><b>' + verb + '</b> → ' + escapeHtml(effect) +
          ' <span class="trig-reason">(' + escapeHtml(srReason(lvl, false)) + ')</span></span>' +
        '<span class="trig-dist">' + techSigned(lvl.dist_pct) + '</span>' +
      '</div>';
    }

    var ladderHtml;
    if (res.length || sup.length) {
      var rows = res.slice().reverse().map(function (r) { return trigRow("res", r); });
      rows.push(
        '<div class="trig-row trig-now">' +
          '<span class="trig-arrow">◆</span>' +
          '<span class="trig-price">' + fmtMoney(t.price) + '</span>' +
          '<span class="trig-now-tag">ŞU AN</span>' +
          '<span class="trig-rule" style="color:var(--muted)">' + escapeHtml(regime.label.toLowerCase()) + '</span>' +
        '</div>'
      );
      sup.forEach(function (s) { rows.push(trigRow("sup", s)); });
      ladderHtml = '<div class="trigger-ladder">' + rows.join("") + '</div>';
    } else {
      ladderHtml = '<div class="tech-empty">Trend tetikleri için yeterli fiyat geçmişi yok.</div>';
    }

    // ---- Collapsed detail: momentum synthesis, then Trend & Durum ----------
    var rsiHtml = "";
    if (isNum(t.rsi14)) {
      var pos = Math.max(0, Math.min(100, Number(t.rsi14)));
      rsiHtml =
        '<div class="rsi-row">' +
          '<span class="rsi-side">RSI 14</span>' +
          '<div class="rsi-gauge"><div class="rsi-gauge-marker" style="left:' + pos + '%;"></div></div>' +
          '<span class="rsi-val">' + Math.round(Number(t.rsi14)) + '</span>' +
        '</div>';
    }
    function tile(label, valHtml) {
      return '<div class="tech-stat"><div class="tech-stat-label">' + label +
        '</div><div class="tech-stat-val">' + valHtml + '</div></div>';
    }

    // Momentum row: only the return/MACD tiles -- trend, volatility and
    // volume tiles moved to the "Trend & Durum" subsection below so this
    // section can be read as a focused momentum readout.
    var momentumTiles = [
      tile("1M", techSigned(t.return_1m_pct)),
      tile("3M", techSigned(t.return_3m_pct)),
      tile("6M", techSigned(t.return_6m_pct)),
    ];
    if (isNum(t.macd_hist)) {
      var macdState = Number(t.macd_hist) > 0
        ? '<span class="tech-pos">Bullish</span>'
        : (Number(t.macd_hist) < 0 ? '<span class="tech-neg">Bearish</span>' : "Flat");
      if (t.macd_cross === "bullish") macdState += ' <span class="tech-pos">· ×↑</span>';
      else if (t.macd_cross === "bearish") macdState += ' <span class="tech-neg">· ×↓</span>';
      momentumTiles.push(tile("MACD", macdState));
    }

    var trendTiles = [
      tile("vs SMA50", techSigned(t.dist_sma50_pct)),
      tile("vs SMA200", techSigned(t.dist_sma200_pct)),
    ];
    if (isNum(t.range_position_pct)) trendTiles.push(tile("52W Range", Math.round(Number(t.range_position_pct)) + "%"));
    if (isNum(t.volatility_20d)) trendTiles.push(tile("Volatility", Math.round(Number(t.volatility_20d) * 100) + "%"));
    if (isNum(t.rel_volume)) {
      var rv = Number(t.rel_volume);
      var rvCls = rv >= 1.5 ? "tech-pos" : (rv < 0.7 ? "tech-neg" : "");
      trendTiles.push(tile("Rel Vol", '<span class="' + rvCls + '">' + rv.toFixed(1) + '×</span>'));
    }
    if (t.obv_trend) {
      var obvMap = {
        up: '<span class="tech-pos">Accum ↑</span>',
        down: '<span class="tech-neg">Distrib ↓</span>',
        flat: "Flat",
      };
      trendTiles.push(tile("OBV", obvMap[t.obv_trend] || escapeHtml(String(t.obv_trend))));
    }
    if (t.rsi_divergence) {
      trendTiles.push(tile("RSI Div", t.rsi_divergence === "bullish"
        ? '<span class="tech-pos">Bullish ↑</span>'
        : '<span class="tech-neg">Bearish ↓</span>'));
    }
    // ATR tile: volatility in price + % terms (swing stop-distance yardstick).
    if (isNum(t.atr14) && p !== null && p > 0) {
      var atrPct = Number(t.atr14) / p * 100;
      trendTiles.push(tile("ATR (14)", "$" + Number(t.atr14).toFixed(2) + " <span class=\"tech-stat-sub\">(" + atrPct.toFixed(1) + "%)</span>"));
    }
    // Relative strength vs benchmark (SPY): 3-month relative return, leader/laggard.
    var rsData = t.relative_strength;
    if (rsData && isNum(rsData.rs_3m_pct)) {
      var rs3 = Number(rsData.rs_3m_pct);
      var rsCls = rs3 > 0 ? "tech-pos" : (rs3 < 0 ? "tech-neg" : "");
      var rsSign = rs3 > 0 ? "+" : "";
      trendTiles.push(tile("vs " + escapeHtml(rsData.benchmark || "SPY") + " (3A)",
        '<span class="' + rsCls + '">' + rsSign + rs3.toFixed(1) + " pp</span>"));
    }
    var divNote = "";
    if (t.rsi_divergence_detail) {
      var d = t.rsi_divergence_detail;
      if (d.type === "bearish") {
        divNote = '<div class="tech-div-note tech-neg">Bearish RSI divergence: price made a higher high (' +
          fmtMoney(d.price_prev) + ' → ' + fmtMoney(d.price_last) + ') but RSI fell (' +
          d.rsi_prev + ' → ' + d.rsi_last + ') — momentum not confirming the high.</div>';
      } else {
        divNote = '<div class="tech-div-note tech-pos">Bullish RSI divergence: price made a lower low (' +
          fmtMoney(d.price_prev) + ' → ' + fmtMoney(d.price_last) + ') but RSI rose (' +
          d.rsi_prev + ' → ' + d.rsi_last + ') — selling pressure fading.</div>';
      }
    }
    var fibCaption = "";
    if (t.fibonacci && isNum(t.fibonacci.low) && isNum(t.fibonacci.high)) {
      fibCaption = '<div class="sr-fib-caption">Fib retracement of ' + fmtMoney(t.fibonacci.low) + '–' +
        fmtMoney(t.fibonacci.high) + ' (' + (t.fibonacci.direction === "up" ? "uptrend" : "downtrend") + ')</div>';
    }

    // Momentum synthesis: composite score (see computeMomentum) -> a badge
    // stating direction + acceleration, a directional meter, and a plain
    // sentence. When no signal at all is available, show the empty state
    // instead of badge/meter/sentence but still render the rest of the card.
    var momentum = computeMomentum(t);
    var reversal = computeReversal(t, momentum, horizon);
    var momSynthesisHtml;
    if (momentum) {
      // Plain .toUpperCase() mis-cases Turkish "i" (no dot) -> "SABIT" instead
      // of "SABİT"; toLocaleUpperCase("tr-TR") applies the correct dotted-I rule.
      var badgeLabel = momentum.dirLabel + (momentum.accelWord ? " · " + momentum.accelWord.toLocaleUpperCase("tr-TR") : "");
      momSynthesisHtml =
        '<div class="mom-badge-row"><span class="mom-badge ' + momentum.dirCls + '">' +
          momentum.arrow + ' ' + escapeHtml(badgeLabel) +
        '</span>' + reversalBadgeMarkerHtml(reversal) + squeezeBadgeHtml(t) + '</div>' +
        '<div class="mom-meter-row">' +
          '<span class="mom-ends">güçlü↓</span>' +
          '<div class="mom-meter"><div class="mom-meter-marker" style="left:' + momentum.meterPos + '%;"></div></div>' +
          '<span class="mom-ends">güçlü↑</span>' +
        '</div>' +
        (momentum.accelWord ? '<div class="mom-meter-cap">(' + escapeHtml(momentum.accelWord) + ')</div>' : "") +
        '<div class="mom-note">' + escapeHtml(momentumSentence(momentum)) + '</div>' +
        reversalBlockHtml(reversal);
    } else {
      momSynthesisHtml = '<div class="tech-empty">Momentum için yeterli fiyat geçmişi yok.</div>';
    }

    return (
      '<div class="card">' +
        '<div class="card-title">Technical</div>' +
        '<div class="verdict-card-body">' +
          '<div class="gauge"><div class="gauge-marker" style="left:' + GAUGE_POSITION[color] + '%;">▲</div></div>' +
          '<div><span class="badge badge-' + color + '">' + escapeHtml(verdictText || "—") + '</span></div>' +
          (t.verdict_detail ? '<div class="verdict-note">' + escapeHtml(t.verdict_detail) + '</div>' : "") +
          regimeHtml +
          calloutHtml +
          ladderHtml +
          '<button type="button" class="tech-toggle" aria-expanded="false">Momentum &amp; detaylar ▾</button>' +
          '<div class="tech-details" hidden>' +
            '<div class="tech-section-title">Momentum</div>' +
            momSynthesisHtml +
            rsiHtml +
            '<div class="tech-stats">' + momentumTiles.join("") + '</div>' +
            '<div class="tech-section-title">Trend &amp; Durum</div>' +
            '<div class="tech-stats">' + trendTiles.join("") + '</div>' +
            divNote +
            (fibCaption ? '<div class="tech-section-title">Seviye ayrıntıları</div>' + fibCaption : "") +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  // Wire the collapsible momentum/detail section of the Technical card.
  function wireTechnical() {
    var btn = bodyEl.querySelector(".tech-toggle");
    var det = bodyEl.querySelector(".tech-details");
    if (!btn || !det) return;
    btn.addEventListener("click", function () {
      var opening = det.hasAttribute("hidden");
      if (opening) {
        det.removeAttribute("hidden");
        btn.setAttribute("aria-expanded", "true");
        btn.innerHTML = "Momentum &amp; detaylar ▴";
      } else {
        det.setAttribute("hidden", "");
        btn.setAttribute("aria-expanded", "false");
        btn.innerHTML = "Momentum &amp; detaylar ▾";
      }
    });
  }

  // ---- Sensitivity analysis card -------------------------------------------
  // Only rendered when result.valuation.sensitivity is present.
  function sensitivityTableHtml(sens) {
    if (!sens || !sens.matrix || !sens.matrix.length) return "";
    var growthValues = sens.growth_values || [];
    var drValues = sens.dr_values || [];
    var matrix = sens.matrix || [];
    var baseRow = Math.floor(matrix.length / 2);
    var baseCol = Math.floor((matrix[0] || []).length / 2);

    var headerCells = drValues.map(function (d) {
      return '<th class="sens-col-h">' + fmtPct(d) + '</th>';
    }).join("");

    var bodyRows = matrix.map(function (rowArr, ri) {
      var cells = (rowArr || []).map(function (val, ci) {
        var isBase = ri === baseRow && ci === baseCol;
        return '<td class="sens-cell' + (isBase ? " sens-base" : "") + '">' + fmtMoney(val) + '</td>';
      }).join("");
      var rowLabel = growthValues[ri] !== undefined ? fmtPct(growthValues[ri]) : "—";
      return '<tr><th class="sens-row-h">' + rowLabel + '</th>' + cells + '</tr>';
    }).join("");

    var uncertaintyTag = sens.high_uncertainty
      ? '<span class="uncertainty-tag">High Uncertainty</span>'
      : "";

    return (
      '<div class="card">' +
        '<div class="card-title">Sensitivity Analysis' + (uncertaintyTag ? " " + uncertaintyTag : "") + '</div>' +
        '<table class="sensitivity-table">' +
          '<thead><tr><th></th>' + headerCells + '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
        '</table>' +
        '<div class="sens-axis-note">Rows: growth · Columns: discount rate · center cell = base case</div>' +
      '</div>'
    );
  }

  // ---- Staged entry plan card ----------------------------------------------
  // Only rendered when result.entry_plan is present; an empty list means the
  // planning layer found no usable mechanical trigger levels (missing price
  // or structural reference levels), not an error -- degrades to a plain
  // sentence rather than an empty table.
  function entryPlanHtml(entryPlan) {
    var sub = '<div class="card-sub">These levels are a mechanical reference -- not a buy order or investment advice. ' +
      'Includes both accumulation (dip) and uptrend-confirmation (breakout) zones.</div>';
    if (!entryPlan || entryPlan.length === 0) {
      return (
        '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<p class="empty-note">Not enough price or structural reference levels (bear/base/bull range, 52-week low, SMA50/SMA200) to build a mechanical tranche plan.</p></div>'
      );
    }
    var rows = entryPlan.map(function (t) {
      var zone = t.price_zone || {};
      // t.kind is a newer field ("breakout" = close ABOVE trigger, uptrend
      // confirmation; "dip" = close BELOW trigger, accumulation). Older
      // baked reports/payloads have no t.kind -- kindTag stays empty and the
      // row renders exactly as before (no glyph, no layout shift).
      var kindTag = "";
      if (t.kind === "breakout") {
        kindTag = '<span class="entry-kind-tag entry-kind-breakout" title="Yükseliş teyidi">▲ teyit</span> ';
      } else if (t.kind === "dip") {
        kindTag = '<span class="entry-kind-tag entry-kind-dip" title="Birikim (dip alım)">▼ birikim</span> ';
      }
      var mainRow =
        '<tr>' +
          '<td>' + escapeHtml(isNum(t.n) ? String(t.n) : "—") + '</td>' +
          '<td class="entry-trigger">' + kindTag + escapeHtml(t.trigger || "—") + '</td>' +
          '<td>' + fmtMoney(zone.lo) + '–' + fmtMoney(zone.hi) + '</td>' +
          '<td>' + fmtRawPct(t.size_pct) + '</td>' +
          '<td>' + fmtMoney(t.invalidation) + '</td>' +
          '<td>' + fmtMoney(t.target) + '</td>' +
          '<td>' + (isNum(t.rr) ? Number(t.rr).toFixed(1) + ":1" : "—") + '</td>' +
        '</tr>';
      var noteRow = t.note
        ? '<tr class="entry-note-row"><td colspan="7">' + escapeHtml(t.note) + '</td></tr>'
        : "";
      return mainRow + noteRow;
    }).join("");
    return (
      '<div class="card"><div class="card-title">Staged Entry Plan</div>' + sub +
        '<table class="sensitivity-table entry-plan-table">' +
          '<thead><tr>' +
            '<th>#</th><th>Trigger</th><th>Price Zone</th><th>Size</th>' +
            '<th>Invalidation</th><th>Target</th><th>R:R</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>'
    );
  }

  // ---- Stop-adding signals card ---------------------------------------
  // An empty list is the common case (no signal active), not an error.
  function stopAddingHtml(stopAdding) {
    if (!stopAdding || stopAdding.length === 0) {
      return (
        '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<p class="empty-note">No active stop-adding signal right now.</p></div>'
      );
    }
    var items = stopAdding.map(function (s) {
      return '<li>' + escapeHtml(s.message || s.code || "") + '</li>';
    }).join("");
    return (
      '<div class="card"><div class="card-title">Stop-Adding Signals</div>' +
        '<div class="alert-box"><ul>' + items + '</ul></div>' +
      '</div>'
    );
